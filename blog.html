<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-gray-800">My Blog</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="dashboard.html" class="text-gray-600 hover:text-gray-900">
                        <i class="fas fa-tachometer-alt"></i> Dashboard
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Blog Posts -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="blogContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Blog posts will be loaded here -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase Configuration
        const supabaseUrl = 'https://yrvetxtjvkdvknnvngez.supabase.co';
        const supabaseKey = 'sb_publishable_nDDWRyOR3CTow6X8E7JdEQ_K8PcFfk5';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Fetch and display blogs
        async function loadBlogs() {
            try {
                const { data, error } = await supabase
                    .from('blogs')
                    .select('*')
                    .eq('status', 'published')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const container = document.getElementById('blogContainer');
                if (data.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full text-center py-12">
                            <h3 class="text-xl text-gray-600">No blog posts found</h3>
                            <p class="text-gray-500 mt-2">Check back later for new content</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = data.map(blog => `
                    <div class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition-shadow duration-300">
                        ${blog.image_url ? `
                            <img src="${blog.image_url}" alt="${blog.title}" class="w-full h-48 object-cover">
                        ` : `
                            <div class="w-full h-48 bg-gradient-to-r from-blue-400 to-purple-500 flex items-center justify-center">
                                <i class="fas fa-image text-white text-4xl"></i>
                            </div>
                        `}
                        <div class="p-6">
                            <div class="flex items-center justify-between mb-2">
                                <span class="text-sm text-blue-600 font-medium">${blog.category || 'General'}</span>
                                <span class="text-sm text-gray-500">${new Date(blog.created_at).toLocaleDateString()}</span>
                            </div>
                            <h2 class="text-xl font-bold text-gray-800 mb-2">${blog.title}</h2>
                            <p class="text-gray-600 text-sm mb-4">${blog.excerpt || blog.content.substring(0, 150) + '...'}</p>
                            <div class="flex items-center justify-between">
                                <span class="text-sm text-gray-500"><i class="fas fa-user mr-1"></i> ${blog.author || 'Admin'}</span>
                                <span class="text-sm text-gray-500"><i class="fas fa-eye mr-1"></i> ${blog.views || 0}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading blogs:', error);
                document.getElementById('blogContainer').innerHTML = `
                    <div class="col-span-full text-center py-12">
                        <h3 class="text-xl text-red-600">Error loading blogs</h3>
                        <p class="text-gray-500 mt-2">Please try again later</p>
                    </div>
                `;
            }
        }

        // Load blogs on page load
        document.addEventListener('DOMContentLoaded', loadBlogs);
    </script>
</body>
</html>
