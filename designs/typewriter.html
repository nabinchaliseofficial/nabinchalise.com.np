<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Typewriter · Quotation Comes Here</title>
  <style>
    /* === RESET & BASE === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f7fb;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      padding: 1.5rem;
      margin: 0;
    }

    /* === MODERN CARD CONTAINER === */
    .typewriter-card {
      max-width: 780px;
      width: 100%;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(2px);
      border-radius: 2.5rem;
      padding: 3rem 2.5rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.08), 0 6px 18px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: all 0.2s ease;
    }

    /* === TYPOGRAPHY === */
    .typewriter-display {
      font-size: clamp(2.2rem, 10vw, 4.2rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: #1a1e2b;
      word-break: break-word;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.05rem;
      min-height: 5rem;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    /* === CURSOR (blinking block) === */
    .cursor {
      display: inline-block;
      width: 0.08em;
      height: 1.1em;
      background: #1a1e2b;
      margin-left: 0.08em;
      border-radius: 1px;
      transition: background 0.1s;
      vertical-align: text-bottom;
      animation: blink-cursor 1s step-end infinite;
    }

    /* cursor blink speed is controlled via JS, but we keep a fallback */
    @keyframes blink-cursor {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* === RESPONSIVE TWEAKS === */
    @media (max-width: 480px) {
      .typewriter-card {
        padding: 2rem 1.5rem;
        border-radius: 2rem;
      }
      .typewriter-display {
        min-height: 4rem;
      }
    }

    /* subtle glow for premium feel */
    .typewriter-card {
      transition: box-shadow 0.3s ease;
    }
    .typewriter-card:hover {
      box-shadow: 0 30px 55px -16px rgba(0, 0, 0, 0.12);
    }
  </style>
</head>
<body>
  <div class="typewriter-card">
    <div class="typewriter-display" id="typewriterDisplay">
      <!-- text + cursor will be injected here -->
    </div>
  </div>
  <script>
    (function() {
      "use strict";

      // ============================================================
      //  ✨  EASILY EDITABLE VARIABLES  ✨
      // ============================================================
      const CONFIG = {
        // The text to type (exactly as required)
        text: "Quotation Comes Here",

        // Speed in milliseconds per character (typing)
        typingSpeed: 75,

        // Speed in milliseconds per character (backspace)
        backspaceSpeed: 40,

        // Pause after full sentence is typed (ms)
        pauseAfterTyping: 2000,

        // Pause after deleting all characters (ms)
        pauseAfterDeleting: 800,

        // Cursor blink speed (ms) – interval for toggling
        cursorBlinkSpeed: 500,
      };

      // ============================================================
      //  DOM refs & state
      // ============================================================
      const displayEl = document.getElementById('typewriterDisplay');
      
      // state
      let currentText = '';            // what's currently shown (without cursor)
      let isDeleting = false;
      let isPaused = false;
      let timeoutId = null;
      let cursorVisible = true;        // for blink toggling
      let blinkIntervalId = null;

      // ============================================================
      //  Cursor element (created once)
      // ============================================================
      const cursorSpan = document.createElement('span');
      cursorSpan.className = 'cursor';
      // apply blink speed from config via CSS custom property (or inline style)
      // we use animation-duration to control blink speed
      cursorSpan.style.animationDuration = `${CONFIG.cursorBlinkSpeed}ms`;

      // ============================================================
      //  Render function: updates DOM with currentText + cursor
      // ============================================================
      function render() {
        // Clear display, but keep cursor as a separate element
        displayEl.innerHTML = '';
        // text node for currentText
        const textNode = document.createTextNode(currentText);
        displayEl.appendChild(textNode);
        // append cursor
        displayEl.appendChild(cursorSpan);
      }

      // ============================================================
      //  Core typewriter loop (step by step)
      // ============================================================
      function typewriterStep() {
        // if paused, do nothing (wait for resume)
        if (isPaused) return;

        const fullText = CONFIG.text;
        const typingSpeed = CONFIG.typingSpeed;
        const backspaceSpeed = CONFIG.backspaceSpeed;
        const pauseAfterTyping = CONFIG.pauseAfterTyping;
        const pauseAfterDeleting = CONFIG.pauseAfterDeleting;

        // --- TYPING PHASE ---
        if (!isDeleting && currentText.length < fullText.length) {
          // add next character
          currentText = fullText.substring(0, currentText.length + 1);
          render();

          // schedule next step
          timeoutId = setTimeout(typewriterStep, typingSpeed);
          return;
        }

        // --- FINISHED TYPING: pause then switch to deleting ---
        if (!isDeleting && currentText.length === fullText.length) {
          // full text is shown: pause
          isPaused = true;
          timeoutId = setTimeout(() => {
            isPaused = false;
            isDeleting = true;        // start deleting
            // delete first character immediately (smooth start)
            typewriterStep();
          }, pauseAfterTyping);
          return;
        }

        // --- DELETING PHASE ---
        if (isDeleting && currentText.length > 0) {
          // remove last character
          currentText = currentText.substring(0, currentText.length - 1);
          render();

          // schedule next backspace
          timeoutId = setTimeout(typewriterStep, backspaceSpeed);
          return;
        }

        // --- FINISHED DELETING: pause then restart ---
        if (isDeleting && currentText.length === 0) {
          // all deleted: pause, then reset and type again
          isPaused = true;
          timeoutId = setTimeout(() => {
            isPaused = false;
            isDeleting = false;       // switch back to typing
            // ensure we start from empty
            currentText = '';
            render();
            // start typing again
            typewriterStep();
          }, pauseAfterDeleting);
          return;
        }

        // fallback safety: if we ever get here, restart
        currentText = '';
        isDeleting = false;
        isPaused = false;
        render();
        timeoutId = setTimeout(typewriterStep, 300);
      }

      // ============================================================
      //  Cursor blink control (continuous, independent)
      // ============================================================
      function startCursorBlink() {
        // clear any existing interval
        if (blinkIntervalId) clearInterval(blinkIntervalId);
        
        // use config speed
        blinkIntervalId = setInterval(() => {
          // toggle visibility via class or inline style
          // we use opacity toggling for smoothness
          cursorSpan.style.opacity = cursorSpan.style.opacity === '0' ? '1' : '0';
        }, CONFIG.cursorBlinkSpeed);
      }

      // ============================================================
      //  Initialize: start the typewriter & cursor blink
      // ============================================================
      function init() {
        // clear any pending timeouts from previous runs (just in case)
        if (timeoutId) clearTimeout(timeoutId);
        if (blinkIntervalId) clearInterval(blinkIntervalId);

        // reset state
        currentText = '';
        isDeleting = false;
        isPaused = false;
        cursorSpan.style.opacity = '1';   // start visible

        // render empty + cursor
        render();

        // start cursor blinking (runs continuously)
        startCursorBlink();

        // start typewriter loop (first step after tiny delay for clean start)
        timeoutId = setTimeout(typewriterStep, 120);
      }

      // ============================================================
      //  Optional: if config changes dynamically, we could re-init.
      //  But we just start once.
      // ============================================================
      init();

      // ============================================================
      //  Cleanup on page unload (good practice)
      // ============================================================
      window.addEventListener('beforeunload', function() {
        if (timeoutId) clearTimeout(timeoutId);
        if (blinkIntervalId) clearInterval(blinkIntervalId);
      });

    })();
  </script>
</body>
</html>
