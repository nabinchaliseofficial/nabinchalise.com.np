<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>Join Rotaract! ✦ CTA</title>
  <style>
    /* ---------- Reset & base ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #0b1a2e 0%, #1a2f44 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      padding: 1.5rem;
    }

    /* ---------- Card / container ---------- */
    .cta-wrapper {
      max-width: 900px;
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 4rem 2rem 4rem 2rem;
      padding: 3rem 2rem;
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 215, 0, 0.15);
      text-align: center;
      transition: box-shadow 0.3s;
    }

    .cta-wrapper:hover {
      box-shadow: 0 28px 56px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(255, 215, 0, 0.25);
    }

    /* ---------- Text display ---------- */
    .cta-text {
      display: inline-block;
      font-size: clamp(2.4rem, 12vw, 5.2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #f9f3e7;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 215, 0, 0.2);
      line-height: 1.3;
      transform-origin: center center;
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      transition: text-shadow 0.2s;
      word-break: break-word;
    }

    /* cursor (blinking) */
    .cursor {
      display: inline-block;
      width: 0.08em;
      height: 1.05em;
      background-color: #f9d77e;
      margin-left: 0.04em;
      vertical-align: text-bottom;
      border-radius: 2px;
      box-shadow: 0 0 12px #f9d77e88;
      transition: opacity 0.1s;
    }

    /* cursor hidden state (after cycles) */
    .cursor.hidden-cursor {
      opacity: 0;
      width: 0;
      margin: 0;
      transition: opacity 0.2s, width 0.2s, margin 0.2s;
    }

    /* ---------- responsive fine-tune ---------- */
    @media (max-width: 480px) {
      .cta-wrapper {
        padding: 2rem 1rem;
        border-radius: 2.5rem 1.5rem 2.5rem 1.5rem;
      }
      .cta-text {
        font-size: clamp(2rem, 14vw, 3.2rem);
      }
    }

    @media (min-width: 1200px) {
      .cta-text {
        font-size: 5.8rem;
      }
    }

    /* ---------- utility ---------- */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }
  </style>
</head>
<body>
  <div class="cta-wrapper" role="banner" aria-label="Call to action">
    <div class="cta-text" id="ctaDisplay">
      <!-- text injected by JS, cursor appended -->
    </div>
  </div>

  <script>
    (function() {
      'use strict';

      // ---------- ✦ CUSTOMIZATION VARIABLES (editable) ----------
      const CONFIG = {
        textContent: 'Join Rotaract! 🤝',      // main text
        zoomDuration: 500,                     // ms per zoom cycle (in+out)
        zoomScale: 1.18,                      // scale factor (1.0 → 1.18 → 1.0)
        zoomRepetitions: 5,                   // number of zoom pulses
        typingSpeed: 70,                      // ms per character (typing)
        backspaceSpeed: 40,                   // ms per character (backspace)
        pauseAfterTyping: 2000,               // ms pause after full text
        typewriterRepetitions: 3,             // number of type/backspace cycles
        cursorBlinkSpeed: 480,                // ms cursor blink interval
      };

      // ---------- DOM ref ----------
      const displayEl = document.getElementById('ctaDisplay');

      // ---------- state ----------
      let currentCycle = 0;               // 0..typewriterRepetitions-1
      let isZoomComplete = false;
      let typeTimer = null;
      let backspaceTimer = null;
      let pauseTimer = null;
      let cursorInterval = null;
      let isDeleting = false;
      let currentText = '';
      let targetText = CONFIG.textContent;
      let charIndex = 0;

      // cursor element (created once)
      const cursorSpan = document.createElement('span');
      cursorSpan.className = 'cursor';
      cursorSpan.setAttribute('aria-hidden', 'true');
      cursorSpan.textContent = '|';

      // ---------- helpers ----------
      function clearAllTimers() {
        if (typeTimer) { clearTimeout(typeTimer); typeTimer = null; }
        if (backspaceTimer) { clearTimeout(backspaceTimer); backspaceTimer = null; }
        if (pauseTimer) { clearTimeout(pauseTimer); pauseTimer = null; }
        if (cursorInterval) { clearInterval(cursorInterval); cursorInterval = null; }
      }

      // reset cursor blink (restart interval)
      function startCursorBlink() {
        if (cursorInterval) clearInterval(cursorInterval);
        cursorSpan.style.opacity = '1';
        cursorInterval = setInterval(() => {
          cursorSpan.style.opacity = (cursorSpan.style.opacity === '0' ? '1' : '0');
        }, CONFIG.cursorBlinkSpeed);
      }

      // stop cursor blink & hide cursor permanently
      function stopCursorAndHide() {
        if (cursorInterval) {
          clearInterval(cursorInterval);
          cursorInterval = null;
        }
        cursorSpan.classList.add('hidden-cursor');
        cursorSpan.style.opacity = '0';
      }

      // update displayed text + cursor
      function renderText() {
        displayEl.innerHTML = currentText;
        displayEl.appendChild(cursorSpan);
      }

      // ---------- typewriter: type one character ----------
      function typeChar() {
        if (charIndex < targetText.length) {
          currentText += targetText.charAt(charIndex);
          charIndex++;
          renderText();
          typeTimer = setTimeout(typeChar, CONFIG.typingSpeed);
        } else {
          // full text typed → pause then backspace
          startCursorBlink(); // ensure blinking during pause
          pauseTimer = setTimeout(startBackspace, CONFIG.pauseAfterTyping);
        }
      }

      // ---------- backspace: delete one character ----------
      function backspaceChar() {
        if (currentText.length > 0) {
          currentText = currentText.slice(0, -1);
          charIndex = currentText.length;
          renderText();
          backspaceTimer = setTimeout(backspaceChar, CONFIG.backspaceSpeed);
        } else {
          // fully deleted → increment cycle
          currentCycle++;
          if (currentCycle < CONFIG.typewriterRepetitions) {
            // start next type cycle
            charIndex = 0;
            currentText = '';
            renderText();
            startCursorBlink();
            typeTimer = setTimeout(typeChar, CONFIG.typingSpeed);
          } else {
            // all cycles done → show final text, remove cursor
            currentText = targetText;
            charIndex = targetText.length;
            renderText();
            stopCursorAndHide();
            // remove cursor from DOM (but keep hidden)
            displayEl.innerHTML = currentText; // final text without cursor
            // clean up any leftover timers
            clearAllTimers();
          }
        }
      }

      // start backspace (after pause)
      function startBackspace() {
        pauseTimer = null;
        // set deleting flag if needed, but we just backspace
        if (currentText.length > 0) {
          // stop cursor blink during backspace (optional, keep it subtle)
          if (cursorInterval) {
            clearInterval(cursorInterval);
            cursorInterval = null;
          }
          cursorSpan.style.opacity = '1'; // visible during backspace
          backspaceTimer = setTimeout(backspaceChar, CONFIG.backspaceSpeed);
        } else {
          // edge: if empty, go to next cycle
          currentCycle++;
          if (currentCycle < CONFIG.typewriterRepetitions) {
            charIndex = 0;
            currentText = '';
            renderText();
            startCursorBlink();
            typeTimer = setTimeout(typeChar, CONFIG.typingSpeed);
          } else {
            // final
            currentText = targetText;
            charIndex = targetText.length;
            renderText();
            stopCursorAndHide();
            displayEl.innerHTML = currentText;
            clearAllTimers();
          }
        }
      }

      // ---------- ZOOM animation (CSS based) ----------
      function runZoomSequence() {
        let count = 0;
        const totalZoom = CONFIG.zoomRepetitions;
        const scale = CONFIG.zoomScale;
        const duration = CONFIG.zoomDuration; // ms per full cycle (in+out)

        // ensure no transition interference
        displayEl.style.transition = `transform ${duration/2}ms ease-in-out`;

        function doZoom() {
          if (count >= totalZoom) {
            // zoom complete → start typewriter
            displayEl.style.transition = 'none';
            displayEl.style.transform = 'scale(1)';
            isZoomComplete = true;
            // begin typewriter
            startTypewriter();
            return;
          }

          // zoom in
          displayEl.style.transform = `scale(${scale})`;
          // after half duration, zoom out
          setTimeout(() => {
            displayEl.style.transform = 'scale(1)';
            // after next half, increment and continue
            setTimeout(() => {
              count++;
              doZoom();
            }, duration/2);
          }, duration/2);
        }

        // start first zoom
        displayEl.style.transform = 'scale(1)';
        doZoom();
      }

      // ---------- start typewriter (after zoom) ----------
      function startTypewriter() {
        // reset state
        currentCycle = 0;
        charIndex = 0;
        currentText = '';
        targetText = CONFIG.textContent;

        // make sure cursor is visible and blinking
        cursorSpan.classList.remove('hidden-cursor');
        cursorSpan.style.opacity = '1';
        displayEl.innerHTML = ''; // clear
        displayEl.appendChild(cursorSpan);
        startCursorBlink();

        // begin first type
        typeTimer = setTimeout(typeChar, CONFIG.typingSpeed);
      }

      // ---------- initialise ----------
      function init() {
        // set initial text (empty, with cursor)
        currentText = '';
        displayEl.innerHTML = '';
        displayEl.appendChild(cursorSpan);
        displayEl.style.transform = 'scale(1)';
        displayEl.style.transition = `transform ${CONFIG.zoomDuration/2}ms ease-in-out`;

        // start zoom sequence
        runZoomSequence();
      }

      // ensure clean up on page unload
      window.addEventListener('beforeunload', function() {
        clearAllTimers();
        if (cursorInterval) clearInterval(cursorInterval);
      });

      // go
      init();

    })();
  </script>
</body>
</html>
