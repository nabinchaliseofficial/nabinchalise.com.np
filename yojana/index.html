<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>गलकोट नगरपालिका · प्रवेश पृष्ठ</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ----- CSS Variables (same palette as dashboard) ----- */
        :root {
            --primary: #0F766E;
            --primary-light: #14B8A6;
            --primary-dark: #0D5E58;
            --accent: #F59E0B;
            --bg: #F0F4F8;
            --card: #ffffff;
            --text: #1E293B;
            --text-muted: #64748B;
            --border: #E9ECEF;
            --shadow: 0 20px 48px -12px rgba(15, 118, 110, 0.18), 0 8px 24px -6px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 30px 60px -16px rgba(15, 118, 110, 0.25);
            --radius: 20px;
            --radius-sm: 12px;
            --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            --glass: rgba(255, 255, 255, 0.60);
            --glass-border: rgba(255, 255, 255, 0.30);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans Devanagari', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(circle at 10% 30%, rgba(15, 118, 110, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 90% 70%, rgba(20, 184, 166, 0.04) 0%, transparent 50%);
        }

        /* ----- Login Card (glass + premium) ----- */
        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 40px 32px 36px;
            transition: var(--transition);
            text-align: center;
        }

        .login-card:hover {
            box-shadow: var(--shadow-hover);
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.8rem;
            margin: 0 auto 12px;
            box-shadow: 0 10px 20px -8px rgba(15, 118, 110, 0.30);
        }

        .login-card h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: 4px;
        }

        .login-card .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 28px;
            font-weight: 400;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            padding-bottom: 20px;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 5px;
            letter-spacing: 0.3px;
        }

        .form-group .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 40px;
            transition: var(--transition);
            padding: 0 16px;
        }

        .form-group .input-wrapper:focus-within {
            border-color: var(--primary-light);
            box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.08);
            background: rgba(255, 255, 255, 0.8);
        }

        .form-group .input-wrapper i {
            color: var(--text-muted);
            margin-right: 10px;
            flex-shrink: 0;
        }

        .form-group .input-wrapper input {
            border: none;
            background: transparent;
            padding: 12px 0;
            width: 100%;
            font-size: 0.95rem;
            outline: none;
            color: var(--text);
            font-family: inherit;
        }

        .form-group .input-wrapper input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        .login-btn {
            width: 100%;
            padding: 14px 20px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 8px 18px -6px rgba(15, 118, 110, 0.30);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 24px -8px rgba(15, 118, 110, 0.35);
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: #FEF2F2;
            color: #B91C1C;
            padding: 10px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            gap: 8px;
            border: 1px solid #FECACA;
        }

        .error-msg.show {
            display: flex;
        }

        .footer-note {
            margin-top: 20px;
            font-size: 0.7rem;
            color: var(--text-muted);
            opacity: 0.7;
            letter-spacing: 0.2px;
        }

        .footer-note a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-note a:hover {
            text-decoration: underline;
        }

        /* Loading spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 28px 20px 28px;
            }
            .brand-icon {
                width: 52px;
                height: 52px;
                font-size: 1.4rem;
            }
            .login-card h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-icon">ग</div>
        <h1>गलकोट नगरपालिका</h1>
        <p class="subtitle">योजना खाता प्रणाली · प्रवेश</p>

        <!-- Error message container -->
        <div id="errorMsg" class="error-msg">
            <i data-lucide="alert-circle" size="18"></i>
            <span id="errorText">कृपया सही प्रमाणहरू प्रविष्ट गर्नुहोस्।</span>
        </div>

        <form id="loginForm" autocomplete="off">
            <div class="form-group">
                <label for="email">इमेल ठेगाना</label>
                <div class="input-wrapper">
                    <i data-lucide="mail" size="18"></i>
                    <input type="email" id="email" placeholder="name@example.com" required autofocus />
                </div>
            </div>
            <div class="form-group">
                <label for="password">पासवर्ड</label>
                <div class="input-wrapper">
                    <i data-lucide="lock" size="18"></i>
                    <input type="password" id="password" placeholder="••••••••" required />
                </div>
            </div>
            <button type="submit" class="login-btn" id="loginBtn">
                <span id="btnText">प्रवेश गर्नुहोस्</span>
                <i data-lucide="log-in" size="20" id="btnIcon"></i>
            </button>
        </form>

        <div class="footer-note">
            <span>प्रणाली संस्करण २.० · </span>
            <a href="#" onclick="event.preventDefault(); alert('सम्पर्क: प्रशासन शाखा')">सहायता</a>
        </div>
    </div>

    <script>
        // ---- Initialize Lucide icons ----
        lucide.createIcons();

        // ---- 🔐 SUPABASE CONFIGURATION (कृपया आफ्नो कुञ्जी राख्नुहोस्) ----
        // तपाईंको Supabase project URL र anon key तल राख्नुहोस्।
        const SUPABASE_URL = 'https://your-project.supabase.co'; // <-- यहाँ URL राख्नुहोस्
        const SUPABASE_ANON_KEY = 'your-anon-key'; // <-- यहाँ anon key राख्नुहोस्

        // ---- DOM references ----
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnIcon = document.getElementById('btnIcon');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');

        // ---- Supabase client ----
        let supabase;

        try {
            if (!SUPABASE_URL || SUPABASE_URL === 'https://your-project.supabase.co' ||
                !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY === 'your-anon-key') {
                throw new Error('कृपया index.html मा SUPABASE_URL र SUPABASE_ANON_KEY सेट गर्नुहोस्।');
            }
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        } catch (err) {
            console.error('Supabase init error:', err);
            showError('Supabase कन्फिगरेसन मिलेन। कृपया प्रशासकलाई सम्पर्क गर्नुहोस्।');
        }

        // ---- Check existing session & redirect ----
        async function checkSession() {
            if (!supabase) return;
            const { data: { session }, error } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'adminindex.html';
            }
        }
        checkSession();

        // ---- Show error helper ----
        function showError(msg) {
            errorText.textContent = msg;
            errorMsg.classList.add('show');
            // Auto-hide after 5s
            clearTimeout(window.errorTimeout);
            window.errorTimeout = setTimeout(() => {
                errorMsg.classList.remove('show');
            }, 5000);
        }

        // ---- Login handler ----
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Hide previous error
            errorMsg.classList.remove('show');

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('कृपया इमेल र पासवर्ड दुवै भर्नुहोस्।');
                return;
            }

            if (!supabase) {
                showError('Supabase क्लाइन्ट सुरु भएन।');
                return;
            }

            // Disable button & show spinner
            loginBtn.disabled = true;
            btnText.textContent = 'प्रवेश गर्दै...';
            btnIcon.innerHTML = '<span class="spinner"></span>';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password,
                });

                if (error) {
                    // Handle specific errors
                    if (error.message.includes('Invalid login credentials')) {
                        showError('इमेल वा पासवर्ड मिलेन। कृपया पुन: प्रयास गर्नुहोस्।');
                    } else {
                        showError(error.message || 'लगइन असफल भयो।');
                    }
                    throw error; // to trigger catch
                }

                // Success: redirect to admin dashboard
                window.location.href = 'adminindex.html';

            } catch (err) {
                // Error already shown; just re-enable button
                console.error('Login error:', err);
            } finally {
                // Reset button state (only if not redirected)
                if (!window.location.href.includes('adminindex.html')) {
                    loginBtn.disabled = false;
                    btnText.textContent = 'प्रवेश गर्नुहोस्';
                    btnIcon.innerHTML = '<i data-lucide="log-in" size="20"></i>';
                    lucide.createIcons(); // re-render icon
                }
            }
        });

        // ---- Optional: Enter key triggers submit (already via form) ----

        // ---- Demo: prefill for testing (remove in production) ----
        // You can fill test credentials if you want:
        // emailInput.value = 'test@example.com';
        // passwordInput.value = 'password123';
    </script>
</body>
</html>
