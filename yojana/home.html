<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>योजना खाता - गलकोट नगरपालिका</title>
    <style>
        body {
            font-family: 'Poppins', 'Mukta', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 800px;
            background: #ffffff;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border-top: 6px solid #2e7d32;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 15px;
        }
        .header h2 {
            color: #1b5e20;
            margin: 0;
            font-size: 26px;
            font-weight: 700;
        }
        .header h4 {
            color: #388e3c;
            margin: 5px 0;
            font-size: 16px;
        }
        .header p {
            color: #555;
            margin: 2px 0;
            font-size: 14px;
        }
        .title-badge {
            display: inline-block;
            background: #e8f5e9;
            color: #2e7d32;
            padding: 8px 25px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 10px;
            border: 1px dashed #a5d6a7;
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        .form-group label {
            font-weight: 600;
            color: #37474f;
            margin-right: 10px;
            min-width: 180px;
        }
        .dots {
            flex-grow: 1;
            border-bottom: 1px dotted #90a4ae;
            height: 20px;
        }
        .section-title {
            background: #e3f2fd;
            color: #0d47a1;
            padding: 8px 12px;
            border-left: 4px solid #1976d2;
            font-weight: bold;
            margin: 20px 0 10px 0;
            border-radius: 0 4px 4px 0;
            font-size: 15px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .note {
            background: #fff8e1;
            border-left: 4px solid #ffb300;
            padding: 12px;
            margin-top: 25px;
            border-radius: 4px;
            font-size: 13px;
            color: #5d4037;
            line-height: 1.5;
        }
        .note strong {
            color: #f57f17;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>गलकोट नगरपालिका</h2>
        <h4>नगर कार्यपालिकाको कार्यालय</h4>
        <p>गण्डकी प्रदेश, बाग्लुङ</p>
        <div class="title-badge">योजना खाता</div>
    </div>

    <div class="form-group">
        <label>योजनाको नाम:</label>
        <div class="dots"></div>
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label>वार्ड नं.:</label>
            <div class="dots"></div>
        </div>
        <div class="form-group">
            <label>मार्ग/टोल:</label>
            <div class="dots"></div>
        </div>
    </div>

    <div class="form-group">
        <label>योजनाको कूल लागत:</label>
        <div class="dots"></div>
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label>योजना सम्झौता मिति:</label>
            <div class="dots"></div>
        </div>
        <div class="form-group">
            <label>योजना सुरु हुने मिति:</label>
            <div class="dots"></div>
        </div>
    </div>

    <div class="form-group">
        <label>योजना सम्पन्न हुने मिति:</label>
        <div class="dots"></div>
    </div>

    <div class="section-title">योजना निरीक्षण गर्ने</div>

    <div class="form-group">
        <label>ईन्जिनियरको नाम:</label>
        <div class="dots"></div>
    </div>
    <div class="form-group">
        <label>सव. ई. को नाम:</label>
        <div class="dots"></div>
    </div>
    <div class="form-group">
        <label>सुपरभाईजरको नाम:</label>
        <div class="dots"></div>
    </div>

    <div class="form-group">
        <label>सहभागिताको योगदान: न.पा.</label>
        <div class="dots" style="max-width: 150px; flex-grow: 0; margin-right: 15px;"></div>
        <label style="min-width: auto; margin-right: 10px;">उपभोक्ता</label>
        <div class="dots"></div>
    </div>

    <div class="section-title">अन्य साझेदार</div>

    <div class="grid-2">
        <div class="form-group">
            <label>(क) निजीक्षेत्र</label>
            <div class="dots"></div>
        </div>
        <div class="form-group">
            <label>(ख) गैर सरकारी (राष्ट्रिय/अन्तर्राष्ट्रिय)</label>
            <div class="dots"></div>
        </div>
    </div>

    <div class="grid-2">
        <div class="form-group">
            <label>(ग) विषयगत कार्यालय</label>
            <div class="dots"></div>
        </div>
        <div class="form-group">
            <label>(घ) अन्य साझेदार</label>
            <div class="dots"></div>
        </div>
    </div>

    <div class="form-group" style="margin-top: 20px;">
        <label>जम्मा रु.</label>
        <div class="dots" style="max-width: 200px; flex-grow: 0; margin-right: 15px;"></div>
        <label style="min-width: auto; margin-right: 10px;">/- (अक्षरुपी):</label>
        <div class="dots"></div>
    </div>

    <div class="note">
        <strong>नोट:-</strong> योगदान उपलब्ध गराउने साझेदारहरूको सहयोगको विवरण जस्तै:- नगद, श्रम, जिन्सी प्राविधिक सेवा आदि के हो सो को स्पष्ट जानकारी गराउनु पर्नेछ।
    </div>
</div>

</body>
</html>
