<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Noto Sans Devanagari', system-ui, sans-serif;
            background: #F8FAFC;
            color: #1E293B;
            display: flex;
            height: 100vh;
            overflow: hidden;

        }
        .sidebar {
            width: 270px;
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 4px 0 20px -8px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            height: 100vh;
            flex-shrink: 0;
            overflow: hidden;
            z-index: 10;
        }
        .sidebar-brand {
            padding: 24px 20px 16px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brand-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #0F766E, #14B8A6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 8px 16px -6px rgba(15, 118, 110, 0.3);
        }
        .brand-text h2 {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .brand-text span {
            font-size: 0.7rem;
            color: #475569;
        }
        .menu-container {
            flex: 1;
            overflow-y: auto;
            padding: 18px 12px 20px;
        }
        .menu-group {
            margin-bottom: 20px;
        }
        .menu-group-title {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #475569;
            font-weight: 600;
            padding: 0 12px 6px;
            opacity: 0.6;
        }
        .menu-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .menu-list li a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1E293B;
            text-decoration: none;
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            background: transparent;
            border: none;
            width: 100%;
            cursor: pointer;
        }
        .menu-list li a i {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #475569;
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            flex-shrink: 0;
        }
        .menu-list li a.active {
            background: linear-gradient(135deg, rgba(15, 118, 110, 0.10), rgba(20, 184, 166, 0.08));
            color: #0F766E;
            font-weight: 600;
            box-shadow: inset 0 0 0 1px rgba(15, 118, 110, 0.08);
        }
        .menu-list li a.active i {
            color: #0F766E;
        }
        .menu-list li a.active::before {
            content: '';
            position: absolute;
            left: 6px;
            top: 20%;
            height: 60%;
            width: 4px;
            background: linear-gradient(180deg, #0F766E, #14B8A6);
            border-radius: 8px;
        }
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: #F8FAFC;
        }
        .topnav {
            background: rgba(255, 255, 255, 0.70);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.25);
            padding: 12px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 20px;
            flex-wrap: wrap;
        }
        .topnav-left .page-title {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #1E293B;
        }
        .topnav-center {
            flex: 1;
            max-width: 380px;
            min-width: 140px;
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 0 16px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .topnav-center input {
            border: none;
            background: transparent;
            padding: 10px 0;
            font-size: 0.9rem;
            width: 100%;
            outline: none;
            color: #1E293B;
        }
        .topnav-center input::placeholder {
            color: #475569;
            opacity: 0.6;
        }
        .topnav-right {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 40px;
            background: linear-gradient(135deg, #0F766E, #14B8A6);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .content-wrapper {
            flex: 1;
            padding: 20px 28px 28px;
            overflow: auto;
            background: #F8FAFC;
        }
        .content-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 18px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.25);
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 480px;
        }
        .content-card iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
            border-radius: 18px;
        }
        .card-header {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.03);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(4px);
            border-radius: 18px 18px 0 0;
        }
        .card-header .breadcrumb {
            font-size: 0.8rem;
            color: #475569;
        }
        .card-header .breadcrumb span {
            color: #1E293B;
            font-weight: 500;
        }
        .sidebar-footer {
            padding: 16px 20px 24px;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            margin-top: auto;
        }
        .logout-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #b91c1c;
            background: rgba(185, 28, 28, 0.06);
            border: 1px solid rgba(185, 28, 28, 0.10);
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            width: 100%;
            font-family: inherit;
        }
        .logout-btn:hover {
            background: rgba(185, 28, 28, 0.12);
            border-color: rgba(185, 28, 28, 0.20);
        }
        @media (max-width: 700px) {
            .sidebar {
                width: 68px;
            }
            .sidebar-brand .brand-text,
            .menu-group-title,
            .menu-list li a .menu-label,
            .sidebar-footer .logout-btn span {
                display: none;
            }
            .menu-list li a {
                justify-content: center;
                padding: 12px;
            }
            .menu-list li a i {
                margin: 0;
            }
            .logout-btn {
                justify-content: center;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">ग</div>
            <div class="brand-text">
                <h2>गलकोट नगरपालिका</h2>
                <span>योजना खाता प्रणाली</span>
            </div>
        </div>
        <div class="menu-container">
            <div class="menu-group">
                <div class="menu-group-title">मुख्य</div>
                <ul class="menu-list">
                    <li><a href="home.html" target="contentFrame" class="active"><i data-lucide="layout-dashboard"></i><span class="menu-label">गृह पृष्ठ</span></a></li>
                </ul>
            </div>
            <div class="menu-group">
                <div class="menu-group-title">योजना व्यवस्थापन</div>
                <ul class="menu-list">
                    <li><a href="background.html" target="contentFrame"><i data-lucide="file-text"></i><span class="menu-label">पृष्ठभूमि</span></a></li>
                    <li><a href="user_committee.html" target="contentFrame"><i data-lucide="users"></i><span class="menu-label">उपभोक्ता समिति</span></a></li>
                </ul>
            </div>
        </div>
        <div class="sidebar-footer">
            <button class="logout-btn" id="logoutBtn">
                <i data-lucide="log-out"></i>
                <span>लगआउट गर्नुहोस्</span>
            </button>
        </div>
    </aside>

    <div class="main-container">
        <nav class="topnav">
            <div class="topnav-left">
                <span class="page-title" id="pageTitle">गृह पृष्ठ</span>
            </div>
            <div class="topnav-center">
                <i data-lucide="search" size="18"></i>
                <input type="text" placeholder="योजना खोज्नुहोस्..." />
            </div>
            <div class="topnav-right">
                <div class="avatar">ग</div>
            </div>
        </nav>
        <div class="content-wrapper">
            <div class="content-card">
                <div class="card-header">
                    <div class="breadcrumb"><i data-lucide="home" size="14"></i> / <span id="breadcrumbLabel">गृह पृष्ठ</span></div>
                </div>
                <iframe src="home.html" name="contentFrame" id="contentFrame"></iframe>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        // SUPABASE CONFIG
        // ============================================================
        const SUPABASE_URL = 'https://kbyfvqkfcxqgjjtfvvxf.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-bOiDndDXdz_FgXq1MFkag_ioCcg8nv';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ============================================================
        // CHECK SESSION
        // ============================================================
        async function checkAuth() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) {
                    window.location.replace('index.html');
                    return false;
                }
                return true;
            } catch (err) {
                window.location.replace('index.html');
                return false;
            }
        }
        checkAuth();

        // ============================================================
        // LOGOUT - MULTIPLE APPROACHES
        // ============================================================
        async function logoutUser() {
            try {
                // 1. Call Supabase signOut
                await supabase.auth.signOut();

                // 2. Call custom RPC to deactivate session (if table exists)
                try {
                    const { error } = await supabase.rpc('cleanup_expired_sessions');
                    if (error) console.warn('RPC error (ignored):', error);
                } catch (e) { /* ignore */ }

                // 3. Clear ALL local storage
                localStorage.clear();
                sessionStorage.clear();

                // 4. Clear cookies
                document.cookie.split(";").forEach(function(c) {
                    document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() +
                    ";path=/");
                });

                // 5. Clear IndexedDB (if any)
                if (window.indexedDB) {
                    try {
                        const dbs = await window.indexedDB.databases();
                        dbs.forEach(db => {
                            if (db.name) window.indexedDB.deleteDatabase(db.name);
                        });
                    } catch (e) { /* ignore */ }
                }

                // 6. Force redirect
                window.location.replace('index.html');

            } catch (err) {
                console.error('Logout error:', err);
                // Force redirect even on error
                window.location.replace('index.html');
            }
        }

        // ============================================================
        // LOGOUT BUTTON - EXTREME RELIABILITY
        // ============================================================
        const logoutBtn = document.getElementById('logoutBtn');

        // Method 1: Click
        logoutBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            logoutUser();
        });

        // Method 2: Touch
        logoutBtn.addEventListener('touchstart', function(e) {
            e.preventDefault();
            e.stopPropagation();
            logoutUser();
        });

        // Method 3: Direct onclick (fallback)
        logoutBtn.onclick = function() {
            logoutUser();
            return false;
        };

        // Method 4: mousedown (immediate)
        logoutBtn.addEventListener('mousedown', function(e) {
            e.preventDefault();
        });

        // ============================================================
        // INACTIVITY TIMER - 5 MINUTES
        // ============================================================
        let inactivityTimer = null;
        const INACTIVITY_LIMIT = 5 * 60 * 1000;

        function resetInactivityTimer() {
            if (inactivityTimer) clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(() => {
                logoutUser();
            }, INACTIVITY_LIMIT);
        }

        const events = ['mousedown', 'keydown', 'scroll', 'touchstart', 'click', 'mousemove', 'focus'];
        events.forEach(evt => document.addEventListener(evt, resetInactivityTimer));
        resetInactivityTimer();

        // ============================================================
        // PERIODIC SESSION CHECK (every 15 seconds)
        // ============================================================
        setInterval(async function() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) {
                    window.location.replace('index.html');
                }
            } catch (err) {
                window.location.replace('index.html');
            }
        }, 15000);

        // ============================================================
        // NAVIGATION
        // ============================================================
        const links = document.querySelectorAll('.menu-list li a');
        const pageTitle = document.getElementById('pageTitle');
        const breadcrumbLabel = document.getElementById('breadcrumbLabel');

        links.forEach(link => {
            link.addEventListener('click', function() {
                links.forEach(l => l.classList.remove('active'));
                this.classList.add('active');
                const label = this.querySelector('.menu-label');
                const title = label ? label.textContent : this.textContent.trim();
                pageTitle.textContent = title;
                breadcrumbLabel.textContent = title;
                resetInactivityTimer();
            });
        });

        // Init Lucide
        lucide.createIcons();

        console.log('✅ Logout with SQL integration complete');
        console.log('📌 SQL tables created: user_sessions, active_sessions view');
        console.log('📌 Auto-cleanup: expired sessions every hour');
        console.log('📌 Inactivity: 5 minutes auto-logout');
    </script>

</body>
</html>
