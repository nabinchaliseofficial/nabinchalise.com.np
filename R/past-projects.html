    // Engine to compile metrics dynamically out of pastProjects data array
    function calculateStatistics() {
        const totalCount = pastProjects.length;
        const yearMetrics = {};
        const avenueMetrics = {};

        pastProjects.forEach(project => {
            // Compute Year Counts
            yearMetrics[project.ry] = (yearMetrics[project.ry] || 0) + 1;
            // Compute Avenue Counts
            avenueMetrics[project.avenue] = (avenueMetrics[project.avenue] || 0) + 1;
        });

        // Update total counter element
        document.getElementById('stat-total-count').innerText = totalCount;

        // Render Year Grid UI
        const yearsGrid = document.getElementById('stat-years-grid');
        yearsGrid.innerHTML = '';
        // Sort years descending
        Object.keys(yearMetrics).sort((a,b) => b.localeCompare(a)).forEach(year => {
            yearsGrid.innerHTML += `
                <div class="stat-item">
                    <span class="label">R.Y. ${year}</span>
                    <span class="count">${yearMetrics[year]}</span>
                </div>
            `;
        });

        // Render Avenues Grid UI
        const avenuesGrid = document.getElementById('stat-avenues-grid');
        avenuesGrid.innerHTML = '';
        // Sort by highest project count first
        Object.keys(avenueMetrics).sort((a,b) => avenueMetrics[b] - avenueMetrics[a]).forEach(ave => {
            venuesGrid.innerHTML += `
                <div class="stat-item">
                    <span class="label" title="${ave}">${ave}</span>
                    <span class="count">${avenueMetrics[ave]}</span>
                </div>
            `;
        });
    }

    function renderTable(dataset) {
        const tableBody = document.getElementById('projects-table-body');
        tableBody.innerHTML = '';

        if(dataset.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#7f8c8d; padding: 30px;">No historical logs found for the selected criteria.</td></tr>`;
            return;
        }

        dataset.forEach(project => {
            const row = document.createElement('tr');
            row.className = 'project-row';
            row.innerHTML = `
                <td style="font-weight: 600; color: var(--dark-color);">${project.name}</td>
                <td><span class="ry-badge">R.Y. ${project.ry}</span></td>
                <td><span class="avenue-badge">${project.avenue}</span></td>
                <td>📍 ${project.location}</td>
                <td style="font-weight: bold; color: #2E7D32;">${project.cost}</td>
            `;
            tableBody.appendChild(row);
        });
    }

    function filterEngine() {
        const selectedYear = document.getElementById('year-select').value;
        const selectedAvenue = document.getElementById('avenue-select').value;

        let filteredData = pastProjects;

        if (selectedYear !== 'all') {
            filteredData = filteredData.filter(p => p.ry === selectedYear);
        }

        if (selectedAvenue !== 'all') {
            filteredData = filteredData.filter(p => p.avenue === selectedAvenue);
        }

        renderTable(filteredData);
    }

    window.onload = () => {
        calculateStatistics();
        renderTable(pastProjects);
    };

    document.getElementById('interactiveHomeBtn').addEventListener('click', function(e) {
        // 1. Prevent instant page jump so the user actually sees the animation
        e.preventDefault();
        const targetUrl = this.getAttribute('href');
        const button = this;

        // 2. Create the ink ripple element right where the cursor clicked
        const ripple = document.createElement('span');
        ripple.classList.add('ripple');
        
        // Calculate click coordinates relative to button dimensions
        const rect = button.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = `${size}px`;
        ripple.style.left = `${e.clientX - rect.left - size / 2}px`;
        ripple.style.top = `${e.clientY - rect.top - size / 2}px`;
        
        button.appendChild(ripple);

        // 3. Trigger the button's shrinking/exit animation sequence
        button.classList.add('clicked-exit');

        // 4. Redirect to home page exactly when the animation reaches its exit point
        setTimeout(() => {
            window.location.href = targetUrl;
        }, 450); // Matches the visual completion curve of our CSS keyframes
    });
