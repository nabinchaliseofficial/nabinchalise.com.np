                <!-- HOME BUTTON SCRIPT -->
                <script>
                    document.getElementById('interactiveHomeBtn').addEventListener('click', function(e) {
                        e.preventDefault();
                        const targetUrl = this.getAttribute('href');
                        const button = this;

                        const ripple = document.createElement('span');
                        ripple.classList.add('ripple');
                        
                        const rect = button.getBoundingClientRect();
                        const size = Math.max(rect.width, rect.height);
                        ripple.style.width = ripple.style.height = `${size}px`;
                        ripple.style.left = `${e.clientX - rect.left - size / 2}px`;
                        ripple.style.top = `${e.clientY - rect.top - size / 2}px`;
                        
                        button.appendChild(ripple);
                        button.classList.add('clicked-exit');

                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 450);
                    });
                </script>

        // Format and clean names so EVERY user is uniformly titled "Rtr. [Clean Name]"
        const members = rawMembers.map(member => {
            let cleanName = member.name.replace(/^Rtr\.?\s+/i, '').trim();
            return {
                ...member,
                name: `Rtr. ${cleanName}`
            };
        });

        // Renders primary database layout to UI cards
        const renderMembers = (query = '', filter = 'all') => {
            const resultsContainer = document.getElementById('results-container');
            resultsContainer.innerHTML = '';
            const cleanQuery = query.toLowerCase().trim();

            const filteredMembers = members.filter(member => {
                const matchesQuery = Object.values(member).some(value =>
                    String(value).toLowerCase().includes(cleanQuery)
                );
                
                const designation = member.designation.toLowerCase();
                const profession = member.profession.toLowerCase();

                let matchesFilter = false;
                if (filter === 'all') matchesFilter = true;
                else if (filter === 'executive') {
                    matchesFilter = !designation.includes('club member');
                } else if (filter === 'teacher') {
                    matchesFilter = profession.includes('teacher') || profession.includes('teaching') || profession.includes('lecturer');
                } else if (filter === 'student') {
                    matchesFilter = profession.includes('student');
                } else if (filter === 'business') {
                    matchesFilter = profession.includes('business') || profession.includes('entrepreneur') || profession.includes('shopkeeper');
                }

                return matchesQuery && matchesFilter;
            });

            if (filteredMembers.length > 0) {
                filteredMembers.forEach(member => {
                    const memberCard = document.createElement('div');
                    memberCard.className = 'member-card bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex flex-col items-center text-center transition-all duration-300 ease-in-out';

                            <p class="text-xs text-gray-600"><span class="text-gray-400 font-medium">Profession:</span> ${member.profession || 'N/A'}</p>
                            <p class="text-xs text-gray-600"><span class="text-gray-400 font-medium">Address:</span> ${member.address}</p>
                            <p class="text-xs text-gray-600 truncate"><span class="text-gray-400 font-medium">Email:</span> ${member.email || 'N/A'}</p>
                            <p class="text-xs text-gray-600"><span class="text-gray-400 font-medium">Phone:</span> ${member.phone || 'N/A'}</p>
                        </div>
                        
                        <div class="flex justify-between mt-4 w-full border-t border-gray-50 pt-3">
                            <span class="text-[10px] uppercase font-bold tracking-wider px-2.5 py-1 bg-gray-100 text-gray-600 rounded-lg">${member.gender || 'Male'}</span>
                            <span class="text-[10px] uppercase font-bold tracking-wider px-2.5 py-1 bg-red-50 text-red-700 rounded-lg">${member.bloodGroup || 'Unknown'}</span>
                        </div>
                    `;
                    resultsContainer.appendChild(memberCard);
                });
            } else {
                resultsContainer.innerHTML = '<div class="text-center text-gray-500 py-12 col-span-full bg-white rounded-2xl border border-gray-100">No members match the query filters.</div>';

        // Processes birthdays and dynamically builds WhatsApp links with precise message layouts
        const renderBirthdays = () => {
            const nearestBirthdaysContainer = document.getElementById('nearest-birthdays');
            nearestBirthdaysContainer.innerHTML = '';
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const birthdays = members.map(member => {
                if (!member.dob) return null;
                
                const parts = member.dob.split('/');
                if (parts.length !== 3) return null;
                
                const birthMonth = parseInt(parts[0], 10) - 1;
                const birthDay = parseInt(parts[1], 10);
                
                let nextBirthday = new Date(today.getFullYear(), birthMonth, birthDay);
                
                if (nextBirthday < today) {
                    nextBirthday.setFullYear(today.getFullYear() + 1);
                }

                const diffTime = nextBirthday - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                const isToday = today.getMonth() === birthMonth && today.getDate() === birthDay;

                return { ...member, nextBirthday, diffDays, isToday };
            }).filter(Boolean).sort((a, b) => a.diffDays - b.diffDays);

            const upcomingBirthdays = birthdays.slice(0, 5);

            if (upcomingBirthdays.length > 0) {
                upcomingBirthdays.forEach(member => {
                    const birthdayElement = document.createElement('div');
                    birthdayElement.className = `p-3 rounded-xl flex items-center justify-between gap-2 shadow-sm ${member.isToday ? 'today-birthday-card' : 'birthday-card'}`;
                    
                    const formattedDate = member.nextBirthday.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    const statusMessage = member.isToday ? 'Today! 🎂' : `in ${member.diffDays} days`;

                    // Isolate clean name parameter for the specific message template injection logic
                    const plainName = member.name.replace(/^Rtr\.?\s+/i, '').trim();

                    // Formulates the raw string directly to avoid URL encoding character failures
                    const messageText = 
                        `Happy Birthday, Rtr. ${plainName}!\n\n` +
                        `Wishing you a very Happy Birthday and a wonderful year ahead filled with success, good health, happiness, and countless achievements.\n\n` +
                        `Thank you for your dedicated service and valuable contributions as our ${member.designation}. Your commitment and enthusiasm continue to inspire our club.\n\n` +
                        `May your special day be filled with joy, laughter, and unforgettable memories. Have an amazing celebration!`;

                    const whatsappUrl = member.phone ? `https://wa.me/977${member.phone}?text=${encodeURIComponent(messageText)}` : '#';

                    birthdayElement.innerHTML = `
                        <div class="flex items-center min-w-0 flex-grow">
                            <div class="flex-shrink-0 w-9 h-9 rounded-full ${member.isToday ? 'bg-red-500 text-white' : 'bg-blue-500 text-white'} flex items-center justify-center font-bold text-xs shadow-sm">
                                ${member.nextBirthday.getDate()}
                            </div>
                            <div class="ml-2.5 min-w-0">
                                <h4 class="font-bold text-gray-900 text-xs truncate">${member.name}</h4>
                                <p class="text-[11px] text-gray-500 truncate mt-0.5">${member.designation}${member.profession ? ` (${member.profession})` : ''}</p>
                                <p class="text-[10px] font-bold ${member.isToday ? 'text-red-600' : 'text-blue-600'} mt-0.5">${statusMessage} — ${formattedDate}</p>
                            </div>
                        </div>
                        <div class="flex-shrink-0">
                            ${member.phone ? `
                            <a href="${whatsappUrl}" target="_blank" class="inline-flex items-center justify-center px-2.5 py-1.5 text-[11px] font-bold text-white bg-emerald-600 hover:bg-emerald-700 transition-colors rounded-lg shadow-sm whitespace-nowrap">
                                Wish 🍰
                            </a>` : `
                            <span class="inline-flex items-center justify-center px-2.5 py-1.5 text-[11px] font-bold text-gray-400 bg-gray-100 rounded-lg cursor-not-allowed">No No.</span>
                            `}
                        </div>
                    `;
                    nearestBirthdaysContainer.appendChild(birthdayElement);
                });
            } else {
                nearestBirthdaysContainer.innerHTML = '<p class="text-center text-xs text-gray-400 py-4">No upcoming birthdays.</p>';
            }
        };

        // Redraws blood index aggregations counters
        const renderBloodGroupCounts = () => {
            const bloodCountsContainer = document.getElementById('blood-group-counts');
            bloodCountsContainer.innerHTML = '';
            
            const bloodGroups = members.reduce((counts, member) => {
                if(member.bloodGroup && member.bloodGroup !== 'N/A' && member.bloodGroup !== 'Unknown') {
                    let group = member.bloodGroup.toUpperCase().trim();
                    if (group) counts[group] = (counts[group] || 0) + 1;
                }
                return counts;
            }, {});

            const order = ['O+', 'A+', 'B+', 'AB+', 'O-', 'A-', 'B-', 'AB-'];
            const sortedBloodGroups = Object.entries(bloodGroups).sort(([a], [b]) => {
                return (order.indexOf(a) !== -1 ? order.indexOf(a) : 99) - (order.indexOf(b) !== -1 ? order.indexOf(b) : 99);
            });

            sortedBloodGroups.forEach(([group, count]) => {
                const bloodGroupElement = document.createElement('div');
                bloodGroupElement.className = 'p-2.5 bg-red-50 rounded-xl text-center border border-red-100/50 shadow-sm';
                bloodGroupElement.innerHTML = `
                    <div class="font-extrabold text-red-700 text-base">${count}</div>
                    <div class="text-[10px] font-bold text-red-400 uppercase tracking-wider">${group}</div>
                `;
                bloodCountsContainer.appendChild(bloodGroupElement);
            });
        };

        // Engine Event Loop Bindings Initialization
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            const filterButtons = document.querySelectorAll('.filter-btn');
            const homeBtn = document.getElementById('homeBtn');
            
            renderMembers();
            renderBirthdays();
            renderBloodGroupCounts();
            
            // Search Input Event
            searchInput.addEventListener('input', (event) => {
                const query = event.target.value;
                const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
                renderMembers(query, activeFilter);
            });
            
            // Filter Buttons Event
            filterButtons.forEach(button => {
                button.addEventListener('click', () => {
                    filterButtons.forEach(btn => btn.classList.remove('active', 'bg-indigo-600', 'text-white', 'shadow-sm'));
                    filterButtons.forEach(btn => btn.classList.add('bg-gray-200', 'text-gray-800'));
                    
                    button.classList.remove('bg-gray-200', 'text-gray-800');
                    button.classList.add('active', 'bg-indigo-600', 'text-white', 'shadow-sm');
                    
                    const filter = button.dataset.filter;
                    const query = searchInput.value;
                    renderMembers(query, filter);
                });
            });

            // Home Branding reset behavior triggers
            homeBtn.addEventListener('click', () => {
                searchInput.value = '';
                filterButtons.forEach(btn => btn.classList.remove('active', 'bg-indigo-600', 'text-white', 'shadow-sm'));
                filterButtons.forEach(btn => btn.classList.add('bg-gray-200', 'text-gray-800'));
                
                const allBtn = document.querySelector('.filter-btn[data-filter="all"]');
                allBtn.classList.remove('bg-gray-200', 'text-gray-800');
                allBtn.classList.add('active', 'bg-indigo-600', 'text-white', 'shadow-sm');
                
                renderMembers('', 'all');
            });
        });
    </script>
</body>
</html>
