<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inquiries Management</title>
    <meta name="description" content="Manage contact form inquiries." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        /* --- BASE VARIABLES --- */
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --cls-personal: #38bdf8;
            --cls-professional: #34d399;
            --cls-galkot: #fbbf24;
            --cls-rotaract: #f43f5e;
            --cls-links: #a78bfa;
            --primary: #D70060;
            --secondary: #015491;
            --cta-logout: #ef4444;
            --cta-logout-hover: #dc2626;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-dark: #f8fafc;
                --bg-card: rgba(255, 255, 255, 0.8);
                --border-color: rgba(0, 0, 0, 0.08);
                --text-main: #0f172a;
                --text-muted: #64748b;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(244, 63, 94, 0.03) 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition-smooth);
        }
        .navbar.scrolled {
            padding: 0.6rem 2rem;
            background: rgba(15, 23, 42, 0.95);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .nav-logo {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-logo i {
            color: var(--cls-personal);
        }
        .nav-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
        .btn-back {
            background: var(--cls-galkot);
            color: #000 !important;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            text-decoration: none;
            min-height: 44px;
        }
        .btn-back:hover {
            background: #e5a800;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.3);
        }
        .btn-logout {
            background: var(--cta-logout);
            color: #ffffff !important;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            text-decoration: none;
            min-height: 44px;
        }
        .btn-logout:hover {
            background: var(--cta-logout-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        /* --- HERO --- */
        .hero {
            padding: 8rem 2rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(to right, var(--cls-personal), var(--cls-links));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 650px;
            margin: 0 auto;
        }

        /* --- WORKSPACE SECTION --- */
        .workspace-section {
            max-width: 1200px;
            margin: 0 auto 3rem;
            padding: 0 2rem;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.75rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .panel-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .panel-header h2 i {
            color: var(--cls-personal);
        }
        .panel-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            font-family: 'Inter', sans-serif;
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .clear-btn-accent {
            border-color: rgba(239, 68, 68, 0.25) !important;
        }
        .clear-btn-accent:hover {
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: rgba(239, 68, 68, 0.6) !important;
        }
        .btn-primary-accent {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff !important;
        }
        .btn-primary-accent:hover {
            background: #b50051;
            border-color: #b50051;
        }

        .inquiries-feed {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }
        .inquiry-node {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--cls-personal);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .node-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .node-sender {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-main);
        }
        .node-email {
            font-size: 0.9rem;
            color: var(--cls-personal);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .node-message {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: 10px;
            font-size: 0.95rem;
            color: rgba(248, 250, 252, 0.9);
            white-space: pre-wrap;
        }
        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .action-btn-sm {
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition-smooth);
            font-family: 'Inter', sans-serif;
        }
        .action-btn-sm.approve-btn {
            background: #34d399;
            color: #000;
        }
        .action-btn-sm.approve-btn:hover {
            background: #2bbf8a;
        }
        .action-btn-sm.reject-btn {
            background: #ef4444;
            color: #fff;
        }
        .action-btn-sm.reject-btn:hover {
            background: #dc2626;
        }
        .action-btn-sm.delete-btn {
            background: #f43f5e;
            color: #fff;
        }
        .action-btn-sm.delete-btn:hover {
            background: #e11d48;
        }
        .application-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-new {
            background: #3b82f6;
            color: #fff;
        }
        .status-read {
            background: #34d399;
            color: #000;
        }
        .status-replied {
            background: #8b5cf6;
            color: #fff;
        }
        .status-archived {
            background: #64748b;
            color: #fff;
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
            .inquiries-feed {
                grid-template-columns: 1fr;
            }
            .navbar {
                padding: 0.75rem 1rem;
            }
            .workspace-section {
                padding: 0 1rem;
            }
            .panel-header {
                flex-direction: column;
                align-items: stretch;
            }
            .panel-actions {
                flex-wrap: wrap;
            }
            .nav-actions {
                flex-wrap: wrap;
            }
            .btn-back,
            .btn-logout {
                font-size: 0.75rem;
                padding: 0.4rem 0.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar" id="navbar" aria-label="Main Navigation">
        <a href="#" class="nav-logo">
            <i class="fa-solid fa-envelope" aria-hidden="true"></i> Inquiries Management
        </a>
        <div class="nav-actions">
            <button class="btn-back" id="backToAdminBtn">
                <i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back to Admin
            </button>
            <button class="btn-logout" id="logout-btn">
                <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i> Log Out
            </button>
        </div>
    </nav>

    <!-- ===== HERO ===== -->
    <header class="hero">
        <h1><i class="fa-solid fa-envelope" style="color:var(--cls-personal);"></i> Inquiries Management</h1>
        <p>View, manage, and respond to all contact form inquiries in one place.</p>
    </header>

    <!-- ===== INQUIRIES ===== -->
    <section class="workspace-section" id="inquiries-panel">
        <div class="panel-header">
            <h2><i class="fa-solid fa-envelope" aria-hidden="true" style="color: var(--cls-personal);"></i> Contact Form Inquiries</h2>
            <div class="panel-actions">
                <button class="action-btn" id="refresh-inquiries-btn"><i class="fa-solid fa-rotate"></i> Refresh</button>
                <button class="action-btn clear-btn-accent" id="clear-inquiries-btn"><i class="fa-solid fa-trash-can" style="color:#ef4444;"></i> Clear All</button>
            </div>
        </div>
        <div class="inquiries-feed" id="inquiries-feed">
            <div class="status-msg">Loading inquiries...</div>
        </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>&copy; 2026 Inquiries Management. Built for efficiency.</p>
    </footer>

    <!-- ============================================================ -->
    <!-- ===== JAVASCRIPT ===== -->
    <script>
        (() => {
            "use strict";

            // ---- SUPABASE CLIENT ----
            const SUPABASE_URL = "https://kbyfvqkfcxqgjjtfvvxf.supabase.co";
            const SUPABASE_KEY =
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtieWZ2cWtmY3hxZ2pqdGZ2dnhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NDM1MzMsImV4cCI6MjA5NjIxOTUzM30.TQQZJJi27pNcXMlD0m8MsrAbqjLHGgVnw-L3bNDR2bU";
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            const escapeHtml = (str) => {
                if (!str) return '';
                return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g,
                    "&quot;").replace(/'/g, "&#039;");
            };

            // ============================================================
            // ===== LOAD INQUIRIES =====
            // ============================================================
            const loadInquiries = async () => {
                const feedContainer = document.getElementById('inquiries-feed');
                if (!feedContainer) return;
                feedContainer.innerHTML = '<div class="status-msg"><i class="fa-solid fa-spinner fa-spin"></i> Loading inquiries...</div>';
                try {
                    const { data, error } = await supabase
                        .from('inquiries')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (error) throw error;

                    if (!data || data.length === 0) {
                        feedContainer.innerHTML = '📭 No inquiries yet.';
                        return;
                    }

                    feedContainer.innerHTML = data.map(item => `
                        <article class="inquiry-node" style="border-left-color: var(--cls-personal);">
                            <div class="node-meta">
                                <span>ID: ${item.id}</span>
                                <span>${new Date(item.created_at).toLocaleString()}</span>
                            </div>
                            <div class="node-sender" style="color: var(--cls-personal);">
                                <i class="fa-regular fa-user" aria-hidden="true"></i> ${escapeHtml(item.full_name)}
                            </div>
                            <a href="mailto:${escapeHtml(item.email)}" class="node-email">
                                <i class="fa-solid fa-envelope" aria-hidden="true"></i> ${escapeHtml(item.email)}
                            </a>
                            ${item.message ? `<div class="node-message">${escapeHtml(item.message)}</div>` : ''}
                            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin-top: 0.5rem;">
                                <span class="status-badge status-${item.status || 'new'}">${item.status || 'new'}</span>
                                <button class="action-btn-sm approve-btn" onclick="window.updateInquiryStatus(${item.id}, 'read')"><i class="fa-regular fa-check"></i> Mark Read</button>
                                <button class="action-btn-sm reject-btn" onclick="window.updateInquiryStatus(${item.id}, 'replied')"><i class="fa-regular fa-reply"></i> Mark Replied</button>
                                <button class="action-btn-sm delete-btn" onclick="window.deleteInquiry(${item.id})"><i class="fa-solid fa-trash"></i> Delete</button>
                            </div>
                        </article>
                    `).join('');
                } catch (err) {
                    feedContainer.innerHTML = `<div class="status-msg" style="color:#ef4444;"><i class="fa-solid fa-circle-exclamation"></i> Error loading inquiries: ${err.message}</div>`;
                }
            };

         // ============================================================
// CROSS-TAB LOGOUT + INACTIVITY TIMEOUT (60 seconds)
// ============================================================
(function() {
  "use strict";

  // ---- 1. CROSS-TAB SYNC: Listen for auth state changes ----
  // This ensures that signing out from one tab signs out all tabs.
  supabase.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT' || !session) {
      // Avoid redirect loop if already on the login page
      if (!window.location.pathname.includes('/index.html')) {
        window.location.href = '/index.html';
      }
    }
  });

  // ---- 2. INACTIVITY TIMEOUT ----
  const INACTIVITY_TIMEOUT = 60 * 1000; // 60 seconds (1 minute)
  let logoutTimer = null;

  // Function to perform logout (triggers the cross-tab sync via the listener above)
  const performLogout = async () => {
    try {
      await supabase.auth.signOut();
      // The onAuthStateChange listener will handle the redirect,
      // but we also set a fallback redirect just in case.
      if (!window.location.pathname.includes('/index.html')) {
        window.location.href = '/index.html';
      }
    } catch (err) {
      console.error('Auto-logout error:', err);
    }
  };

  // Reset the timer on user activity
  const resetTimer = () => {
    if (logoutTimer) clearTimeout(logoutTimer);
    logoutTimer = setTimeout(performLogout, INACTIVITY_TIMEOUT);
  };

  // Activity events that reset the timer
  const activityEvents = [
    'mousedown', 'mousemove', 'keydown',
    'scroll', 'touchstart', 'click', 'wheel'
  ];

  // Attach event listeners
  activityEvents.forEach(event => {
    document.addEventListener(event, resetTimer, { passive: true });
  });

  // Reset when the user returns to the tab
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) resetTimer();
  });

  // ---- Start the timer ----
  resetTimer();

  // ---- Cleanup on page unload ----
  window.addEventListener('beforeunload', () => {
    if (logoutTimer) clearTimeout(logoutTimer);
  });

  // (Optional) Expose a manual reset function if needed
  window.resetInactivityTimer = resetTimer;

})();



// ============================================================
            // ===== UPDATE INQUIRY STATUS =====
            // ============================================================
            window.updateInquiryStatus = async (id, status) => {
                if (!confirm(`Mark this inquiry as "${status}"?`)) return;
                try {
                    const { error } = await supabase
                        .from('inquiries')
                        .update({ status: status })
                        .eq('id', id);
                    if (error) throw error;
                    alert(`✅ Inquiry marked as "${status}"`);
                    loadInquiries();
                } catch (err) {
                    alert('❌ Error updating status: ' + err.message);
                }
            };

            // ============================================================
            // ===== DELETE INQUIRY =====
            // ============================================================
            window.deleteInquiry = async (id) => {
                if (!confirm('⚠️ Are you sure you want to DELETE this inquiry permanently?')) return;
                try {
                    const { error } = await supabase
                        .from('inquiries')
                        .delete()
                        .eq('id', id);
                    if (error) throw error;
                    alert('🗑️ Inquiry deleted permanently from database!');
                    loadInquiries();
                } catch (err) {
                    alert('❌ Error deleting: ' + err.message);
                }
            };

            // ============================================================
            // ===== CLEAR ALL INQUIRIES =====
            // ============================================================
            document.getElementById('clear-inquiries-btn')?.addEventListener('click', async () => {
                if (!confirm("⚠️ Are you sure you want to DELETE ALL inquiries permanently?")) return;
                const feedContainer = document.getElementById('inquiries-feed');
                feedContainer.innerHTML = '<div class="status-msg"><i class="fa-solid fa-spinner fa-spin"></i> Deleting all inquiries...</div>';
                try {
                    const { error } = await supabase
                        .from('inquiries')
                        .delete()
                        .neq('id', 0);
                    if (error) throw error;
                    alert('✅ All inquiries deleted permanently from database.');
                    loadInquiries();
                } catch (err) {
                    feedContainer.innerHTML = `<div class="status-msg" style="color:#ef4444;"><i class="fa-solid fa-circle-exclamation"></i> Error: ${err.message}</div>`;
                    alert('❌ Error clearing inquiries: ' + err.message);
                }
            });

            // ============================================================
            // ===== REALTIME SUBSCRIPTIONS =====
            // ============================================================
            const setupRealtimeSubscriptions = () => {
                supabase.channel('inquiries-changes')
                    .on('postgres_changes', {
                        event: '*',
                        schema: 'public',
                        table: 'inquiries'
                    }, () => {
                        console.log('🔄 Inquiries table changed, refreshing...');
                        loadInquiries();
                    })
                    .subscribe((status) => {
                        console.log('📡 Inquiries subscription status:', status);
                    });
            };

            // ============================================================
            // ===== SESSION VERIFICATION =====
            // ============================================================
            const verifySecureAuthentication = async () => {
                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session) {
                        await loadInquiries();
                        setupRealtimeSubscriptions();
                    } else {
                        window.location.href = '/index.html';
                    }
                } catch (error) {
                    console.error('Auth error:', error);
                    window.location.href = '/index.html';
                }
            };

            // ============================================================
            // ===== NAVBAR SCROLL =====
            // ============================================================
            const navbar = document.getElementById('navbar');
            window.addEventListener('scroll', () => {
                navbar.classList.toggle('scrolled', window.scrollY > 50);
            });

            // ============================================================
            // ===== BACK TO ADMIN =====
            // ============================================================
            document.getElementById('backToAdminBtn')?.addEventListener('click', () => {
                window.location.href = 'admin.html';
            });

            // ============================================================
            // ===== LOGOUT =====
            // ============================================================
            document.getElementById('logout-btn')?.addEventListener('click', async (e) => {
                e.preventDefault();
                await supabase.auth.signOut();
                window.location.href = '/index.html';
            });

            // ============================================================
            // ===== DOM CONTENT LOADED =====
            // ============================================================
            document.addEventListener('DOMContentLoaded', () => {
                verifySecureAuthentication();

                document.getElementById('refresh-inquiries-btn')?.addEventListener('click', loadInquiries);
            });

        })();
    </script>
</body>
</html>
