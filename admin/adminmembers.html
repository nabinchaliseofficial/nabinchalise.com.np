<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Members · Image Upload & Status</title>
    <meta name="description" content="Manage members with profile image upload, Active/Inactive status, realtime sync." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --cls-personal: #38bdf8;
            --cls-professional: #34d399;
            --cls-galkot: #fbbf24;
            --cls-rotaract: #f43f5e;
            --cls-links: #a78bfa;
            --primary: #D70060;
            --secondary: #015491;
            --cta-logout: #ef4444;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg-dark: #f8fafc;
                --bg-card: rgba(255, 255, 255, 0.8);
                --border-color: rgba(0, 0, 0, 0.08);
                --text-main: #0f172a;
                --text-muted: #64748b;
            }
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            background-image: radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(244, 63, 94, 0.03) 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition-smooth);
        }
        .navbar.scrolled {
            padding: 0.6rem 2rem;
            background: rgba(15, 23, 42, 0.95);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .nav-logo {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-logo i {
            color: var(--cls-rotaract);
        }
        .nav-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-back {
            background: var(--cls-galkot);
            color: #000 !important;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            text-decoration: none;
            min-height: 44px;
        }
        .btn-back:hover {
            background: #e5a800;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.3);
        }
        .btn-logout {
            background: var(--cta-logout);
            color: #fff !important;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            min-height: 44px;
        }
        .btn-logout:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }
        .hero {
            padding: 8rem 2rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(to right, var(--cls-rotaract), var(--cls-professional));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 650px;
            margin: 0 auto;
        }
        .workspace-section {
            max-width: 1200px;
            margin: 0 auto 3rem;
            padding: 0 2rem;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .panel-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .panel-header h2 i {
            color: var(--cls-rotaract);
        }
        .panel-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            font-family: 'Inter', sans-serif;
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .clear-btn-accent {
            border-color: rgba(239, 68, 68, 0.25) !important;
        }
        .clear-btn-accent:hover {
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: rgba(239, 68, 68, 0.6) !important;
        }
        .btn-add-accent {
            background: var(--cls-professional);
            border-color: var(--cls-professional);
            color: #000 !important;
        }
        .btn-add-accent:hover {
            background: #2bbf8a;
            border-color: #2bbf8a;
        }
        .members-feed {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }
        .member-node {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--cls-rotaract);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            backdrop-filter: blur(20px);
            transition: var(--transition-smooth);
        }
        .member-node:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }
        .member-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color);
            flex-shrink: 0;
        }
        .member-header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .member-header .node-title {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .node-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .node-detail {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .status-badge {
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .status-active {
            background: #34d399;
            color: #000;
        }
        .status-inactive {
            background: #94a3b8;
            color: #000;
        }
        .status-pending {
            background: #fbbf24;
            color: #000;
        }
        .application-actions {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        .action-btn-sm {
            padding: 0.3rem 0.75rem;
            font-size: 0.7rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition-smooth);
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .action-btn-sm.edit-btn {
            background: var(--cls-galkot);
            color: #000;
        }
        .action-btn-sm.edit-btn:hover {
            background: #e5a800;
            transform: scale(1.02);
        }
        .action-btn-sm.delete-btn {
            background: #f43f5e;
            color: #fff;
        }
        .action-btn-sm.delete-btn:hover {
            background: #e11d48;
            transform: scale(1.02);
        }
        .action-btn-sm.status-toggle {
            background: #3b82f6;
            color: #fff;
        }
        .action-btn-sm.status-toggle:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
        .action-btn-sm.status-toggle.inactive-toggle {
            background: #f59e0b;
            color: #000;
        }
        .action-btn-sm.status-toggle.inactive-toggle:hover {
            background: #d97706;
        }
        .action-btn-sm.verify-btn {
            background: #34d399;
            color: #000;
        }
        .action-btn-sm.verify-btn:hover {
            background: #2bbf8a;
            transform: scale(1.02);
        }
        .action-btn-sm.reject-btn {
            background: #ef4444;
            color: #fff;
        }
        .action-btn-sm.reject-btn:hover {
            background: #dc2626;
            transform: scale(1.02);
        }
        .action-btn-sm.role-btn {
            background: var(--cls-links);
            color: #000;
        }
        .action-btn-sm.role-btn:hover {
            background: #9370db;
            transform: scale(1.02);
        }
        .search-box-inline {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.2rem 0.2rem 0.2rem 0.8rem;
        }
        .search-box-inline input {
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 0.4rem 0;
            font-size: 0.85rem;
            outline: none;
            min-width: 140px;
            font-family: 'Inter', sans-serif;
        }
        .search-box-inline input::placeholder {
            color: var(--text-muted);
        }
        .search-box-inline button {
            background: var(--cls-links);
            border: none;
            color: #000;
            padding: 0.3rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            font-family: 'Inter', sans-serif;
        }
        .search-box-inline button:hover {
            background: #9370db;
        }
        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-style: italic;
        }
        .slider-container {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
        }
        .slider-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            gap: 1.5rem;
        }
        .slider-track .member-node {
            min-width: calc(33.333% - 1rem);
            flex: 0 0 calc(33.333% - 1rem);
        }
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
        }
        .slider-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .slider-btn.prev {
            left: 10px;
        }
        .slider-btn.next {
            right: 10px;
        }
        .slider-dots {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .slider-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border-color);
            border: none;
            cursor: pointer;
            transition: var(--transition-smooth);
        }
        .slider-dot.active {
            background: var(--cls-rotaract);
            width: 24px;
            border-radius: 4px;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-content::-webkit-scrollbar {
            width: 6px;
        }
        .modal-content::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            min-height: 44px;
            min-width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            color: var(--text-main);
            transform: rotate(90deg);
        }
        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .modal-title i {
            color: var(--cls-rotaract);
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--cls-galkot);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .form-actions .action-btn {
            padding: 0.7rem 1.5rem;
            font-weight: 600;
        }
        .btn-save-accent {
            background: var(--cls-professional);
            border-color: var(--cls-professional);
            color: #000 !important;
        }
        .btn-save-accent:hover {
            background: #2bbf8a;
            border-color: #2bbf8a;
        }
        .btn-cancel-accent {
            border-color: rgba(239, 68, 68, 0.3) !important;
        }
        .btn-cancel-accent:hover {
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: rgba(239, 68, 68, 0.6) !important;
        }
        .image-preview {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        .image-preview img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-color);
            background: rgba(255, 255, 255, 0.05);
        }
        .image-preview .no-image {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .file-input-wrapper .action-btn {
            pointer-events: none;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: #f8fafc;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border-left: 4px solid #34d399;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            font-weight: 500;
            z-index: 9999;
            max-width: 400px;
            animation: slideIn 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .toast.error {
            border-left-color: #ef4444;
        }
        .toast.info {
            border-left-color: #3b82f6;
        }
        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Role Badge Colors */
        .role-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .role-badge.admin {
            background: #fef3c7;
            color: #92400e;
        }
        .role-badge.president {
            background: #fce4ec;
            color: #991b1b;
        }
        .role-badge.secretary {
            background: #dbeafe;
            color: #1e40af;
        }
        .role-badge.editor {
            background: #e0f2fe;
            color: #0369a1;
        }
        .role-badge.viewer {
            background: #e5e7eb;
            color: #374151;
        }
        .role-badge.no-role {
            background: #f3f4f6;
            color: #6b7280;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @media (max-width: 1024px) {
            .slider-track .member-node {
                min-width: calc(50% - 1rem);
                flex: 0 0 calc(50% - 1rem);
            }
        }
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
            .members-feed {
                grid-template-columns: 1fr;
            }
            .modal-content {
                padding: 1.5rem;
                margin: 1rem;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .navbar {
                padding: 0.75rem 1rem;
            }
            .workspace-section {
                padding: 0 1rem;
            }
            .panel-header {
                flex-direction: column;
                align-items: stretch;
            }
            .panel-actions {
                flex-wrap: wrap;
            }
            .search-box-inline input {
                min-width: 100px;
                width: 100%;
            }
            .search-box-inline {
                flex: 1;
            }
            .nav-actions {
                flex-wrap: wrap;
            }
            .btn-back,
            .btn-logout {
                font-size: 0.75rem;
                padding: 0.4rem 0.8rem;
            }
            .slider-track .member-node {
                min-width: calc(100% - 0rem);
                flex: 0 0 calc(100% - 0rem);
            }
            .slider-btn {
                width: 32px;
                height: 32px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <a href="#" class="nav-logo"><i class="fa-solid fa-users"></i> Members · Admin</a>
        <div class="nav-actions">
            <button class="btn-back" id="backToAdminBtn"><i class="fa-solid fa-arrow-left"></i> Back</button>
            <button class="btn-logout" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Log Out</button>
        </div>
    </nav>

    <header class="hero">
        <h1><i class="fa-solid fa-address-card" style="color:var(--cls-rotaract);"></i> Members Management</h1>
        <p>Manage members, roles, and sync in realtime.</p>
    </header>

    <!-- NEW MEMBER REQUESTS SECTION -->
    <section class="workspace-section" id="registrations-panel">
        <div class="panel-header">
            <h2><i class="fa-solid fa-user-plus" style="color: var(--cls-galkot);"></i> New Member Requests</h2>
            <div class="panel-actions">
                <button class="action-btn" id="refresh-registrations-btn"><i class="fa-solid fa-rotate"></i> Refresh</button>
                <button class="action-btn clear-btn-accent" id="clear-registrations-btn"><i class="fa-solid fa-trash-can" style="color:#ef4444;"></i> Clear All</button>
            </div>
        </div>
        <div class="slider-container" id="registrationsSlider">

                    return urlData.publicUrl;

                    console.error('Upload error:', err);
                    throw new Error('Image upload failed: ' + err.message);

                if (!imageUrl) return;

                    const urlParts = imageUrl.split(`/storage/v1/object/public/${STORAGE_BUCKET}/`);

            // ---------- SLIDER HELPERS ----------
            function renderSlider(trackId, items, dotsId, renderFn, sliderIndex) {
                const track = document.getElementById(trackId);
                if (!track) return;
                if (!items || items.length === 0) {
                    track.innerHTML = `<div class="status-msg">📭 No items to display</div>`;
                    return;
                }
                track.innerHTML = items.map(renderFn).join('');

                const dots = document.getElementById(dotsId);
                if (dots) {
                    const perView = getItemsPerView();
                    const totalSlides = Math.ceil(items.length / perView);
                    dots.innerHTML = Array.from({ length: totalSlides }, (_, i) =>
                        `<button class="slider-dot ${i === sliderIndex ? 'active' : ''}" data-index="${i}"></button>`
                    ).join('');
                    dots.querySelectorAll('.slider-dot').forEach(dot => {
                        dot.addEventListener('click', () => {
                            const idx = parseInt(dot.dataset.index);
                            if (dotsId === 'regDots') {
                                regSliderIndex = idx;
                                updateSlider('registrationsTrack', registrations, 'regDots', renderRegistrationItem, regSliderIndex);
                            } else if (dotsId === 'memDots') {
                                memSliderIndex = idx;
                                updateSlider('membersTrack', allMembers, 'memDots', renderMemberItem, memSliderIndex);
                            } else if (dotsId === 'roleDots') {
                                roleSliderIndex = idx;
                                updateSlider('rolesTrack', userRoles, 'roleDots', renderRoleItem, roleSliderIndex);
                            }
                        });
                    });
                }
                updateSlider(trackId, items, dotsId, renderFn, sliderIndex);
            }

            function getItemsPerView() {
                const width = window.innerWidth;
                if (width < 768) return 1;
                if (width < 1024) return 2;
                return 3;
            }

            function updateSlider(trackId, items, dotsId, renderFn, sliderIndex) {
                const track = document.getElementById(trackId);
                if (!track || !items || items.length === 0) return;
                const perView = getItemsPerView();
                const totalSlides = Math.ceil(items.length / perView);
                if (sliderIndex >= totalSlides) sliderIndex = totalSlides - 1;
                if (sliderIndex < 0) sliderIndex = 0;
                const offset = sliderIndex * (100 / perView);
                track.style.transform = `translateX(-${offset}%)`;

                const dots = document.getElementById(dotsId);
                if (dots) {
                    dots.querySelectorAll('.slider-dot').forEach((dot, i) => {
                        dot.classList.toggle('active', i === sliderIndex);
                    });
                }
            }

                        ${item.address ? `<div class="node-detail"><i class="fa-solid fa-location-dot"></i> ${escapeHtml(item.address)}</div>` : ''}
                        ${item.profession ? `<div class="node-detail"><i class="fa-solid fa-briefcase"></i> ${escapeHtml(item.profession)}</div>` : ''}

                        return;
                    }

                    // Merge view data with roles data for complete info
                    const merged = (viewData || []).map(viewUser => {
                        const roleEntry = (rolesData || []).find(r => r.user_id === viewUser.user_id);
                        return {
                            user_id: viewUser.user_id,
                            email: viewUser.email || 'No email',
                            full_name: viewUser.full_name || viewUser.email?.split('@')[0] || 'Unknown',
                            role: roleEntry?.role || viewUser.role || 'no_role',
                            created_at: viewUser.joined_at || viewUser.role_assigned_at,
                            status: roleEntry?.status || 'active'
                        };
                    });

                    // If no users from view, use roles data
                    if (merged.length === 0) {
                        const fallbackMerged = (rolesData || []).map(role => {
                            return {
                                user_id: role.user_id,
                                email: role.email || 'Unknown',
                                full_name: 'Unknown User',
                                role: role.role || 'no_role',
                                created_at: role.created_at,
                                status: role.status || 'active'
                            };
                        });
                        userRoles = fallbackMerged;
                    } else {
                        userRoles = merged;
                    }

                    renderSlider('rolesTrack', userRoles, 'roleDots', renderRoleItem, roleSliderIndex);
                    attachRoleListeners();

                } catch (err) {
                    console.error('Error loading roles:', err);
                    document.getElementById('rolesTrack').innerHTML =
                        `<div class="status-msg" style="color:#ef4444;"><i class="fa-solid fa-circle-exclamation"></i> ${err.message}</div>`;
                    showToast('Error loading roles: ' + err.message, 'error');
                }
            };

            // Helper function to attach role event listeners
            function attachRoleListeners() {
                document.querySelectorAll('#rolesTrack .action-btn-sm').forEach(btn => {
                    btn.removeEventListener('click', handleRoleAction);
                    btn.addEventListener('click', handleRoleAction);
                });
            }

            function handleRoleAction(e) {
                e.stopPropagation();
                const btn = e.currentTarget;
                const userId = btn.dataset.userId;
                const action = btn.dataset.action;
                if (action === 'manage-role') {
                    openRoleModal(userId, btn.dataset.email, btn.dataset.role);
                } else if (action === 'toggle-user-status') {
                    toggleUserStatus(userId);
                }
            }

            // ---------- VERIFY REGISTRATION ----------
            const verifyRegistration = async (id) => {
                if (!confirm('✅ Verify this member and add to active members list?')) return;

                try {
                    const reg = registrations.find(r => String(r.id) === String(id));
                    if (!reg) { showToast('Registration not found.', 'error'); return; }

                    const memberData = {
                        name: reg.full_name || reg.name || '',
                        email: reg.email || '',
                        phone: reg.phone || reg.phone_number || '',
                        gender: reg.gender || '',
                        blood_group: reg.blood_group || '',
                        position: reg.position || '',
                        address: reg.address || '',
                        profession: reg.profession || '',
                        birthday: reg.birth_date || null,
                        profile_image: reg.profile_image || '',
                        status: 'active'
                    };

                    // Check if member already exists
                    const { data: existing } = await supabase
                        .from(MEMBERS_TABLE)
                        .select('id')
                        .eq('email', memberData.email)
                        .maybeSingle();

                    if (existing) {
                        showToast('⚠️ Member already exists. Deleting request...', 'info');
                        await supabase.from(REGISTRATIONS_TABLE).delete().eq('id', id);
                        await loadRegistrations();
                        await loadMembers(document.getElementById('memberSearchInput').value || '');
                        return;
                    }

                    // Insert into members
                    const { data: insertData, error: insertError } = await supabase
                        .from(MEMBERS_TABLE)
                        .insert([memberData])
                        .select();

                    if (insertError) throw new Error(insertError.message);

                    // Delete from registrations
                    await supabase.from(REGISTRATIONS_TABLE).delete().eq('id', id);

                    showToast('✅ Member verified and added to active members!', 'success');
                    await loadRegistrations();
                    await loadMembers(document.getElementById('memberSearchInput').value || '');
                    await loadUserRoles();

                } catch (err) {
                    console.error('Error verifying member:', err);
                    showToast('❌ Error verifying member: ' + err.message, 'error');
                }
            };

            // ---------- REJECT REGISTRATION ----------
            const rejectRegistration = async (id) => {
                if (!confirm('❌ Reject this registration? This will delete it permanently.')) return;
                try {
                    await supabase.from(REGISTRATIONS_TABLE).delete().eq('id', id);
                    showToast('🗑️ Registration rejected.', 'info');
                    await loadRegistrations();
                } catch (err) {
                    showToast('❌ Error rejecting: ' + err.message, 'error');
                }
            };

            // ---------- TOGGLE MEMBER STATUS ----------
            const toggleMemberStatus = async (id) => {
                try {
                    const member = allMembers.find(m => m.id === id);
                    if (!member) { showToast('Member not found.', 'error'); return; }
                    const newStatus = member.status === 'active' ? 'inactive' : 'active';
                    await supabase.from(MEMBERS_TABLE).update({ status: newStatus }).eq('id', id);
                    showToast(`✅ Status updated to ${newStatus}`, 'success');
                    await loadMembers(document.getElementById('memberSearchInput').value || '');
                    await loadUserRoles();
                } catch (err) {
                    showToast('❌ Error toggling status: ' + err.message, 'error');
                }
            };

            // ---------- TOGGLE USER STATUS (for role management) ----------
            const toggleUserStatus = async (userId) => {
                try {
                    const user = userRoles.find(u => u.user_id === userId);
                    if (!user) { showToast('User not found.', 'error'); return; }
                    const newStatus = user.status === 'active' ? 'inactive' : 'active';
                    
                    // Update in user_roles table
                    const { error } = await supabase
                        .from(USER_ROLES_TABLE)
                        .update({ status: newStatus })
                        .eq('user_id', userId);

                    if (error) throw error;
                    showToast(`✅ User status updated to ${newStatus}`, 'success');
                    await loadUserRoles();
                } catch (err) {
                    showToast('❌ Error toggling user status: ' + err.message, 'error');
                }
            };

            // ---------- DELETE MEMBER ----------
            const deleteMember = async (id) => {
                if (!confirm(`⚠️ Delete member #${id}?`)) return;
                try {
                    const member = allMembers.find(m => m.id === id);
                    if (member && member.profile_image) {
                        await deleteOldImage(member.profile_image);
                    }
                    await supabase.from(MEMBERS_TABLE).delete().eq('id', id);
                    showToast(`🗑️ Member #${id} deleted`, 'success');
                    await loadMembers(document.getElementById('memberSearchInput').value || '');
                    await loadUserRoles();
                } catch (err) {
                    showToast('❌ Error deleting: ' + err.message, 'error');
                }
            };

            // ---------- EDIT MEMBER ----------
            const editMember = async (id) => {
                try {
                    const { data, error } = await supabase.from(MEMBERS_TABLE).select('*').eq('id', id).single();
                    if (error) throw error;
                    if (!data) { showToast('Member not found.', 'error'); return; }

                    editingMemberId = id;
                    document.getElementById('memberId').value = id;
                    document.getElementById('memberName').value = data.name || '';
                    document.getElementById('memberEmail').value = data.email || '';
                    document.getElementById('memberPhone').value = data.phone || '';
                    document.getElementById('memberGender').value = data.gender || '';
                    document.getElementById('memberBlood').value = data.blood_group || '';
                    document.getElementById('memberPosition').value = data.position || '';
                    document.getElementById('memberAddress').value = data.address || '';
                    document.getElementById('memberProfession').value = data.profession || '';
                    document.getElementById('memberBirthday').value = data.birthday ? data.birthday.split('T')[0] : '';
                    document.getElementById('memberStatus').value = data.status || 'active';

                    const imgUrl = data.profile_image || data.photo || data.photo_url || '';
                    existingImageUrl = imgUrl;
                    document.getElementById('profileImageUrl').value = imgUrl;
                    const preview = document.getElementById('imagePreview');
                    const noText = document.getElementById('noImageText');
                    if (imgUrl) {
                        preview.src = imgUrl;
                        preview.style.display = 'block';
                        noText.style.display = 'none';
                    } else {
                        preview.style.display = 'none';
                        noText.style.display = 'inline';
                    }
                    currentImageFile = null;

                    document.getElementById('memberModalTitle').textContent = 'Edit Member';
                    document.getElementById('memberSubmitBtnText').textContent = 'Update Member';
                    document.getElementById('memberModal').classList.add('active');
                } catch (err) {
                    showToast('Error loading member: ' + err.message, 'error');
                }
            };

            // ---------- OPEN ROLE MODAL ----------
            const openRoleModal = (userId, email, currentRole) => {
                document.getElementById('roleUserId').value = userId;
                document.getElementById('roleUserEmail').value = email || 'No email';
                document.getElementById('roleCurrentRole').value = getRoleDisplayName(currentRole) + ' ' + getRoleIcon(currentRole);
                document.getElementById('roleNewRole').value = currentRole || 'viewer';
                document.getElementById('roleModalTitle').textContent = 'Manage User Role';
                document.getElementById('roleModal').classList.add('active');
            };

            // ---------- CLOSE ROLE MODAL ----------
            const closeRoleModal = () => {
                document.getElementById('roleModal').classList.remove('active');
            };

            // ---------- SUBMIT ROLE ----------
            document.getElementById('roleForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const userId = document.getElementById('roleUserId').value;
                const newRole = document.getElementById('roleNewRole').value;

                if (!userId) {
                    showToast('❌ User ID not found.', 'error');
                    return;
                }

                try {
                    const { error } = await supabase
                        .from(USER_ROLES_TABLE)
                        .upsert({ user_id: userId, role: newRole }, { onConflict: 'user_id' });

                    if (error) throw error;

                    showToast(`✅ Role updated to ${getRoleDisplayName(newRole)}`, 'success');
                    closeRoleModal();
                    await loadUserRoles();
                } catch (err) {
                    showToast('❌ Error updating role: ' + err.message, 'error');
                }
            });

            // ---------- OPEN ADD MODAL ----------
            const openAddModal = () => {
                editingMemberId = null;
                document.getElementById('memberForm').reset();
                document.getElementById('memberId').value = '';
                document.getElementById('memberStatus').value = 'active';
                document.getElementById('profileImageUrl').value = '';
                document.getElementById('imagePreview').style.display = 'none';
                document.getElementById('noImageText').style.display = 'inline';
                currentImageFile = null;
                existingImageUrl = '';
                document.getElementById('memberModalTitle').textContent = 'Add New Member';
                document.getElementById('memberSubmitBtnText').textContent = 'Save Member';
                document.getElementById('memberModal').classList.add('active');
            };

            const closeModal = () => {
                document.getElementById('memberModal').classList.remove('active');
                editingMemberId = null;
                currentImageFile = null;
                existingImageUrl = '';
                document.getElementById('profileImageInput').value = '';
            };

            // ---------- IMAGE PREVIEW ----------
            document.getElementById('profileImageInput')?.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                currentImageFile = file;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const preview = document.getElementById('imagePreview');
                    preview.src = ev.target.result;
                    preview.style.display = 'block';
                    document.getElementById('noImageText').style.display = 'none';
                };
                reader.readAsDataURL(file);
            });

            document.getElementById('removeImageBtn')?.addEventListener('click', () => {
                currentImageFile = null;
                document.getElementById('profileImageInput').value = '';
                document.getElementById('profileImageUrl').value = '';
                document.getElementById('imagePreview').style.display = 'none';
                document.getElementById('noImageText').style.display = 'inline';
                existingImageUrl = '';
            });

            // ---------- FORM SUBMIT ----------
            document.getElementById('memberForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const memberData = {
                    name: document.getElementById('memberName').value.trim(),
                    email: document.getElementById('memberEmail').value.trim(),
                    phone: document.getElementById('memberPhone').value.trim(),
                    gender: document.getElementById('memberGender').value,
                    blood_group: document.getElementById('memberBlood').value,
                    position: document.getElementById('memberPosition').value.trim(),
                    address: document.getElementById('memberAddress').value.trim(),
                    profession: document.getElementById('memberProfession').value.trim(),
                    birthday: document.getElementById('memberBirthday').value || null,
                    status: document.getElementById('memberStatus').value || 'active'
                };
                if (!memberData.name || !memberData.email) {
                    showToast('Name and Email are required.', 'error');
                    return;
                }

                const id = document.getElementById('memberId').value;
                const isEdit = !!id;

                try {
                    let finalImageUrl = document.getElementById('profileImageUrl').value || existingImageUrl;

                    if (currentImageFile) {
                        if (isEdit && finalImageUrl) {
                            await deleteOldImage(finalImageUrl);
                        }
                        const tempId = isEdit ? id : Date.now();
                        const uploadedUrl = await uploadImage(currentImageFile, tempId);
                        if (uploadedUrl) finalImageUrl = uploadedUrl;
                    } else if (isEdit && !currentImageFile && !document.getElementById('profileImageUrl').value &&
                        existingImageUrl) {
                        await deleteOldImage(existingImageUrl);
                        finalImageUrl = '';
                    }

                    memberData.profile_image = finalImageUrl || null;

                    let result;
                    if (isEdit) {
                        result = await supabase.from(MEMBERS_TABLE).update(memberData).eq('id', parseInt(id));
                    } else {
                        result = await supabase.from(MEMBERS_TABLE).insert([memberData]);
                    }
                    if (result.error) throw result.error;

                    showToast(isEdit ? '✅ Member updated!' : '✅ Member added!', 'success');
                    closeModal();
                    await loadMembers(document.getElementById('memberSearchInput').value || '');
                    await loadUserRoles();
                } catch (err) {
                    console.error('Save error:', err);
                    showToast('❌ Error saving: ' + err.message, 'error');
                }
            });

            // ---------- EVENT LISTENERS ----------
            // Registrations actions (delegated)
            document.getElementById('registrationsTrack')?.addEventListener('click', (e) => {
                const btn = e.target.closest('.action-btn-sm');
                if (!btn) return;
                const id = btn.dataset.id;
                const action = btn.dataset.action;
                if (action === 'verify') verifyRegistration(id);
                else if (action === 'reject') rejectRegistration(id);
            });

            // Members actions (delegated)
            document.getElementById('membersTrack')?.addEventListener('click', (e) => {
                const btn = e.target.closest('.action-btn-sm');
                if (!btn) return;
                const id = parseInt(btn.dataset.id);
                const action = btn.dataset.action;
                if (action === 'delete') deleteMember(id);
                else if (action === 'edit') editMember(id);
                else if (action === 'toggle-status') toggleMemberStatus(id);
            });

            // Slider navigation
            document.getElementById('regSliderPrev')?.addEventListener('click', () => {
                const perView = getItemsPerView();
                const totalSlides = Math.ceil(registrations.length / perView);
                regSliderIndex = (regSliderIndex - 1 + totalSlides) % totalSlides;
                updateSlider('registrationsTrack', registrations, 'regDots', renderRegistrationItem, regSliderIndex);
            });

            document.getElementById('regSliderNext')?.addEventListener('click', () => {
                const perView = getItemsPerView();
                const totalSlides = Math.ceil(registrations.length / perView);
                regSliderIndex = (regSliderIndex + 1) % totalSlides;
                updateSlider('registrationsTrack', registrations, 'regDots', renderRegistrationItem, regSliderIndex);
            });

            document.getElementById('memSliderPrev')?.addEventListener('click', () => {
                const perView = getItemsPerView();
                const totalSlides = Math.ceil(allMembers.length / perView);
                memSliderIndex = (memSliderIndex - 1 + totalSlides) % totalSlides;
                updateSlider('membersTrack', allMembers, 'memDots', renderMemberItem, memSliderIndex);
            });

            document.getElementById('memSliderNext')?.addEventListener('click', () => {
                const perView = getItemsPerView();
                const totalSlides = Math.ceil(allMembers.length / perView);
                memSliderIndex = (memSliderIndex + 1) % totalSlides;
                updateSlider('membersTrack', allMembers, 'memDots', renderMemberItem, memSliderIndex);
            });

            document.getElementById('roleSliderPrev')?.addEventListener('click', () => {
                const perView = getItemsPerView();
                const totalSlides = Math.ceil(userRoles.length / perView);
                roleSliderIndex = (roleSliderIndex - 1 + totalSlides) % totalSlides;
                updateSlider('rolesTrack', userRoles, 'roleDots', renderRoleItem, roleSliderIndex);
            });

            document.getElementById('roleSliderNext')?.addEventListener('click', () => {
                const perView = getItemsPerView();
                const totalSlides = Math.ceil(userRoles.length / perView);
                roleSliderIndex = (roleSliderIndex + 1) % totalSlides;
                updateSlider('rolesTrack', userRoles, 'roleDots', renderRoleItem, roleSliderIndex);
            });

            // Refresh buttons
            document.getElementById('refresh-registrations-btn')?.addEventListener('click', loadRegistrations);
            document.getElementById('refresh-members-btn')?.addEventListener('click', () => {
                loadMembers(document.getElementById('memberSearchInput').value || '');
            });
            document.getElementById('refresh-roles-btn')?.addEventListener('click', loadUserRoles);

            // Clear buttons
            document.getElementById('clear-registrations-btn')?.addEventListener('click', async () => {
                if (!confirm("⚠️ DELETE ALL registration requests?")) return;
                try {
                    await supabase.from(REGISTRATIONS_TABLE).delete().neq('id', '');
                    showToast('✅ All registrations cleared.', 'success');
                    await loadRegistrations();
                } catch (err) {
                    showToast('❌ Error clearing: ' + err.message, 'error');
                }
            });

            document.getElementById('clear-members-btn')?.addEventListener('click', async () => {
                if (!confirm("⚠️ DELETE ALL members?")) return;
                try {
                    for (const m of allMembers) {
                        if (m.profile_image) await deleteOldImage(m.profile_image);
                    }
                    await supabase.from(MEMBERS_TABLE).delete().neq('id', 0);
                    showToast('✅ All members cleared.', 'success');
                    await loadMembers();
                    await loadUserRoles();
                } catch (err) {
                    showToast('❌ Error clearing: ' + err.message, 'error');
                }
            });

            // Search
            document.getElementById('memberSearchBtn')?.addEventListener('click', () => {
                loadMembers(document.getElementById('memberSearchInput').value || '');
            });
            document.getElementById('memberSearchInput')?.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') loadMembers(e.target.value);
            });

            // Modal events
            document.getElementById('addMemberBtn')?.addEventListener('click', openAddModal);
            document.getElementById('memberModalCloseBtn')?.addEventListener('click', closeModal);
            document.getElementById('memberModalCancelBtn')?.addEventListener('click', closeModal);
            document.getElementById('memberModal')?.addEventListener('click', (e) => {
                if (e.target === document.getElementById('memberModal')) closeModal();
            });

            // Role Modal events
            document.getElementById('roleModalCloseBtn')?.addEventListener('click', closeRoleModal);
            document.getElementById('roleModalCancelBtn')?.addEventListener('click', closeRoleModal);
            document.getElementById('roleModal')?.addEventListener('click', (e) => {
                if (e.target === document.getElementById('roleModal')) closeRoleModal();
            });

            // Back & Logout
            document.getElementById('backToAdminBtn')?.addEventListener('click', () => { window.location.href = 'admin.html'; });
            document.getElementById('logout-btn')?.addEventListener('click', async () => {
                await supabase.auth.signOut();
                window.location.href = '/index.html';
            });

            // ---------- REALTIME ----------
            const setupRealtime = () => {
                supabase.channel('members-realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: MEMBERS_TABLE }, () => {
                        console.log('🔄 Members changed');
                        loadMembers(document.getElementById('memberSearchInput').value || '');
                    })
                    .subscribe();

                supabase.channel('registrations-realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: REGISTRATIONS_TABLE }, () => {
                        console.log('🔄 Registrations changed');
                        loadRegistrations();
                    })
                    .subscribe();

                supabase.channel('roles-realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: USER_ROLES_TABLE }, () => {
                        console.log('🔄 Roles changed');
                        loadUserRoles();
                    })
                    .subscribe();
            };

            // ---------- INIT ----------
            const init = async () => {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) {
                    window.location.href = '/index.html';
                    return;
                }
                await Promise.all([loadRegistrations(), loadMembers(), loadUserRoles()]);
                setupRealtime();

                // Handle window resize for slider
                let resizeTimeout;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimeout);
                    resizeTimeout = setTimeout(() => {
                        updateSlider('registrationsTrack', registrations, 'regDots', renderRegistrationItem, regSliderIndex);
                        updateSlider('membersTrack', allMembers, 'memDots', renderMemberItem, memSliderIndex);
                        updateSlider('rolesTrack', userRoles, 'roleDots', renderRoleItem, roleSliderIndex);
                    }, 200);
                });
            };

            const navbar = document.getElementById('navbar');
            window.addEventListener('scroll', () => {
                navbar.classList.toggle('scrolled', window.scrollY > 50);
            });

            document.addEventListener('DOMContentLoaded', init);

            // Expose functions globally for inline handlers
            window.deleteMember = deleteMember;
            window.editMember = editMember;
            window.toggleMemberStatus = toggleMemberStatus;
            window.verifyRegistration = verifyRegistration;
            window.rejectRegistration = rejectRegistration;
            window.toggleUserStatus = toggleUserStatus;
            window.openRoleModal = openRoleModal;

        })();
    </script>
</body>
</html>
