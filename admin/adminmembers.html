<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Members Management</title>
    <meta name="description" content="Manage active members and new registration requests." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        /* --- BASE VARIABLES --- */
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --cls-personal: #38bdf8;
            --cls-professional: #34d399;
            --cls-galkot: #fbbf24;
            --cls-rotaract: #f43f5e;
            --cls-links: #a78bfa;
            --primary: #D70060;
            --secondary: #015491;
            --cta-logout: #ef4444;
            --cta-logout-hover: #dc2626;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-dark: #f8fafc;
                --bg-card: rgba(255, 255, 255, 0.8);
                --border-color: rgba(0, 0, 0, 0.08);
                --text-main: #0f172a;
                --text-muted: #64748b;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(244, 63, 94, 0.03) 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition-smooth);
        }
        .navbar.scrolled {
            padding: 0.6rem 2rem;
            background: rgba(15, 23, 42, 0.95);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .nav-logo {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-logo i {
            color: var(--cls-rotaract);
        }
        .nav-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }
        .btn-back {
            background: var(--cls-galkot);
            color: #000 !important;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            text-decoration: none;
            min-height: 44px;
        }
        .btn-back:hover {
            background: #e5a800;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.3);
        }
        .btn-logout {
            background: var(--cta-logout);
            color: #ffffff !important;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            text-decoration: none;
            min-height: 44px;
        }
        .btn-logout:hover {
            background: var(--cta-logout-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        /* --- HERO --- */
        .hero {
            padding: 8rem 2rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(to right, var(--cls-rotaract), var(--cls-professional));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 650px;
            margin: 0 auto;
        }

        /* --- WORKSPACE SECTION --- */
        .workspace-section {
            max-width: 1200px;
            margin: 0 auto 3rem;
            padding: 0 2rem;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.75rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .panel-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .panel-header h2 i {
            color: var(--cls-rotaract);
        }
        .panel-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            font-family: 'Inter', sans-serif;
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .clear-btn-accent {
            border-color: rgba(239, 68, 68, 0.25) !important;
        }
        .clear-btn-accent:hover {
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: rgba(239, 68, 68, 0.6) !important;
        }
        .btn-add-accent {
            background: var(--cls-professional);
            border-color: var(--cls-professional);
            color: #000 !important;
        }
        .btn-add-accent:hover {
            background: #2bbf8a;
            border-color: #2bbf8a;
        }
        .btn-edit-accent {
            background: var(--cls-galkot);
            border-color: var(--cls-galkot);
            color: #000 !important;
        }
        .btn-edit-accent:hover {
            background: #e5a800;
            border-color: #e5a800;
        }

        .inquiries-feed {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }
        .inquiry-node {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--cls-rotaract);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .node-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .node-sender {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-main);
        }
        .node-email {
            font-size: 0.9rem;
            color: var(--cls-personal);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .node-message {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: 10px;
            font-size: 0.95rem;
            color: rgba(248, 250, 252, 0.9);
            white-space: pre-wrap;
        }
        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .search-box-inline {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.2rem 0.2rem 0.2rem 0.8rem;
        }
        .search-box-inline input {
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 0.4rem 0;
            font-size: 0.85rem;
            outline: none;
            min-width: 150px;
            font-family: 'Inter', sans-serif;
        }
        .search-box-inline input::placeholder {
            color: var(--text-muted);
        }
        .search-box-inline button {
            background: var(--cls-links);
            border: none;
            color: #000;
            padding: 0.3rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            font-family: 'Inter', sans-serif;
        }
        .search-box-inline button:hover {
            background: #9370db;
        }

        .action-btn-sm {
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition-smooth);
            font-family: 'Inter', sans-serif;
        }
        .action-btn-sm.approve-btn {
            background: #34d399;
            color: #000;
        }
        .action-btn-sm.approve-btn:hover {
            background: #2bbf8a;
        }
        .action-btn-sm.reject-btn {
            background: #ef4444;
            color: #fff;
        }
        .action-btn-sm.reject-btn:hover {
            background: #dc2626;
        }
        .action-btn-sm.delete-btn {
            background: #f43f5e;
            color: #fff;
        }
        .action-btn-sm.delete-btn:hover {
            background: #e11d48;
        }
        .application-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-pending {
            background: #fbbf24;
            color: #000;
        }
        .status-approved {
            background: #34d399;
            color: #000;
        }
        .status-rejected {
            background: #ef4444;
            color: #fff;
        }

        /* --- MODAL --- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-content::-webkit-scrollbar {
            width: 6px;
        }
        .modal-content::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            min-height: 44px;
            min-width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            color: var(--text-main);
            transform: rotate(90deg);
        }
        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .modal-title i {
            color: var(--cls-rotaract);
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--cls-galkot);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: flex-end;
        }
        .form-actions .action-btn {
            padding: 0.7rem 1.5rem;
            font-weight: 600;
        }
        .btn-save-accent {
            background: var(--cls-professional);
            border-color: var(--cls-professional);
            color: #000 !important;
        }
        .btn-save-accent:hover {
            background: #2bbf8a;
            border-color: #2bbf8a;
        }
        .btn-cancel-accent {
            border-color: rgba(239, 68, 68, 0.3) !important;
        }
        .btn-cancel-accent:hover {
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: rgba(239, 68, 68, 0.6) !important;
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
            .inquiries-feed {
                grid-template-columns: 1fr;
            }
            .modal-content {
                padding: 1.5rem;
                margin: 1rem;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .navbar {
                padding: 0.75rem 1rem;
            }
            .workspace-section {
                padding: 0 1rem;
            }
            .panel-header {
                flex-direction: column;
                align-items: stretch;
            }
            .panel-actions {
                flex-wrap: wrap;
            }
            .search-box-inline input {
                min-width: 100px;
                width: 100%;
            }
            .search-box-inline {
                flex: 1;
            }
            .nav-actions {
                flex-wrap: wrap;
            }
            .btn-back,
            .btn-logout {
                font-size: 0.75rem;
                padding: 0.4rem 0.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar" id="navbar" aria-label="Main Navigation">
        <a href="#" class="nav-logo">
            <i class="fa-solid fa-users" aria-hidden="true"></i> Members Management
        </a>
        <div class="nav-actions">
            <button class="btn-back" id="backToAdminBtn">
                <i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back to Admin
            </button>
            <button class="btn-logout" id="logout-btn">
                <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i> Log Out
            </button>
        </div>
    </nav>

    <!-- ===== HERO ===== -->
    <header class="hero">
        <h1><i class="fa-solid fa-users" style="color:var(--cls-rotaract);"></i> Members Management</h1>
        <p>Manage active members and review new registration requests in one place.</p>
    </header>

    <!-- ===== NEW MEMBER REGISTRATIONS ===== -->
    <section class="workspace-section" id="registrations-panel">
        <div class="panel-header">
            <h2><i class="fa-solid fa-user-plus" aria-hidden="true" style="color: var(--cls-rotaract);"></i> New Member Requests</h2>
            <div class="panel-actions">
                <button class="action-btn" id="refresh-registrations-btn"><i class="fa-solid fa-rotate"></i> Refresh</button>
                <button class="action-btn clear-btn-accent" id="clear-registrations-btn"><i class="fa-solid fa-trash-can" style="color:#ef4444;"></i> Clear All</button>
            </div>
        </div>
        <div class="inquiries-feed" id="registrations-feed">
            <div class="status-msg">Loading registration requests...</div>
        </div>
    </section>

    <!-- ===== ACTIVE MEMBERS ===== -->
    <section class="workspace-section" id="members-panel">
        <div class="panel-header">
            <h2><i class="fa-solid fa-user-check" aria-hidden="true" style="color: var(--cls-professional);"></i> Active Members</h2>
            <div class="panel-actions">
                <div class="search-box-inline">
                    <input type="text" id="memberSearchInput" placeholder="Search by name..." />
                    <button id="memberSearchBtn"><i class="fa-solid fa-search"></i> Search</button>
                </div>
                <button class="action-btn btn-add-accent" id="addMemberBtn"><i class="fa-solid fa-plus"></i> Add Member</button>
                <button class="action-btn" id="refresh-members-btn"><i class="fa-solid fa-rotate"></i> Refresh</button>
                <button class="action-btn clear-btn-accent" id="clear-members-btn"><i class="fa-solid fa-trash-can" style="color:#ef4444;"></i> Clear All</button>
            </div>
        </div>
        <div class="inquiries-feed" id="members-feed">
            <div class="status-msg">Loading registered members...</div>
        </div>
    </section>

    <!-- ===== MEMBER MODAL ===== -->
    <div class="modal-overlay" id="memberModal">
        <div class="modal-content">
            <button class="modal-close" id="memberModalCloseBtn" aria-label="Close member modal"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-title"><i class="fa-solid fa-user-plus" style="color: var(--cls-rotaract);"></i> <span id="memberModalTitle">Add New Member</span></div>
            <form id="memberForm">
                <input type="hidden" id="memberId" value="">
                <div class="form-group"><label for="memberName">Full Name *</label><input type="text" id="memberName" placeholder="e.g. Rtr. Nabin Chalise" required /></div>
                <div class="form-group"><label for="memberEmail">Email Address *</label><input type="email" id="memberEmail" placeholder="e.g. member@example.com" required /></div>
                <div class="form-group"><label for="memberPhone">Phone Number</label><input type="text" id="memberPhone" placeholder="e.g. 984-1234567" /></div>
                <div class="form-row">
                    <div class="form-group"><label for="memberGender">Gender</label>
                        <select id="memberGender"><option value="">Select</option><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option></select>
                    </div>
                    <div class="form-group"><label for="memberBlood">Blood Group</label>
                        <select id="memberBlood"><option value="">Select</option><option value="A+">A+</option><option value="A-">A-</option><option value="B+">B+</option><option value="B-">B-</option><option value="AB+">AB+</option><option value="AB-">AB-</option><option value="O+">O+</option><option value="O-">O-</option></select>
                    </div>
                </div>
                <div class="form-group"><label for="memberPosition">Position/Role</label><input type="text" id="memberPosition" placeholder="e.g. President, Secretary, Member" /></div>
                <div class="form-group"><label for="memberAddress">Address</label><input type="text" id="memberAddress" placeholder="e.g. Galkot Municipality-3, Baglung" /></div>
                <div class="form-group"><label for="memberProfession">Profession</label><input type="text" id="memberProfession" placeholder="e.g. ICT Teacher" /></div>
                <div class="form-group"><label for="memberBirthday">Birthday</label><input type="date" id="memberBirthday" /></div>
                <div class="form-actions">
                    <button type="button" class="action-btn btn-cancel-accent" id="memberModalCancelBtn">Cancel</button>
                    <button type="submit" class="action-btn btn-save-accent"><i class="fa-solid fa-floppy-disk"></i> <span id="memberSubmitBtnText">Save Member</span></button>
                </div>
            </form>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>&copy; 2026 Members Management Dashboard. Built for efficiency.</p>
    </footer>

    <!-- ============================================================ -->
    <!-- ===== JAVASCRIPT ===== -->
    <script>
        (() => {
            "use strict";

            // ---- SUPABASE CLIENT ----
            const SUPABASE_URL = "https://kbyfvqkfcxqgjjtfvvxf.supabase.co";
            const SUPABASE_KEY =
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtieWZ2cWtmY3hxZ2pqdGZ2dnhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NDM1MzMsImV4cCI6MjA5NjIxOTUzM30.TQQZJJi27pNcXMlD0m8MsrAbqjLHGgVnw-L3bNDR2bU";
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            let editingMemberId = null;
            let allMembersData = [];
            let registrationsData = [];

            const escapeHtml = (str) => {
                if (!str) return '';
                return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g,
                    "&quot;").replace(/'/g, "&#039;");
            };

            // ============================================================
            // ===== LOAD REGISTRATIONS =====
            // ============================================================
            const loadRegistrations = async () => {
                const feedContainer = document.getElementById('registrations-feed');
                if (!feedContainer) return;
                feedContainer.innerHTML = '<div class="status-msg"><i class="fa-solid fa-spinner fa-spin"></i> Loading registrations...</div>';
                try {
                    const { data, error } = await supabase
                        .from('member_registrations')
                        .select('*')
                        .order('created_at', { ascending: false });
                    if (error) throw error;
                    registrationsData = data || [];
                    if (!registrationsData.length) {
                        feedContainer.innerHTML = 'No pending registrations.';
                        return;
                    }
                    feedContainer.innerHTML = registrationsData.map(item => {
                        const firstName = item.name ? item.name.split(' ')[0] : '';
                        return `
                            <article class="inquiry-node" style="border-left-color: #fbbf24;">
                                <div class="node-meta"><span>ID: ${item.id}</span><span>${new Date(item.created_at).toLocaleString()}</span></div>
                                <div class="node-sender" style="color: var(--cls-rotaract);">
                                    <i class="fa-solid fa-user"></i> ${escapeHtml(item.name)}
                                    ${firstName ? `<span style="font-weight:400;color:var(--text-muted);font-size:0.9rem;">(${escapeHtml(firstName)})</span>` : ''}
                                </div>
                                <a href="mailto:${escapeHtml(item.email)}" class="node-email"><i class="fa-solid fa-envelope"></i> ${escapeHtml(item.email)}</a>
                                ${item.phone ? `<div style="font-size:0.9rem;color:var(--text-muted);"><i class="fa-solid fa-phone"></i> ${escapeHtml(item.phone)}</div>` : ''}
                                ${item.position ? `<div style="font-size:0.9rem;color:var(--text-muted);"><i class="fa-solid fa-briefcase"></i> ${escapeHtml(item.position)}</div>` : ''}
                                ${item.address ? `<div style="font-size:0.9rem;color:var(--text-muted);"><i class="fa-solid fa-location-dot"></i> ${escapeHtml(item.address)}</div>` : ''}
                                ${item.profession ? `<div style="font-size:0.9rem;color:var(--text-muted);"><i class="fa-solid fa-briefcase"></i> ${escapeHtml(item.profession)}</div>` : ''}
                                ${item.gender ? `<div style="font-size:0.9rem;color:var(--text-muted);"><i class="fa-solid fa-venus-mars"></i> ${escapeHtml(item.gender)}</div>` : ''}
                                ${item.blood_group ? `<div style="font-size:0.9rem;color:var(--text-muted);"><i class="fa-solid fa-droplet"></i> ${escapeHtml(item.blood_group)}</div>` : ''}
                                ${item.birthday || item.birth_date || item.date_of_birth ? `<div style="font-size:0.9rem;color:var(--text-muted);"><i class="fa-solid fa-calendar"></i> ${new Date(item.birthday || item.birth_date || item.date_of_birth).toLocaleDateString()}</div>` : ''}
                                <div class="application-actions">
                                    <button class="action-btn-sm approve-btn" onclick="window.acceptMember('${item.id}')"><i class="fa-solid fa-check"></i> Accept Member</button>
                                    <button class="action-btn-sm delete-btn" onclick="window.rejectRegistration('${item.id}')"><i class="fa-solid fa-trash"></i> Reject</button>
                                </div>
                            </article>
                        `;
                    }).join('');
                } catch (err) {
                    feedContainer.innerHTML =
                        `<div class="status-msg" style="color:#ef4444;">Error: ${err.message}</div>`;
                }
            };

            // ============================================================
            // ===== CLEAR ALL REGISTRATIONS =====
            // ============================================================
            document.getElementById('clear-registrations-btn')?.addEventListener('click', async () => {
                if (!confirm("⚠️ Are you sure you want to DELETE ALL registration requests permanently?")) return;
                const feedContainer = document.getElementById('registrations-feed');
                feedContainer.innerHTML = '<div class="status-msg"><i class="fa-solid fa-spinner fa-spin"></i> Deleting all registrations...</div>';
                try {
                    const { error } = await supabase
                        .from('member_registrations')
                        .delete()
                        .neq('id', 0);
                    if (error) throw error;
                    alert('✅ All registration requests deleted permanently from database.');
                    loadRegistrations();
                } catch (err) {
                    feedContainer.innerHTML = `<div class="status-msg" style="color:#ef4444;"><i class="fa-solid fa-circle-exclamation"></i> Error: ${err.message}</div>`;
                    alert('❌ Error clearing registrations: ' + err.message);
                }
            });

            // ============================================================
            // ===== ACCEPT MEMBER =====
            // ============================================================
            window.acceptMember = async (id) => {
                if (!confirm('Accept this member and move to active members list?')) return;

                try {
                    const reg = registrationsData.find(r => String(r.id) === String(id));
                    if (!reg) {
                        alert('Registration record not found. Please refresh and try again.');
                        return;
                    }

                    const memberData = {
                        name: reg.name || reg.full_name || '',
                        email: reg.email || '',
                        phone: reg.phone || reg.phone_number || '',
                        gender: reg.gender || '',
                        blood_group: reg.blood_group || '',
                        position: reg.position || reg.designation || '',
                        address: reg.address || '',
                        profession: reg.profession || '',
                        birthday: reg.birth_date || reg.birthday || reg.date_of_birth || null,
                        created_at: new Date().toISOString()
                    };

                    const { data: existing, error: checkError } = await supabase
                        .from('members')
                        .select('id')
                        .eq('email', memberData.email)
                        .maybeSingle();

                    if (checkError && checkError.code !== 'PGRST116') {
                        throw new Error('Error checking existing member: ' + checkError.message);
                    }

                    if (existing) {
                        alert('⚠️ This member already exists in the members list. Deleting from registrations...');
                        const { error: deleteError } = await supabase
                            .from('member_registrations')
                            .delete()
                            .eq('id', id);
                        if (deleteError) throw deleteError;
                        await loadRegistrations();
                        await loadMembers(document.getElementById('memberSearchInput')?.value || '');
                        return;
                    }

                    const { data: insertData, error: insertError } = await supabase
                        .from('members')
                        .insert([memberData])
                        .select();

                    if (insertError) {
                        console.error('❌ Insert error:', insertError);
                        throw new Error(insertError.message);
                    }

                    const { error: deleteError } = await supabase
                        .from('member_registrations')
                        .delete()
                        .eq('id', id);

                    if (deleteError) {
                        console.error('❌ Delete error:', deleteError);
                        throw new Error(deleteError.message);
                    }

                    alert('✅ Member accepted and added to active members list!');

                    await loadRegistrations();
                    await loadMembers(document.getElementById('memberSearchInput')?.value || '');

                } catch (err) {
                    console.error('❌ Error in acceptMember:', err);
                    alert('❌ Error accepting member: ' + err.message);
                }
            };

            // ============================================================
// CROSS-TAB LOGOUT + INACTIVITY TIMEOUT (60 seconds)
// ============================================================
(function() {
  "use strict";

  // ---- 1. CROSS-TAB SYNC: Listen for auth state changes ----
  // This ensures that signing out from one tab signs out all tabs.
  supabase.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT' || !session) {
      // Avoid redirect loop if already on the login page
      if (!window.location.pathname.includes('/index.html')) {
        window.location.href = '/index.html';
      }
    }
  });

  // ---- 2. INACTIVITY TIMEOUT ----
  const INACTIVITY_TIMEOUT = 60 * 1000; // 60 seconds (1 minute)
  let logoutTimer = null;

  // Function to perform logout (triggers the cross-tab sync via the listener above)
  const performLogout = async () => {
    try {
      await supabase.auth.signOut();
      // The onAuthStateChange listener will handle the redirect,
      // but we also set a fallback redirect just in case.
      if (!window.location.pathname.includes('/index.html')) {
        window.location.href = '/index.html';
      }
    } catch (err) {
      console.error('Auto-logout error:', err);
    }
  };

  // Reset the timer on user activity
  const resetTimer = () => {
    if (logoutTimer) clearTimeout(logoutTimer);
    logoutTimer = setTimeout(performLogout, INACTIVITY_TIMEOUT);
  };

  // Activity events that reset the timer
  const activityEvents = [
    'mousedown', 'mousemove', 'keydown',
    'scroll', 'touchstart', 'click', 'wheel'
  ];

  // Attach event listeners
  activityEvents.forEach(event => {
    document.addEventListener(event, resetTimer, { passive: true });
  });

  // Reset when the user returns to the tab
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) resetTimer();
  });

  // ---- Start the timer ----
  resetTimer();

  // ---- Cleanup on page unload ----
  window.addEventListener('beforeunload', () => {
    if (logoutTimer) clearTimeout(logoutTimer);
  });

  // (Optional) Expose a manual reset function if needed
  window.resetInactivityTimer = resetTimer;

})();



// ============================================================
            // ===== REJECT REGISTRATION =====
            // ============================================================
            window.rejectRegistration = async (id) => {
                if (!confirm('Reject this registration? This will delete it permanently.')) return;

                try {
                    const { error } = await supabase
                        .from('member_registrations')
                        .delete()
                        .eq('id', id);

                    if (error) {
                        console.error('❌ Delete error:', error);
                        throw new Error(error.message);
                    }

                    alert('✅ Registration rejected and removed.');
                    await loadRegistrations();

                } catch (err) {
                    console.error('❌ Error in rejectRegistration:', err);
                    alert('❌ Error rejecting registration: ' + err.message);
                }
            };

            // ============================================================
            // ===== LOAD MEMBERS =====
            // ============================================================
            const loadMembers = async (searchTerm = '') => {
                const feedContainer = document.getElementById('members-feed');
                if (!feedContainer) return;
                feedContainer.innerHTML = '<div class="status-msg"><i class="fa-solid fa-spinner fa-spin"></i> Loading members...</div>';
                try {
                    let query = supabase.from('members').select('*').order('id', { ascending: false });
                    if (searchTerm) {
                        query = query.ilike('name', `%${searchTerm}%`);
                    }
                    const { data, error } = await query;
                    if (error) throw error;
                    allMembersData = data || [];
                    if (!allMembersData.length) {
                        feedContainer.innerHTML = 'No members found in the database. Click "Add Member" to get started.';
                        return;
                    }
                    feedContainer.innerHTML = allMembersData.map(item => `
                        <article class="inquiry-node" style="border-left-color: var(--cls-rotaract);">
                            <div class="node-meta"><span>ID: ${item.id}</span><span>${item.created_at ? new Date(item.created_at).toLocaleString() : 'N/A'}</span></div>
                            <div class="node-sender" style="color: var(--cls-rotaract);"><i class="fa-solid fa-user" aria-hidden="true"></i> ${escapeHtml(item.name)}</div>
                            <a href="mailto:${escapeHtml(item.email)}" class="node-email"><i class="fa-solid fa-envelope" aria-hidden="true"></i> ${escapeHtml(item.email)}</a>
                            ${item.phone ? `<div style="font-size: 0.9rem; color: var(--text-muted);"><i class="fa-solid fa-phone" aria-hidden="true"></i> ${escapeHtml(item.phone)}</div>` : ''}
                            ${item.position ? `<div style="font-size: 0.9rem; color: var(--text-muted);"><i class="fa-solid fa-briefcase" aria-hidden="true"></i> ${escapeHtml(item.position)}</div>` : ''}
                            ${item.address ? `<div style="font-size: 0.9rem; color: var(--text-muted);"><i class="fa-solid fa-location-dot" aria-hidden="true"></i> ${escapeHtml(item.address)}</div>` : ''}
                            ${item.profession ? `<div style="font-size: 0.9rem; color: var(--text-muted);"><i class="fa-solid fa-briefcase" aria-hidden="true"></i> ${escapeHtml(item.profession)}</div>` : ''}
                            ${item.gender ? `<div style="font-size: 0.9rem; color: var(--text-muted);"><i class="fa-solid fa-venus-mars" aria-hidden="true"></i> ${escapeHtml(item.gender)}</div>` : ''}
                            ${item.blood_group ? `<div style="font-size: 0.9rem; color: var(--text-muted);"><i class="fa-solid fa-droplet" aria-hidden="true"></i> ${escapeHtml(item.blood_group)}</div>` : ''}
                            ${item.birthday ? `<div style="font-size: 0.9rem; color: var(--text-muted);"><i class="fa-solid fa-calendar" aria-hidden="true"></i> ${new Date(item.birthday).toLocaleDateString()}</div>` : ''}
                            <div class="application-actions">
                                <button class="action-btn-sm approve-btn" onclick="window.editMember(${item.id})"><i class="fa-solid fa-pen-to-square"></i> Edit</button>
                                <button class="action-btn-sm delete-btn" onclick="window.deleteMember(${item.id})"><i class="fa-solid fa-trash"></i> Delete</button>
                            </div>
                        </article>
                    `).join('');
                } catch (err) {
                    feedContainer.innerHTML =
                        `<div class="status-msg" style="color:#ef4444;"><i class="fa-solid fa-circle-exclamation"></i> Error loading members: ${err.message}</div>`;
                }
            };

            // ============================================================
            // ===== DELETE MEMBER =====
            // ============================================================
            window.deleteMember = async (id) => {
                if (!confirm('Are you sure you want to permanently delete this member? This action cannot be undone.'))
                    return;
                try {
                    const { error } = await supabase.from('members').delete().eq('id', id);
                    if (error) throw error;
                    alert('✅ Member deleted successfully!');
                    loadMembers(document.getElementById('memberSearchInput').value);
                } catch (err) { alert('Error deleting member: ' + err.message); }
            };

            // ============================================================
            // ===== CLEAR ALL MEMBERS =====
            // ============================================================
            document.getElementById('clear-members-btn')?.addEventListener('click', async () => {
                if (!confirm("⚠️ Are you sure you want to DELETE ALL members permanently from the database?")) return;
                const feedContainer = document.getElementById('members-feed');
                feedContainer.innerHTML = '<div class="status-msg"><i class="fa-solid fa-spinner fa-spin"></i> Deleting all members...</div>';
                try {
                    const { error } = await supabase
                        .from('members')
                        .delete()
                        .neq('id', 0);
                    if (error) throw error;
                    alert('✅ All members deleted permanently from database.');
                    loadMembers();
                } catch (err) {
                    feedContainer.innerHTML = `<div class="status-msg" style="color:#ef4444;"><i class="fa-solid fa-circle-exclamation"></i> Error: ${err.message}</div>`;
                    alert('❌ Error clearing members: ' + err.message);
                }
            });

            // ============================================================
            // ===== EDIT MEMBER =====
            // ============================================================
            window.editMember = async (id) => {
                try {
                    const { data, error } = await supabase.from('members').select('*').eq('id', id).single();
                    if (error) throw error;
                    if (!data) { alert('Member not found.'); return; }
                    editingMemberId = id;
                    document.getElementById('memberId').value = id;
                    document.getElementById('memberName').value = data.name || '';
                    document.getElementById('memberEmail').value = data.email || '';
                    document.getElementById('memberPhone').value = data.phone || '';
                    document.getElementById('memberGender').value = data.gender || '';
                    document.getElementById('memberBlood').value = data.blood_group || '';
                    document.getElementById('memberPosition').value = data.position || '';
                    document.getElementById('memberAddress').value = data.address || '';
                    document.getElementById('memberProfession').value = data.profession || '';
                    document.getElementById('memberBirthday').value = data.birthday ? data.birthday.split('T')[0] : '';
                    document.getElementById('memberModalTitle').textContent = 'Edit Member';
                    document.getElementById('memberSubmitBtnText').textContent = 'Update Member';
                    document.getElementById('memberModal').classList.add('active');
                } catch (err) { alert('Error loading member data: ' + err.message); }
            };

            // ============================================================
            // ===== OPEN ADD MEMBER MODAL =====
            // ============================================================
            const openAddMemberModal = () => {
                editingMemberId = null;
                document.getElementById('memberForm').reset();
                document.getElementById('memberId').value = '';
                document.getElementById('memberModalTitle').textContent = 'Add New Member';
                document.getElementById('memberSubmitBtnText').textContent = 'Save Member';
                document.getElementById('memberModal').classList.add('active');
            };

            const closeMemberModal = () => {
                document.getElementById('memberModal').classList.remove('active');
                editingMemberId = null;
            };

            // ============================================================
            // ===== MEMBER FORM SUBMIT =====
            // ============================================================
            document.getElementById('memberForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const memberData = {
                    name: document.getElementById('memberName').value.trim(),
                    email: document.getElementById('memberEmail').value.trim(),
                    phone: document.getElementById('memberPhone').value.trim(),
                    gender: document.getElementById('memberGender').value,
                    blood_group: document.getElementById('memberBlood').value,
                    position: document.getElementById('memberPosition').value.trim(),
                    address: document.getElementById('memberAddress').value.trim(),
                    profession: document.getElementById('memberProfession').value.trim(),
                    birthday: document.getElementById('memberBirthday').value || null
                };
                if (!memberData.name || !memberData.email) {
                    alert('Name and Email are required fields.');
                    return;
                }
                const memberId = document.getElementById('memberId').value;
                try {
                    let result;
                    if (memberId) {
                        result = await supabase.from('members').update(memberData).eq('id', parseInt(memberId));
                    } else {
                        result = await supabase.from('members').insert([memberData]);
                    }
                    if (result.error) throw result.error;
                    alert(memberId ? '✅ Member updated successfully!' : '✅ New member added successfully!');
                    closeMemberModal();
                    loadMembers(document.getElementById('memberSearchInput').value);
                } catch (err) { alert('❌ Error saving member: ' + err.message); }
            });

            document.getElementById('memberModalCloseBtn')?.addEventListener('click', closeMemberModal);
            document.getElementById('memberModalCancelBtn')?.addEventListener('click', closeMemberModal);
            document.getElementById('memberModal')?.addEventListener('click', (e) => {
                if (e.target === document.getElementById('memberModal')) closeMemberModal();
            });
            document.getElementById('addMemberBtn')?.addEventListener('click', openAddMemberModal);

            document.getElementById('memberSearchBtn')?.addEventListener('click', () => {
                const searchTerm = document.getElementById('memberSearchInput').value.trim();
                loadMembers(searchTerm);
            });
            document.getElementById('memberSearchInput')?.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') {
                    const searchTerm = document.getElementById('memberSearchInput').value.trim();
                    loadMembers(searchTerm);
                }
            });

            document.getElementById('refresh-members-btn')?.addEventListener('click', () => {
                loadMembers(document.getElementById('memberSearchInput').value);
            });
            document.getElementById('refresh-registrations-btn')?.addEventListener('click', loadRegistrations);

            // ============================================================
            // ===== REALTIME SUBSCRIPTIONS =====
            // ============================================================
            const setupRealtimeSubscriptions = () => {
                supabase.channel('members-changes')
                    .on('postgres_changes', {
                        event: '*',
                        schema: 'public',
                        table: 'members'
                    }, () => {
                        console.log('🔄 Members table changed, refreshing...');
                        loadMembers(document.getElementById('memberSearchInput').value);
                    })
                    .subscribe((status) => {
                        console.log('📡 Members subscription status:', status);
                    });

                supabase.channel('registrations-changes')
                    .on('postgres_changes', {
                        event: '*',
                        schema: 'public',
                        table: 'member_registrations'
                    }, () => {
                        console.log('🔄 Registrations table changed, refreshing...');
                        loadRegistrations();
                    })
                    .subscribe((status) => {
                        console.log('📡 Registrations subscription status:', status);
                    });
            };

            // ============================================================
            // ===== SESSION VERIFICATION =====
            // ============================================================
            const verifySecureAuthentication = async () => {
                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session) {
                        await Promise.all([
                            loadRegistrations(),
                            loadMembers()
                        ]);
                        setupRealtimeSubscriptions();
                    } else {
                        window.location.href = '/index.html';
                    }
                } catch (error) {
                    console.error('Auth error:', error);
                    window.location.href = '/index.html';
                }
            };

            // ============================================================
            // ===== NAVBAR SCROLL =====
            // ============================================================
            const navbar = document.getElementById('navbar');
            window.addEventListener('scroll', () => {
                navbar.classList.toggle('scrolled', window.scrollY > 50);
            });

            // ============================================================
            // ===== BACK TO ADMIN =====
            // ============================================================
            document.getElementById('backToAdminBtn')?.addEventListener('click', () => {
                window.location.href = 'admin.html';
            });

            // ============================================================
            // ===== LOGOUT =====
            // ============================================================
            document.getElementById('logout-btn')?.addEventListener('click', async (e) => {
                e.preventDefault();
                await supabase.auth.signOut();
                window.location.href = '/index.html';
            });

            // ============================================================
            // ===== DOM CONTENT LOADED =====
            // ============================================================
            document.addEventListener('DOMContentLoaded', () => {
                verifySecureAuthentication();
            });

        })();
    </script>
</body>
</html>
