<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Members · Image Upload & Status</title>
    <meta name="description" content="Manage members with profile image upload, Active/Inactive status, realtime sync." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --cls-personal: #38bdf8;
            --cls-professional: #34d399;
            --cls-galkot: #fbbf24;
            --cls-rotaract: #f43f5e;
            --cls-links: #a78bfa;
            --primary: #D70060;
            --secondary: #015491;
            --cta-logout: #ef4444;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg-dark: #f8fafc;
                --bg-card: rgba(255, 255, 255, 0.8);
                --border-color: rgba(0, 0, 0, 0.08);
                --text-main: #0f172a;
                --text-muted: #64748b;
            }
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            background-image: radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(244, 63, 94, 0.03) 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
        }
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition-smooth);
        }
        .navbar.scrolled {
            padding: 0.6rem 2rem;
            background: rgba(15, 23, 42, 0.95);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .nav-logo {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-logo i {
            color: var(--cls-rotaract);
        }
        .nav-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .btn-back {
            background: var(--cls-galkot);
            color: #000 !important;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            text-decoration: none;
            min-height: 44px;
        }
        .btn-back:hover {
            background: #e5a800;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.3);
        }
        .btn-logout {
            background: var(--cta-logout);
            color: #fff !important;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            min-height: 44px;
        }
        .btn-logout:hover {
            background: var(--cta-logout-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }
        .hero {
            padding: 8rem 2rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(to right, var(--cls-rotaract), var(--cls-professional));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 650px;
            margin: 0 auto;
        }
        .workspace-section {
            max-width: 1200px;
            margin: 0 auto 3rem;
            padding: 0 2rem;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .panel-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .panel-header h2 i {
            color: var(--cls-rotaract);
        }
        .panel-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            font-family: 'Inter', sans-serif;
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .clear-btn-accent {
            border-color: rgba(239, 68, 68, 0.25) !important;
        }
        .clear-btn-accent:hover {
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: rgba(239, 68, 68, 0.6) !important;
        }
        .btn-add-accent {
            background: var(--cls-professional);
            border-color: var(--cls-professional);
            color: #000 !important;
        }
        .btn-add-accent:hover {
            background: #2bbf8a;
            border-color: #2bbf8a;
        }
        .members-feed {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }
        .member-node {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--cls-rotaract);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            backdrop-filter: blur(20px);
            transition: var(--transition-smooth);
        }
        .member-node:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }
        .member-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border-color);
            flex-shrink: 0;
        }
        .member-header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .member-header .node-title {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .node-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .node-detail {
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .status-badge {
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .status-active {
            background: #34d399;
            color: #000;
        }
        .status-inactive {
            background: #94a3b8;
            color: #000;
        }
        .application-actions {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        .action-btn-sm {
            padding: 0.3rem 0.75rem;
            font-size: 0.7rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition-smooth);
            font-family: 'Inter', sans-serif;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        .action-btn-sm.edit-btn {
            background: var(--cls-galkot);
            color: #000;
        }
        .action-btn-sm.edit-btn:hover {
            background: #e5a800;
            transform: scale(1.02);
        }
        .action-btn-sm.delete-btn {
            background: #f43f5e;
            color: #fff;
        }
        .action-btn-sm.delete-btn:hover {
            background: #e11d48;
            transform: scale(1.02);
        }
        .action-btn-sm.status-toggle {
            background: #3b82f6;
            color: #fff;
        }
        .action-btn-sm.status-toggle:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
        .action-btn-sm.status-toggle.inactive-toggle {
            background: #f59e0b;
            color: #000;
        }
        .action-btn-sm.status-toggle.inactive-toggle:hover {
            background: #d97706;
        }
        .search-box-inline {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.2rem 0.2rem 0.2rem 0.8rem;
        }
        .search-box-inline input {
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 0.4rem 0;
            font-size: 0.85rem;
            outline: none;
            min-width: 140px;
            font-family: 'Inter', sans-serif;
        }
        .search-box-inline input::placeholder {
            color: var(--text-muted);
        }
        .search-box-inline button {
            background: var(--cls-links);
            border: none;
            color: #000;
            padding: 0.3rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            font-family: 'Inter', sans-serif;
        }
        .search-box-inline button:hover {
            background: #9370db;
        }
        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-style: italic;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-content::-webkit-scrollbar {
            width: 6px;
        }
        .modal-content::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            min-height: 44px;
            min-width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            color: var(--text-main);
            transform: rotate(90deg);
        }
        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .modal-title i {
            color: var(--cls-rotaract);
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--cls-galkot);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: flex-end;
            flex-wrap: wrap;
        }
        .form-actions .action-btn {
            padding: 0.7rem 1.5rem;
            font-weight: 600;
        }
        .btn-save-accent {
            background: var(--cls-professional);
            border-color: var(--cls-professional);
            color: #000 !important;
        }
        .btn-save-accent:hover {
            background: #2bbf8a;
            border-color: #2bbf8a;
        }
        .btn-cancel-accent {
            border-color: rgba(239, 68, 68, 0.3) !important;
        }
        .btn-cancel-accent:hover {
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: rgba(239, 68, 68, 0.6) !important;
        }
        .image-preview {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        .image-preview img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-color);
            background: rgba(255, 255, 255, 0.05);
        }
        .image-preview .no-image {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .file-input-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .file-input-wrapper input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .file-input-wrapper .action-btn {
            pointer-events: none;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: #f8fafc;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border-left: 4px solid #34d399;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            font-weight: 500;
            z-index: 9999;
            max-width: 400px;
            animation: slideIn 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .toast.error {
            border-left-color: #ef4444;
        }
        .toast.info {
            border-left-color: #3b82f6;
        }
        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
            .members-feed {
                grid-template-columns: 1fr;
            }
            .modal-content {
                padding: 1.5rem;
                margin: 1rem;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .navbar {
                padding: 0.75rem 1rem;
            }
            .workspace-section {
                padding: 0 1rem;
            }
            .panel-header {
                flex-direction: column;
                align-items: stretch;
            }
            .panel-actions {
                flex-wrap: wrap;
            }
            .search-box-inline input {
                min-width: 100px;
                width: 100%;
            }
            .search-box-inline {
                flex: 1;
            }
            .nav-actions {
                flex-wrap: wrap;
            }
            .btn-back,
            .btn-logout {
                font-size: 0.75rem;
                padding: 0.4rem 0.8rem;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar" id="navbar">
        <a href="#" class="nav-logo"><i class="fa-solid fa-users"></i> Members · Image</a>
        <div class="nav-actions">
            <button class="btn-back" id="backToAdminBtn"><i class="fa-solid fa-arrow-left"></i> Back</button>
            <button class="btn-logout" id="logout-btn"><i class="fa-solid fa-right-from-bracket"></i> Log Out</button>
        </div>
    </nav>

    <header class="hero">
        <h1><i class="fa-solid fa-address-card" style="color:var(--cls-rotaract);"></i> Members Management</h1>
        <p>Active / Inactive · Profile image upload · Realtime sync</p>
    </header>

    <section class="workspace-section" id="members-panel">
        <div class="panel-header">
            <h2><i class="fa-solid fa-user-check" style="color: var(--cls-professional);"></i> Members</h2>
            <div class="panel-actions">
                <div class="search-box-inline">
                    <input type="text" id="memberSearchInput" placeholder="Search by name..." />
                    <button id="memberSearchBtn"><i class="fa-solid fa-search"></i> Search</button>
                </div>
                <button class="action-btn btn-add-accent" id="addMemberBtn"><i class="fa-solid fa-plus"></i> Add</button>
                <button class="action-btn" id="refresh-members-btn"><i class="fa-solid fa-rotate"></i> Refresh</button>
                <button class="action-btn clear-btn-accent" id="clear-members-btn"><i class="fa-solid fa-trash-can" style="color:#ef4444;"></i> Clear All</button>
            </div>
        </div>
        <div class="members-feed" id="members-feed">
            <div class="status-msg">Loading members...</div>
        </div>
    </section>

    <!-- MODAL -->
    <div class="modal-overlay" id="memberModal">
        <div class="modal-content">
            <button class="modal-close" id="memberModalCloseBtn"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-title"><i class="fa-solid fa-user-pen" style="color: var(--cls-rotaract);"></i> <span id="memberModalTitle">Add / Edit Member</span></div>
            <form id="memberForm">
                <input type="hidden" id="memberId" value="">
                <div class="form-group"><label>Full Name *</label><input type="text" id="memberName" placeholder="Rtr. Nabin Chalise" required /></div>
                <div class="form-group"><label>Email *</label><input type="email" id="memberEmail" placeholder="member@example.com" required /></div>
                <div class="form-row">
                    <div class="form-group"><label>Phone</label><input type="text" id="memberPhone" placeholder="984-1234567" /></div>
                    <div class="form-group"><label>Gender</label>
                        <select id="memberGender"><option value="">Select</option><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option></select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Blood Group</label>
                        <select id="memberBlood"><option value="">Select</option><option value="A+">A+</option><option value="A-">A-</option><option value="B+">B+</option><option value="B-">B-</option><option value="AB+">AB+</option><option value="AB-">AB-</option><option value="O+">O+</option><option value="O-">O-</option></select>
                    </div>
                    <div class="form-group"><label>Position</label><input type="text" id="memberPosition" placeholder="President, Secretary" /></div>
                </div>
                <div class="form-group"><label>Address</label><input type="text" id="memberAddress" placeholder="Galkot Municipality-3" /></div>
                <div class="form-group"><label>Profession</label><input type="text" id="memberProfession" placeholder="ICT Teacher" /></div>
                <div class="form-group"><label>Birthday</label><input type="date" id="memberBirthday" /></div>
                <div class="form-group"><label>Status</label>
                    <select id="memberStatus"><option value="active">Active</option><option value="inactive">Inactive</option></select>
                </div>

                <!-- Image Upload -->
                <div class="form-group">
                    <label>Profile Image</label>
                    <div class="image-preview" id="imagePreviewContainer">
                        <img id="imagePreview" src="" alt="Profile preview" style="display:none;" />
                        <span class="no-image" id="noImageText">No image uploaded</span>
                    </div>
                    <div style="display:flex; gap:0.5rem; margin-top:0.5rem; flex-wrap:wrap;">
                        <div class="file-input-wrapper">
                            <button type="button" class="action-btn" style="pointer-events:none;"><i class="fa-solid fa-upload"></i> Choose Image</button>
                            <input type="file" id="profileImageInput" accept="image/*" />
                        </div>
                        <button type="button" class="action-btn clear-btn-accent" id="removeImageBtn" style="border-color:rgba(239,68,68,0.3);"><i class="fa-solid fa-trash-can"></i> Remove</button>
                    </div>
                    <input type="hidden" id="profileImageUrl" value="" />
                </div>

                <div class="form-actions">
                    <button type="button" class="action-btn btn-cancel-accent" id="memberModalCancelBtn">Cancel</button>
                    <button type="submit" class="action-btn btn-save-accent"><i class="fa-solid fa-floppy-disk"></i> <span id="memberSubmitBtnText">Save Member</span></button>
                </div>
            </form>
        </div>
    </div>

    <footer><p>&copy; 2026 Members · Image Upload & Status</p></footer>

    <script>
        (() => {
            "use strict";

            const SUPABASE_URL = "https://kbyfvqkfcxqgjjtfvvxf.supabase.co";
            const SUPABASE_KEY =
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtieWZ2cWtmY3hxZ2pqdGZ2dnhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NDM1MzMsImV4cCI6MjA5NjIxOTUzM30.TQQZJJi27pNcXMlD0m8MsrAbqjLHGgVnw-L3bNDR2bU";
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

            // Use this bucket name - make sure it exists in your Supabase Storage
            const STORAGE_BUCKET = 'members-profile';

            let editingMemberId = null;
            let allMembers = [];
            let currentImageFile = null;
            let existingImageUrl = '';

            const escapeHtml = (str) => {
                if (!str) return '';
                return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g,
                    "&quot;").replace(/'/g, "&#039;");
            };

            const showToast = (message, type = 'success') => {
                const existing = document.querySelector('.toast');
                if (existing) existing.remove();
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                document.body.appendChild(toast);
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateX(100%)';
                    setTimeout(() => toast.remove(), 400);
                }, 3000);
            };

            // ---------- IMAGE UPLOAD HELPERS ----------
            const uploadImage = async (file, memberId) => {
                if (!file) return null;
                const ext = file.name.split('.').pop() || 'jpg';
                const fileName = `member_${memberId}_${Date.now()}.${ext}`;

                try {
                    // First, try to upload to the bucket
                    const { data, error } = await supabase.storage
                        .from(STORAGE_BUCKET)
                        .upload(fileName, file, {
                            cacheControl: '3600',
                            upsert: true,
                        });

                    if (error) {
                        console.error('Upload error:', error);
                        throw new Error('Upload failed: ' + error.message);
                    }

                    // Get the public URL
                    const { data: urlData } = supabase.storage
                        .from(STORAGE_BUCKET)
                        .getPublicUrl(fileName);

                    return urlData.publicUrl;
                } catch (err) {
                    console.error('Upload error:', err);
                    throw new Error('Image upload failed: ' + err.message);
                }
            };

            const deleteOldImage = async (imageUrl) => {
                if (!imageUrl) return;
                try {
                    // Extract filename from URL
                    const urlParts = imageUrl.split(`/storage/v1/object/public/${STORAGE_BUCKET}/`);
                    if (urlParts.length > 1) {
                        const path = urlParts[1];
                        await supabase.storage.from(STORAGE_BUCKET).remove([path]);
                    } else {
                        // Try to extract from any URL pattern
                        const match = imageUrl.match(/\/([^\/]+\.(jpg|jpeg|png|gif|webp|svg))$/i);
                        if (match) {
                            await supabase.storage.from(STORAGE_BUCKET).remove([match[1]]);
                        }
                    }
                } catch (e) {
                    console.warn('Could not delete old image:', e);
                }
            };

            // ---------- LOAD MEMBERS ----------
            const loadMembers = async (searchTerm = '') => {
                const feed = document.getElementById('members-feed');
                if (!feed) return;
                feed.innerHTML = '<div class="status-msg"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>';
                try {
                    let query = supabase.from('members').select('*').order('id', { ascending: false });
                    if (searchTerm && searchTerm.trim()) {
                        query = query.ilike('name', `%${searchTerm.trim()}%`);
                    }
                    const { data, error } = await query;
                    if (error) throw error;
                    allMembers = data || [];

                    if (!allMembers.length) {
                        feed.innerHTML = '📋 No members. Click "Add" to create one.';
                        return;
                    }

                    feed.innerHTML = allMembers.map(item => {
                        const status = item.status || 'active';
                        const badgeClass = status === 'active' ? 'status-active' : 'status-inactive';
                        const toggleText = status === 'active' ? 'Set Inactive' : 'Set Active';
                        const toggleClass = status === 'active' ? '' : 'inactive-toggle';
                        const profileImg = item.profile_image || item.photo || item.photo_url || '';
                        return `
                            <article class="member-node" style="border-left-color: ${status === 'active' ? 'var(--cls-rotaract)' : '#94a3b8'};">
                                <div class="node-meta">
                                    <span>ID: ${item.id}</span>
                                    <span class="status-badge ${badgeClass}">${status}</span>
                                </div>
                                <div class="member-header">
                                    ${profileImg ? `<img src="${escapeHtml(profileImg)}" class="member-avatar" alt="avatar" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />` : ''}
                                    <div class="member-avatar" style="${profileImg ? 'display:none;' : 'display:flex;'}align-items:center;justify-content:center;background:rgba(255,255,255,0.05);"><i class="fa-solid fa-user" style="color:var(--text-muted);font-size:1.5rem;"></i></div>
                                    <div class="node-title">${escapeHtml(item.name)}</div>
                                </div>
                                <a href="mailto:${escapeHtml(item.email)}" class="node-detail" style="color: var(--cls-personal);">${escapeHtml(item.email)}</a>
                                ${item.phone ? `<div class="node-detail"><i class="fa-solid fa-phone"></i> ${escapeHtml(item.phone)}</div>` : ''}
                                ${item.position ? `<div class="node-detail"><i class="fa-solid fa-briefcase"></i> ${escapeHtml(item.position)}</div>` : ''}
                                ${item.address ? `<div class="node-detail"><i class="fa-solid fa-location-dot"></i> ${escapeHtml(item.address)}</div>` : ''}
                                ${item.profession ? `<div class="node-detail"><i class="fa-solid fa-briefcase"></i> ${escapeHtml(item.profession)}</div>` : ''}
                                ${item.gender ? `<div class="node-detail"><i class="fa-solid fa-venus-mars"></i> ${escapeHtml(item.gender)}</div>` : ''}
                                ${item.blood_group ? `<div class="node-detail"><i class="fa-solid fa-droplet"></i> ${escapeHtml(item.blood_group)}</div>` : ''}
                                ${item.birthday ? `<div class="node-detail"><i class="fa-solid fa-calendar"></i> ${new Date(item.birthday).toLocaleDateString()}</div>` : ''}
                                <div class="application-actions">
                                    <button class="action-btn-sm status-toggle ${toggleClass}" data-id="${item.id}" data-action="toggle-status"><i class="fa-solid fa-arrows-rotate"></i> ${toggleText}</button>
                                    <button class="action-btn-sm edit-btn" data-id="${item.id}" data-action="edit"><i class="fa-solid fa-pen-to-square"></i> Edit</button>
                                    <button class="action-btn-sm delete-btn" data-id="${item.id}" data-action="delete"><i class="fa-solid fa-trash"></i> Delete</button>
                                </div>
                            </article>
                        `;
                    }).join('');

                    document.querySelectorAll('#members-feed .action-btn-sm').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const id = parseInt(btn.dataset.id);
                            const action = btn.dataset.action;
                            if (action === 'delete') deleteMember(id);
                            else if (action === 'edit') editMember(id);
                            else if (action === 'toggle-status') toggleMemberStatus(id);
                        });
                    });

                } catch (err) {
                    feed.innerHTML =
                        `<div class="status-msg" style="color:#ef4444;"><i class="fa-solid fa-circle-exclamation"></i> ${err.message}</div>`;
                    showToast('Error loading members: ' + err.message, 'error');
                }
            };

            // ---------- TOGGLE STATUS ----------
            const toggleMemberStatus = async (id) => {
                try {
                    const member = allMembers.find(m => m.id === id);
                    if (!member) { showToast('Member not found.', 'error'); return; }
                    const newStatus = member.status === 'active' ? 'inactive' : 'active';
                    const { error } = await supabase
                        .from('members')
                        .update({ status: newStatus })
                        .eq('id', id);
                    if (error) throw error;
                    showToast(`✅ Status updated to ${newStatus}`, 'success');
                    await loadMembers(document.getElementById('memberSearchInput').value);
                } catch (err) {
                    showToast('❌ Error toggling status: ' + err.message, 'error');
                }
            };

            // ---------- DELETE ----------
            const deleteMember = async (id) => {
                if (!confirm(`⚠️ Delete member #${id}?`)) return;
                try {
                    const member = allMembers.find(m => m.id === id);
                    if (member && (member.profile_image || member.photo || member.photo_url)) {
                        await deleteOldImage(member.profile_image || member.photo || member.photo_url);
                    }
                    const { error } = await supabase.from('members').delete().eq('id', id);
                    if (error) throw error;
                    showToast(`🗑️ Member #${id} deleted`, 'success');
                    await loadMembers(document.getElementById('memberSearchInput').value);
                } catch (err) {
                    showToast('❌ Error deleting: ' + err.message, 'error');
                }
            };

            // ---------- EDIT (load into modal) ----------
            const editMember = async (id) => {
                try {
                    const { data, error } = await supabase.from('members').select('*').eq('id', id).single();
                    if (error) throw error;
                    if (!data) { showToast('Member not found.', 'error'); return; }

                    editingMemberId = id;
                    document.getElementById('memberId').value = id;
                    document.getElementById('memberName').value = data.name || '';
                    document.getElementById('memberEmail').value = data.email || '';
                    document.getElementById('memberPhone').value = data.phone || '';
                    document.getElementById('memberGender').value = data.gender || '';
                    document.getElementById('memberBlood').value = data.blood_group || '';
                    document.getElementById('memberPosition').value = data.position || '';
                    document.getElementById('memberAddress').value = data.address || '';
                    document.getElementById('memberProfession').value = data.profession || '';
                    document.getElementById('memberBirthday').value = data.birthday ? data.birthday.split('T')[0] : '';
                    document.getElementById('memberStatus').value = data.status || 'active';

                    // Image
                    const imgUrl = data.profile_image || data.photo || data.photo_url || '';
                    existingImageUrl = imgUrl;
                    document.getElementById('profileImageUrl').value = imgUrl;
                    const preview = document.getElementById('imagePreview');
                    const noText = document.getElementById('noImageText');
                    if (imgUrl) {
                        preview.src = imgUrl;
                        preview.style.display = 'block';
                        noText.style.display = 'none';
                    } else {
                        preview.style.display = 'none';
                        noText.style.display = 'inline';
                    }
                    currentImageFile = null;

                    document.getElementById('memberModalTitle').textContent = 'Edit Member';
                    document.getElementById('memberSubmitBtnText').textContent = 'Update Member';
                    document.getElementById('memberModal').classList.add('active');
                } catch (err) {
                    showToast('Error loading member: ' + err.message, 'error');
                }
            };

            // ---------- OPEN ADD MODAL ----------
            const openAddModal = () => {
                editingMemberId = null;
                document.getElementById('memberForm').reset();
                document.getElementById('memberId').value = '';
                document.getElementById('memberStatus').value = 'active';
                document.getElementById('profileImageUrl').value = '';
                document.getElementById('imagePreview').style.display = 'none';
                document.getElementById('noImageText').style.display = 'inline';
                currentImageFile = null;
                existingImageUrl = '';
                document.getElementById('memberModalTitle').textContent = 'Add New Member';
                document.getElementById('memberSubmitBtnText').textContent = 'Save Member';
                document.getElementById('memberModal').classList.add('active');
            };

            const closeModal = () => {
                document.getElementById('memberModal').classList.remove('active');
                editingMemberId = null;
                currentImageFile = null;
                existingImageUrl = '';
                document.getElementById('profileImageInput').value = '';
            };

            // ---------- IMAGE PREVIEW ----------
            document.getElementById('profileImageInput')?.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                currentImageFile = file;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const preview = document.getElementById('imagePreview');
                    preview.src = ev.target.result;
                    preview.style.display = 'block';
                    document.getElementById('noImageText').style.display = 'none';
                };
                reader.readAsDataURL(file);
            });

            document.getElementById('removeImageBtn')?.addEventListener('click', () => {
                currentImageFile = null;
                document.getElementById('profileImageInput').value = '';
                document.getElementById('profileImageUrl').value = '';
                document.getElementById('imagePreview').style.display = 'none';
                document.getElementById('noImageText').style.display = 'inline';
                existingImageUrl = '';
            });

            // ---------- FORM SUBMIT (with image upload) ----------
            document.getElementById('memberForm')?.addEventListener('submit', async (e) => {
                e.preventDefault();
                const memberData = {
                    name: document.getElementById('memberName').value.trim(),
                    email: document.getElementById('memberEmail').value.trim(),
                    phone: document.getElementById('memberPhone').value.trim(),
                    gender: document.getElementById('memberGender').value,
                    blood_group: document.getElementById('memberBlood').value,
                    position: document.getElementById('memberPosition').value.trim(),
                    address: document.getElementById('memberAddress').value.trim(),
                    profession: document.getElementById('memberProfession').value.trim(),
                    birthday: document.getElementById('memberBirthday').value || null,
                    status: document.getElementById('memberStatus').value || 'active'
                };
                if (!memberData.name || !memberData.email) {
                    showToast('Name and Email are required.', 'error');
                    return;
                }

                const id = document.getElementById('memberId').value;
                const isEdit = !!id;

                try {
                    let finalImageUrl = document.getElementById('profileImageUrl').value || existingImageUrl;

                    // If user selected a new image, upload it
                    if (currentImageFile) {
                        // If editing, delete old image first
                        if (isEdit && finalImageUrl) {
                            await deleteOldImage(finalImageUrl);
                        }
                        const tempId = isEdit ? id : Date.now();
                        const uploadedUrl = await uploadImage(currentImageFile, tempId);
                        if (uploadedUrl) {
                            finalImageUrl = uploadedUrl;
                        } else {
                            throw new Error('Image upload returned empty URL.');
                        }
                    } else if (isEdit && !currentImageFile && !document.getElementById('profileImageUrl').value &&
                        existingImageUrl) {
                        // User removed the image
                        await deleteOldImage(existingImageUrl);
                        finalImageUrl = '';
                    }

                    memberData.profile_image = finalImageUrl || null;

                    let result;
                    if (isEdit) {
                        result = await supabase.from('members').update(memberData).eq('id', parseInt(id));
                    } else {
                        result = await supabase.from('members').insert([memberData]);
                    }
                    if (result.error) throw result.error;

                    showToast(isEdit ? '✅ Member updated!' : '✅ Member added!', 'success');
                    closeModal();
                    await loadMembers(document.getElementById('memberSearchInput').value);
                } catch (err) {
                    console.error('Save error:', err);
                    showToast('❌ Error saving: ' + err.message, 'error');
                }
            });

            // ---------- SEARCH ----------
            document.getElementById('memberSearchBtn')?.addEventListener('click', () => {
                loadMembers(document.getElementById('memberSearchInput').value);
            });
            document.getElementById('memberSearchInput')?.addEventListener('keyup', (e) => {
                if (e.key === 'Enter') loadMembers(e.target.value);
            });

            // ---------- REFRESH / CLEAR ----------
            document.getElementById('refresh-members-btn')?.addEventListener('click', () => {
                loadMembers(document.getElementById('memberSearchInput').value);
            });
            document.getElementById('clear-members-btn')?.addEventListener('click', async () => {
                if (!confirm("⚠️ DELETE ALL members?")) return;
                try {
                    for (const m of allMembers) {
                        if (m.profile_image || m.photo || m.photo_url) {
                            await deleteOldImage(m.profile_image || m.photo || m.photo_url);
                        }
                    }
                    const { error } = await supabase.from('members').delete().neq('id', 0);
                    if (error) throw error;
                    showToast('✅ All members cleared.', 'success');
                    await loadMembers();
                } catch (err) {
                    showToast('❌ Error clearing: ' + err.message, 'error');
                }
            });

            // ---------- MODAL EVENTS ----------
            document.getElementById('addMemberBtn')?.addEventListener('click', openAddModal);
            document.getElementById('memberModalCloseBtn')?.addEventListener('click', closeModal);
            document.getElementById('memberModalCancelBtn')?.addEventListener('click', closeModal);
            document.getElementById('memberModal')?.addEventListener('click', (e) => {
                if (e.target === document.getElementById('memberModal')) closeModal();
            });

            // ---------- BACK & LOGOUT ----------
            document.getElementById('backToAdminBtn')?.addEventListener('click', () => { window.location.href =
                    'admin.html'; });
            document.getElementById('logout-btn')?.addEventListener('click', async () => {
                await supabase.auth.signOut();
                window.location.href = '/index.html';
            });

            // ---------- REALTIME ----------
            const setupRealtime = () => {
                supabase.channel('members-img-status')
                    .on('postgres_changes', {
                        event: '*',
                        schema: 'public',
                        table: 'members'
                    }, () => {
                        console.log('🔄 Realtime: members changed');
                        loadMembers(document.getElementById('memberSearchInput').value);
                    })
                    .subscribe((status) => {
                        console.log('📡 Realtime subscription:', status);
                    });
            };

            // ---------- AUTH INIT ----------
            const init = async () => {
                const { data: { session } } = await supabase.auth.getSession();
                if (!session) {
                    window.location.href = '/index.html';
                    return;
                }
                await loadMembers();
                setupRealtime();
            };

            const navbar = document.getElementById('navbar');
            window.addEventListener('scroll', () => {
                navbar.classList.toggle('scrolled', window.scrollY > 50);
            });

            document.addEventListener('DOMContentLoaded', init);

            window.deleteMember = deleteMember;
            window.editMember = editMember;
            window.toggleMemberStatus = toggleMemberStatus;

        })();
    </script>
</body>
</html>
