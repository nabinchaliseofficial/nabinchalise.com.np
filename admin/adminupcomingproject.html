<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upcoming Projects Management</title>
    <meta name="description" content="Manage upcoming projects and applications." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        /* --- BASE VARIABLES --- */
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --cls-personal: #38bdf8;
            --cls-professional: #34d399;
            --cls-galkot: #fbbf24;
            --cls-rotaract: #f43f5e;
            --cls-links: #a78bfa;
            --primary: #D70060;
            --secondary: #015491;
            --cta-logout: #ef4444;
            --cta-logout-hover: #dc2626;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-dark: #f8fafc;
                --bg-card: rgba(255, 255, 255, 0.8);
                --border-color: rgba(0, 0, 0, 0.08);
                --text-main: #0f172a;
                --text-muted: #64748b;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(244, 63, 94, 0.03) 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* --- NAVBAR --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition-smooth);
        }
        .navbar.scrolled {
            padding: 0.6rem 2rem;
            background: rgba(15, 23, 42, 0.95);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        .nav-logo {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-logo i {
            color: var(--cls-galkot);
        }
        .nav-links {
            display: flex;
            gap: 1rem;
            list-style: none;
            align-items: center;
        }
        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition-smooth);
            padding: 0.5rem 0.75rem;
            border-radius: 8px;
        }
        .nav-links a:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }
        .btn-back {
            background: var(--cls-galkot);
            color: #000 !important;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            text-decoration: none;
            min-height: 44px;
        }
        .btn-back:hover {
            background: #e5a800;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(251, 191, 36, 0.3);
        }
        .btn-logout {
            background: var(--cta-logout);
            color: #ffffff !important;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            text-decoration: none;
            min-height: 44px;
        }
        .btn-logout:hover {
            background: var(--cta-logout-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        /* --- HERO --- */
        .hero {
            padding: 8rem 2rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            background: linear-gradient(to right, var(--cls-galkot), var(--cls-links));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 650px;
            margin: 0 auto;
        }

        /* --- WORKSPACE SECTION --- */
        .workspace-section {
            max-width: 1200px;
            margin: 0 auto 3rem;
            padding: 0 2rem;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.75rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .panel-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .panel-header h2 i {
            color: var(--cls-galkot);
        }
        .panel-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-smooth);
            font-family: 'Inter', sans-serif;
        }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .clear-btn-accent {
            border-color: rgba(239, 68, 68, 0.25) !important;
        }
        .clear-btn-accent:hover {
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: rgba(239, 68, 68, 0.6) !important;
        }
        .btn-add-accent {
            background: var(--cls-professional);
            border-color: var(--cls-professional);
            color: #000 !important;
        }
        .btn-add-accent:hover {
            background: #2bbf8a;
            border-color: #2bbf8a;
        }
        .btn-edit-accent {
            background: var(--cls-galkot);
            border-color: var(--cls-galkot);
            color: #000 !important;
        }
        .btn-edit-accent:hover {
            background: #e5a800;
            border-color: #e5a800;
        }
        .btn-primary-accent {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff !important;
        }
        .btn-primary-accent:hover {
            background: #b50051;
            border-color: #b50051;
        }

        .inquiries-feed {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
        }
        .inquiry-node {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--cls-galkot);
            border-radius: 16px;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .node-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .node-sender {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-main);
        }
        .node-email {
            font-size: 0.9rem;
            color: var(--cls-personal);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .node-message {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: 10px;
            font-size: 0.95rem;
            color: rgba(248, 250, 252, 0.9);
            white-space: pre-wrap;
        }
        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .print-selector-bar {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .print-selector-bar select {
            flex: 1;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            min-height: 44px;
            cursor: pointer;
        }
        .print-selector-bar select option {
            background: #1e293b;
            color: #fff;
        }

        .action-btn-sm {
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition-smooth);
            font-family: 'Inter', sans-serif;
        }
        .action-btn-sm.approve-btn {
            background: #34d399;
            color: #000;
        }
        .action-btn-sm.approve-btn:hover {
            background: #2bbf8a;
        }
        .action-btn-sm.reject-btn {
            background: #ef4444;
            color: #fff;
        }
        .action-btn-sm.reject-btn:hover {
            background: #dc2626;
        }
        .action-btn-sm.delete-btn {
            background: #f43f5e;
            color: #fff;
        }
        .action-btn-sm.delete-btn:hover {
            background: #e11d48;
        }
        .application-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
            flex-wrap: wrap;
        }
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }
        .status-pending {
            background: #fbbf24;
            color: #000;
        }
        .status-approved {
            background: #34d399;
            color: #000;
        }
        .status-rejected {
            background: #ef4444;
            color: #fff;
        }
        .status-new {
            background: #3b82f6;
            color: #fff;
        }

        /* --- MODAL --- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-content::-webkit-scrollbar {
            width: 6px;
        }
        .modal-content::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }
        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            min-height: 44px;
            min-width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            color: var(--text-main);
            transform: rotate(90deg);
        }
        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .modal-title i {
            color: var(--cls-galkot);
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
        }
        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--cls-galkot);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            justify-content: flex-end;
        }
        .form-actions .action-btn {
            padding: 0.7rem 1.5rem;
            font-weight: 600;
        }
        .btn-save-accent {
            background: var(--cls-professional);
            border-color: var(--cls-professional);
            color: #000 !important;
        }
        .btn-save-accent:hover {
            background: #2bbf8a;
            border-color: #2bbf8a;
        }
        .btn-cancel-accent {
            border-color: rgba(239, 68, 68, 0.3) !important;
        }
        .btn-cancel-accent:hover {
            background: rgba(239, 68, 68, 0.1) !important;
            border-color: rgba(239, 68, 68, 0.6) !important;
        }

        .search-box-inline {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.2rem 0.2rem 0.2rem 0.8rem;
        }
        .search-box-inline input {
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 0.4rem 0;
            font-size: 0.85rem;
            outline: none;
            min-width: 150px;
            font-family: 'Inter', sans-serif;
        }
        .search-box-inline input::placeholder {
            color: var(--text-muted);
        }
        .search-box-inline button {
            background: var(--cls-links);
            border: none;
            color: #000;
            padding: 0.3rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            font-family: 'Inter', sans-serif;
        }
        .search-box-inline button:hover {
            background: #9370db;
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
            .inquiries-feed {
                grid-template-columns: 1fr;
            }
            .modal-content {
                padding: 1.5rem;
                margin: 1rem;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .print-selector-bar {
                flex-direction: column;
            }
            .print-selector-bar select {
                width: 100%;
            }
            .navbar {
                padding: 0.75rem 1rem;
            }
            .workspace-section {
                padding: 0 1rem;
            }
            .panel-header {
                flex-direction: column;
                align-items: stretch;
            }
            .panel-actions {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <!-- ===== NAVBAR ===== -->
    <nav class="navbar" id="navbar" aria-label="Main Navigation">
        <a href="#" class="nav-logo">
            <i class="fa-solid fa-project-diagram" aria-hidden="true"></i> Project Management
        </a>
        <div style="display:flex; gap: 0.75rem; align-items:center;">
            <button class="btn-back" id="backToAdminBtn">
                <i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back to Admin
            </button>
            <button class="btn-logout" id="logout-btn">
                <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i> Log Out
            </button>
        </div>
    </nav>

    <!-- ===== HERO ===== -->
    <header class="hero">
        <h1><i class="fa-solid fa-project-diagram" style="color:var(--cls-galkot);"></i> Upcoming Projects</h1>
        <p>Manage your projects and track applications in one place.</p>
    </header>

    <!-- ===== PROJECTS MANAGEMENT ===== -->
    <section class="workspace-section" id="projects-panel">
        <div class="panel-header">
            <h2><i class="fa-solid fa-project-diagram" aria-hidden="true" style="color: var(--cls-galkot);"></i> Upcoming Projects</h2>
            <div class="panel-actions">
                <button class="action-btn btn-add-accent" id="addProjectBtn"><i class="fa-solid fa-plus"></i> Add New Project</button>
                <button class="action-btn btn-edit-accent" id="editProjectBtn"><i class="fa-solid fa-pen-to-square"></i> Edit Selected</button>
                <button class="action-btn clear-btn-accent" id="clear-projects-btn"><i class="fa-solid fa-trash-can" style="color:#ef4444;"></i> Clear All</button>
                <button class="action-btn" id="refresh-projects-btn"><i class="fa-solid fa-rotate"></i> Refresh</button>
            </div>
        </div>
        <div class="print-selector-bar">
            <label for="projectSelect" style="font-weight:600;font-size:0.9rem;"><i class="fa-solid fa-list"></i> Select Project:</label>
            <select id="projectSelect"><option value="">-- Loading projects --</option></select>
            <button class="action-btn btn-primary-accent" id="viewProjectBtn" style="background: var(--cls-links); border-color: var(--cls-links);"><i class="fa-solid fa-eye"></i> View Details</button>
        </div>
        <div class="inquiries-feed" id="projects-feed">
            <div class="status-msg">Loading upcoming projects...</div>
        </div>
    </section>

    <!-- ===== PROJECT APPLICATIONS ===== -->
    <section class="workspace-section" id="applications-panel">
        <div class="panel-header">
            <h2><i class="fa-solid fa-users" aria-hidden="true" style="color: var(--cls-professional);"></i> Project Applications</h2>
            <div class="panel-actions">
                <button class="action-btn" id="refresh-applications-btn"><i class="fa-solid fa-rotate"></i> Refresh Logs</button>
                <button class="action-btn clear-btn-accent" id="clear-applications-btn"><i class="fa-solid fa-trash-can" style="color:#ef4444;"></i> Clear All Logs</button>
            </div>
        </div>
        <div class="inquiries-feed" id="applications-feed">
            <div class="status-msg">Loading project applications...</div>
        </div>
    </section>

    <!-- ===== PROJECT MODAL ===== -->
    <div class="modal-overlay" id="projectModal">
        <div class="modal-content">
            <button class="modal-close" id="projectModalCloseBtn" aria-label="Close project modal"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-title"><i class="fa-solid fa-project-diagram" style="color: var(--cls-galkot);"></i> <span id="projectModalTitle">Add New Project</span></div>
            <form id="projectForm">
                <input type="hidden" id="projectId" value="">
                <div class="form-group"><label for="projectName">Project Name *</label><input type="text" id="projectName" placeholder="e.g. Project Akshara: Rural E-Library Set up" required /></div>
                <div class="form-row">
                    <div class="form-group"><label for="projectDate">Date *</label><input type="text" id="projectDate" placeholder="e.g. August 2026" required /></div>
                    <div class="form-group"><label for="projectAudience">Target Audience *</label><input type="text" id="projectAudience" placeholder="e.g. Public School Students" required /></div>
                </div>
                <div class="form-group"><label for="projectLocation">Location *</label><input type="text" id="projectLocation" placeholder="e.g. Ward No. 3, Galkot, Baglung" required /></div>
                <div class="form-group"><label for="projectDescription">Project Description</label><textarea id="projectDescription" placeholder="Brief description of the project..." rows="3"></textarea></div>
                <div class="form-actions">
                    <button type="button" class="action-btn btn-cancel-accent" id="projectModalCancelBtn">Cancel</button>
                    <button type="submit" class="action-btn btn-save-accent"><i class="fa-solid fa-floppy-disk"></i> <span id="projectSubmitBtnText">Save Project</span></button>
                </div>
            </form>
        </div>
    </div>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>&copy; 2026 Project Management Dashboard. Built for efficiency.</p>
    </footer>

    <!-- ============================================================ -->
    <!-- ===== JAVASCRIPT ===== -->
    <script>
        (() => {
            "use strict";

            // ---- SUPABASE CLIENT ----

// CROSS-TAB LOGOUT + INACTIVITY TIMEOUT (60 seconds)
// ============================================================
(function() {
  "use strict";

  // ---- 1. CROSS-TAB SYNC: Listen for auth state changes ----
  // This ensures that signing out from one tab signs out all tabs.
  supabase.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_OUT' || !session) {
      // Avoid redirect loop if already on the login page
      if (!window.location.pathname.includes('/index.html')) {
        window.location.href = '/index.html';
      }
    }
  });

  // ---- 2. INACTIVITY TIMEOUT ----
  const INACTIVITY_TIMEOUT = 60 * 1000; // 60 seconds (1 minute)
  let logoutTimer = null;

  // Function to perform logout (triggers the cross-tab sync via the listener above)
  const performLogout = async () => {
    try {
      await supabase.auth.signOut();
      // The onAuthStateChange listener will handle the redirect,
      // but we also set a fallback redirect just in case.
      if (!window.location.pathname.includes('/index.html')) {
        window.location.href = '/index.html';
      }
    } catch (err) {
      console.error('Auto-logout error:', err);
    }
  };

  // Reset the timer on user activity
  const resetTimer = () => {
    if (logoutTimer) clearTimeout(logoutTimer);
    logoutTimer = setTimeout(performLogout, INACTIVITY_TIMEOUT);
  };

  // Activity events that reset the timer
  const activityEvents = [
    'mousedown', 'mousemove', 'keydown',
    'scroll', 'touchstart', 'click', 'wheel'
  ];

  // Attach event listeners
  activityEvents.forEach(event => {
    document.addEventListener(event, resetTimer, { passive: true });
  });

  // Reset when the user returns to the tab
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden) resetTimer();
  });

  // ---- Start the timer ----
  resetTimer();

  // ---- Cleanup on page unload ----
  window.addEventListener('beforeunload', () => {
    if (logoutTimer) clearTimeout(logoutTimer);
  });

  // (Optional) Expose a manual reset function if needed
  window.resetInactivityTimer = resetTimer;

})();
