<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Banner Settings</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f0f2f5 0%, #e8eaf0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 1000px;
        }
        h2,
        h3 {
            text-align: center;
            color: #d32f2f;
            margin-bottom: 20px;
            font-weight: 700;
        }
        h2 {
            font-size: 1.8rem;
            border-bottom: 3px solid #d32f2f;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
            font-size: 0.95rem;
        }
        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="file"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            background: #fafafa;
        }
        textarea {
            resize: vertical;
            min-height: 60px;
        }
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #d32f2f;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1);
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(211, 47, 47, 0.4);
        }
        .btn-secondary {
            background: #555;
            color: white;
        }
        .btn-secondary:hover {
            background: #333;
            transform: translateY(-2px);
        }
        .hidden {
            display: none !important;
        }
        .msg {
            text-align: center;
            margin-top: 12px;
            font-weight: 600;
            padding: 10px;
            border-radius: 6px;
        }
        .success {
            color: #155724;
            background: #d4edda;
            border: 1px solid #c3e6cb;
        }
        .error {
            color: #721c24;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
        }
        .info {
            color: #0c5460;
            background: #d1ecf1;
            border: 1px solid #bee5eb;
        }
        .saved-data-section {
            margin-bottom: 30px;
            border-bottom: 3px solid #e0e0e0;
            padding-bottom: 25px;
        }
        .table-wrapper {
            overflow-x: auto;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        th,
        td {
            padding: 12px 15px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }
        th {
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        tr:hover {
            background: #f5f5f5;
        }
        .edit-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .edit-btn:hover {
            background: #1b5e20;
            transform: scale(1.05);
        }
        .preview-img {
            max-height: 80px;
            max-width: 200px;
            margin-top: 8px;
            border-radius: 6px;
            border: 2px solid #e0e0e0;
            padding: 3px;
            background: white;
        }
        .date-time-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .nepali-date-display {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            margin-top: 10px;
            text-align: center;
            font-size: 1.1rem;
            color: #333;
        }
        .nepali-date-display strong {
            color: #d32f2f;
        }
        .time-picker {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .time-picker select {
            flex: 1;
            min-width: 80px;
        }
        .badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge-success {
            background: #d4edda;
            color: #155724;
        }
        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }
        .badge-danger {
            background: #f8d7da;
            color: #721c24;
        }
        .font-size-section {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px 25px;
            margin-bottom: 25px;
        }
        .font-size-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .font-size-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 10px 15px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
        }
        .font-size-item label {
            margin: 0;
            font-size: 0.85rem;
            min-width: 100px;
            color: #555;
        }
        .font-size-item input[type="number"] {
            width: 70px;
            padding: 6px 10px;
            border: 2px solid #d32f2f;
            border-radius: 6px;
            font-weight: 700;
            text-align: center;
            background: white;
        }
        .font-size-item .unit {
            font-weight: 700;
            color: #d32f2f;
            font-size: 0.9rem;
        }
        .font-size-item .btn-sm {
            padding: 4px 10px;
            font-size: 0.8rem;
            border: none;
            border-radius: 4px;
            background: #d32f2f;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .font-size-item .btn-sm:hover {
            background: #b71c1c;
            transform: scale(1.05);
        }
        .global-scale-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 12px 0;
            border-top: 2px solid #e0e0e0;
            margin-top: 15px;
        }
        .global-scale-control button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
            color: white;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(211, 47, 47, 0.3);
        }
        .global-scale-control button:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 18px rgba(211, 47, 47, 0.4);
        }
        .global-scale-control .font-size-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #d32f2f;
            min-width: 80px;
            text-align: center;
            background: white;
            padding: 4px 16px;
            border-radius: 8px;
            border: 2px solid #d32f2f;
        }
        .login-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }
        .login-modal-box {
            background: #ffffff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            width: 100%;
            max-width: 400px;
        }
        .file-upload-wrapper {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .file-upload-wrapper input[type="file"] {
            flex: 1;
            min-width: 150px;
        }
        .file-status {
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 4px;
        }
        .file-status.uploaded {
            background: #d4edda;
            color: #155724;
        }
        .file-status.pending {
            background: #fff3cd;
            color: #856404;
        }
        .image-preview-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .image-preview-container .preview-box {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
            background: #fafafa;
            flex: 1;
            min-width: 200px;
        }
        .image-preview-container .preview-box label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 5px;
            display: block;
        }
        .image-preview-container .preview-box img {
            max-height: 100px;
            max-width: 100%;
            border-radius: 4px;
            border: 1px solid #ddd;
            padding: 3px;
            background: white;
        }
        .image-preview-container .preview-box .url-text {
            font-size: 0.75rem;
            color: #888;
            word-break: break-all;
            margin-top: 5px;
        }
        @media (max-width: 768px) {
            .font-size-grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 20px;
            }
            h2 {
                font-size: 1.4rem;
            }
            .date-time-selector {
                grid-template-columns: 1fr;
            }
            .image-preview-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <!-- Login Popup -->
    <div class="login-modal-overlay" id="loginSection">
        <div class="login-modal-box">
            <h2>🔐 Admin Login</h2>
            <div class="form-group">
                <label>📧 इमेल (Email)</label>
                <input type="email" id="adminEmail" placeholder="admin@example.com" autofocus>
            </div>
            <div class="form-group">
                <label>🔑 पासवर्ड (Password)</label>
                <input type="password" id="adminPassword" placeholder="********" onkeydown="if(event.key==='Enter') loginAdmin()">
            </div>
            <button class="btn btn-primary" onclick="loginAdmin()" id="loginBtn">लगइन गर्नुहोस् (Login)</button>
            <p id="loginMsg" class="msg"></p>
        </div>
    </div>

    <div class="container">
        <div id="dashboardSection" class="hidden">

            <div class="saved-data-section">
                <h3>📋 सेभ भएका ब्यानरहरूको सूची</h3>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>लाइभ</th>
                                <th>बैठकको नाम</th>
                                <th>उप-बैठक</th>
                                <th>आयोजक</th>
                                <th>मिति</th>
                                <th>समय</th>
                                <th>कार्य</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody">
                            <tr><td colspan="7" style="color: #999;">लोड हुँदै...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <h2>✏️ Banner Update Form</h2>
            <input type="hidden" id="recordId" value="1">

            <!-- Font Size Controls -->
            <div class="font-size-section">
                <h3>🔠 प्रत्येक बाक्सको फन्ट साइज</h3>
                <div class="font-size-grid">
                    <div class="font-size-item">
                        <label>🏛️ बैठकको नाम</label>
                        <input type="number" id="meetingNameFontSize" value="4.5" min="1" max="10" step="0.1">
                        <span class="unit">rem</span>
                    </div>
                    <div class="font-size-item">
                        <label>📌 उप-बैठक</label>
                        <input type="number" id="subMeetingFontSize" value="2.5" min="1" max="8" step="0.1">
                        <span class="unit">rem</span>
                    </div>
                    <div class="font-size-item">
                        <label>🏢 आयोजक</label>
                        <input type="number" id="organizedByFontSize" value="2.8" min="1" max="8" step="0.1">
                        <span class="unit">rem</span>
                    </div>
                    <div class="font-size-item">
                        <label>📅 मिति</label>
                        <input type="number" id="dateFontSize" value="1.6" min="0.5" max="5" step="0.1">
                        <span class="unit">rem</span>
                    </div>
                    <div class="font-size-item">
                        <label>🕐 समय</label>
                        <input type="number" id="timeFontSize" value="1.6" min="0.5" max="5" step="0.1">
                        <span class="unit">rem</span>
                    </div>
                </div>
                <div class="global-scale-control">
                    <span style="font-weight:600; color:#555;">🌍 Global Scale:</span>
                    <button onclick="adjustGlobalScale(-10)">−</button>
                    <span class="font-size-value" id="globalScaleDisplay">100%</span>
                    <button onclick="adjustGlobalScale(10)">+</button>
                    <input type="hidden" id="fontScale" value="100">
                </div>
            </div>

            <!-- Meeting Details -->
            <div class="form-group">
                <h3 style="margin-bottom:15px;">🏛️ बैठकको विवरण</h3>
                <label>🏛️ बैठकको नाम (Meeting Name)</label>
                <textarea id="meetingName" rows="2" placeholder="e.g., कर्मचारी मासिक बैठक"></textarea>

                <label style="margin-top:14px;">📌 उप-बैठकको नाम (Sub-Meeting Name)</label>
                <input type="text" id="subMeetingName" placeholder="e.g., विशेष समिति बैठक">

                <label style="margin-top:14px;">🏢 आयोजक (Organized By)</label>
                <input type="text" id="organizedBy" placeholder="e.g., गलकोट नगरपालिका">
            </div>

            <!-- Nepali Date & Time -->
            <div class="form-group">
                <label>📅 नेपाली मिति</label>
                <div class="date-time-selector">
                    <div>
                        <select id="nepaliYear" onchange="updateNepaliDateDisplay()"></select>
                        <label style="font-size:0.85rem;">वर्ष</label>
                    </div>
                    <div>
                        <select id="nepaliMonth" onchange="updateNepaliDateDisplay()"></select>
                        <label style="font-size:0.85rem;">महिना</label>
                    </div>
                    <div>
                        <select id="nepaliDay" onchange="updateNepaliDateDisplay()"></select>
                        <label style="font-size:0.85rem;">दिन</label>
                    </div>
                    <div>
                        <select id="nepaliWeekday" onchange="updateNepaliDateDisplay()"></select>
                        <label style="font-size:0.85rem;">बार</label>
                    </div>
                </div>
                <div class="nepali-date-display">
                    <strong>📆</strong> <span id="selectedNepaliDate">--</span>
                </div>
            </div>

            <div class="form-group">
                <label>🕐 नेपाली समय</label>
                <div class="time-picker">
                    <select id="nepaliHour"></select>
                    <span>:</span>
                    <select id="nepaliMinute"></select>
                    <select id="nepaliPeriod">
                        <option value="AM">AM</option>
                        <option value="PM">PM</option>
                    </select>
                </div>
            </div>

            <input type="hidden" id="dateText">
            <input type="hidden" id="timeText">

            <!-- BACKGROUND IMAGE -->
            <div class="form-group">
                <label>🖼️ Background Image</label>
                <div class="file-upload-wrapper">
                    <input type="file" id="bgFile" accept="image/*">
                    <span class="file-status pending" id="bgStatus">📤 फाइल छान्नुहोस्</span>
                </div>
                <div class="image-preview-container">
                    <div class="preview-box">
                        <label>हालको Background:</label>
                        <img id="bgPreview" style="display:none;" alt="Background Preview">
                        <div class="url-text" id="bgUrlDisplay">कुनै छैन</div>
                    </div>
                </div>
            </div>

            <!-- LOGO IMAGE -->
            <div class="form-group">
                <label>🏷️ Logo Image</label>
                <div class="file-upload-wrapper">
                    <input type="file" id="logoFile" accept="image/*">
                    <span class="file-status pending" id="logoStatus">📤 फाइल छान्नुहोस्</span>
                </div>
                <div class="image-preview-container">
                    <div class="preview-box">
                        <label>हालको Logo:</label>
                        <img id="logoPreview" style="display:none;" alt="Logo Preview">
                        <div class="url-text" id="logoUrlDisplay">कुनै छैन</div>
                    </div>
                </div>
            </div>

            <button class="btn btn-primary" onclick="updateBannerData()" id="updateBtn">
                💾 सेभ र अपडेट गर्नुहोस्
            </button>
            <p id="updateMsg" class="msg"></p>

            <button class="btn btn-secondary" onclick="logoutAdmin()">🚪 लगआउट</button>
        </div>
    </div>

    <script>
        // ===== SUPABASE CONFIG =====
        const SUPABASE_URL = 'https://kbyfvqkfcxqgjjtfvvxf.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-bOiDndDXdz_FgXq1MFkag_ioCcg8nv';
        const STORAGE_BUCKET = 'banner-assets';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ===== NEPALI DATE SYSTEM =====
        const NepaliDate = {
            months: ['बैशाख', 'जेठ', 'असार', 'साउन', 'भदौ', 'असोज', 'कात्तिक', 'मंसिर', 'पुष', 'माघ', 'फागुन', 'चैत'],
            weekdays: ['आइतबार', 'सोमबार', 'मंगलबार', 'बुधबार', 'बिहिबार', 'शुक्रबार', 'शनिबार'],
            monthDays: {
                2080: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 30],
                2081: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 30],
                2082: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 30],
                2083: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 30],
                2084: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 30],
                2085: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 30],
                2086: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 30]
            },
            referenceYear: 2080,
            referenceMonth: 0,
            referenceDay: 1,
            referenceEnglishDate: new Date(2023, 3, 14)
        };

        // Nepali to English digits conversion
        function toEnglishDigits(input) {
            const map = {
                '०': '0',
                '१': '1',
                '२': '2',
                '३': '3',
                '४': '4',
                '५': '5',
                '६': '6',
                '७': '7',
                '८': '8',
                '९': '9'
            };
            return String(input).replace(/[०-९]/g, d => map[d] || d);
        }

        function toNepaliDigits(input) {
            const digits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९'];
            return String(input).replace(/[0-9]/g, d => digits[d]);
        }

        function initializeNepaliDateSelectors() {
            const yearSelect = document.getElementById('nepaliYear');
            const monthSelect = document.getElementById('nepaliMonth');
            const weekdaySelect = document.getElementById('nepaliWeekday');
            const daySelect = document.getElementById('nepaliDay');

            for (let y = 2080; y <= 2086; y++) {
                yearSelect.innerHTML += `<option value="${y}">${y}</option>`;
            }
            NepaliDate.months.forEach((m, i) => {
                monthSelect.innerHTML += `<option value="${i}">${m}</option>`;
            });
            NepaliDate.weekdays.forEach((d, i) => {
                weekdaySelect.innerHTML += `<option value="${i}">${d}</option>`;
            });

            // Days (1-32)
            for (let d = 1; d <= 32; d++) {
                daySelect.innerHTML += `<option value="${d}">${toNepaliDigits(d)}</option>`;
            }

            // Hour & Minute
            for (let i = 1; i <= 12; i++) {
                document.getElementById('nepaliHour').innerHTML +=
                    `<option value="${i}">${i.toString().padStart(2, '0')}</option>`;
            }
            for (let i = 0; i < 60; i += 5) {
                document.getElementById('nepaliMinute').innerHTML +=
                    `<option value="${i}">${i.toString().padStart(2, '0')}</option>`;
            }

            yearSelect.value = 2081;
            monthSelect.value = 0;
            daySelect.value = 1;
            updateNepaliDateDisplay();
        }

        function updateNepaliDateDisplay() {
            const year = document.getElementById('nepaliYear').value;
            const month = parseInt(document.getElementById('nepaliMonth').value);
            const day = document.getElementById('nepaliDay').value || 1;
            const weekday = document.getElementById('nepaliWeekday').value;

            document.getElementById('selectedNepaliDate').textContent =
                `${toNepaliDigits(year)} ${NepaliDate.months[month]} ${toNepaliDigits(day)}, ${NepaliDate.weekdays[weekday]}`;

            document.getElementById('dateText').value =
                `मिति: ${toNepaliDigits(year)} ${NepaliDate.months[month]} ${toNepaliDigits(day)} गते, ${NepaliDate.weekdays[weekday]}`;

            const hour = document.getElementById('nepaliHour').value;
            const minute = document.getElementById('nepaliMinute').value;
            const period = document.getElementById('nepaliPeriod').value;
            const hour12 = parseInt(hour);
            document.getElementById('timeText').value =
                `बैठक सुरु समय: ${toNepaliDigits(hour12)}:${toNepaliDigits(minute.padStart(2, '0'))} बजे`;
        }

        function adjustGlobalScale(delta) {
            const input = document.getElementById('fontScale');
            let val = Math.min(Math.max(parseInt(input.value) + delta, 50), 200);
            input.value = val;
            document.getElementById('globalScaleDisplay').textContent = val + '%';
        }

        // ===== IMAGE UPLOAD =====
        async function uploadImage(file, folder) {
            if (!file) return null;

            const fileExt = file.name.split('.').pop();
            const fileName = `${folder}/${Date.now()}.${fileExt}`;

            const { data, error } = await supabaseClient.storage
                .from(STORAGE_BUCKET)
                .upload(fileName, file, {
                    cacheControl: '3600',
                    upsert: true
                });

            if (error) {
                console.error('Upload error:', error);
                return null;
            }

            const { data: urlData } = supabaseClient.storage
                .from(STORAGE_BUCKET)
                .getPublicUrl(fileName);

            return urlData.publicUrl;
        }

        // ===== AUTH FUNCTIONS =====
        async function isAdminUser(user) {
            try {
                const { data, error } = await supabaseClient
                    .from('user_roles')
                    .select('role, status')
                    .eq('email', user.email)
                    .eq('role', 'admin')
                    .eq('status', 'active')
                    .maybeSingle();

                if (error || !data) return false;
                return true;
            } catch (err) {
                return false;
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            initializeNepaliDateSelectors();

            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const allowed = await isAdminUser(session.user);
                if (allowed) {
                    showDashboard();
                    return;
                } else {
                    await supabaseClient.auth.signOut();
                }
            }
            document.getElementById('loginSection').classList.remove('hidden');
        });

        async function loginAdmin() {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const msgEl = document.getElementById('loginMsg');
            const loginBtn = document.getElementById('loginBtn');

            if (!email || !password) {
                msgEl.innerText = "कृपया इमेल र पासवर्ड भर्नुहोस्";
                msgEl.className = "msg error";
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '⏳ लगइन हुँदै...';

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'लगइन गर्नुहोस्';
                msgEl.innerText = "❌ लगइन असफल: " + error.message;
                msgEl.className = "msg error";
                return;
            }

            const allowed = await isAdminUser(data.user);
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'लगइन गर्नुहोस्';

            if (!allowed) {
                await supabaseClient.auth.signOut();
                msgEl.innerText = "❌ पहुँच अस्वीकृत: एडमिन रोल छैन!";
                msgEl.className = "msg error";
                return;
            }

            showDashboard();
        }

        function showDashboard() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            loadSavedData();
        }

        // ===== LOAD SAVED DATA =====
        async function loadSavedData() {
            const tableBody = document.getElementById('dataTableBody');

            const { data, error } = await supabaseClient
                .from('banner_settings')
                .select('*')
                .order('id', { ascending: true });

            if (error) {
                tableBody.innerHTML = '<tr><td colspan="7" style="color: red;">❌ डाटा लोड गर्न असफल</td></tr>';
                return;
            }

            if (!data || data.length === 0) {
                // Create default entry
                const defaultData = {
                    meeting_name: 'बैठकको नाम',
                    sub_meeting_name: '',
                    organized_by: 'आयोजकको नाम',
                    date_text: 'मिति: २०८१ बैशाख १ गते, सोमबार',
                    time_text: 'बैठक सुरु समय: १०:०० बजे',
                    is_active: true,
                    font_scale: 100,
                    background_url: '',
                    logo_url: ''
                };
                await supabaseClient.from('banner_settings').insert(defaultData);
                loadSavedData();
                return;
            }

            tableBody.innerHTML = '';
            data.forEach((item) => {
                const isActive = item.is_active ? 'checked' : '';
                tableBody.innerHTML += `
                    <tr>
                        <td><input type="radio" name="activeRadio" ${isActive} onclick="setActiveBanner(${item.id})"></td>
                        <td><strong>${item.meeting_name || ''}</strong></td>
                        <td>${item.sub_meeting_name || ''}</td>
                        <td>${item.organized_by || ''}</td>
                        <td>${item.date_text || ''}</td>
                        <td>${item.time_text || ''}</td>
                        <td><button class="edit-btn" onclick='editRecord(${JSON.stringify(item).replace(/'/g, "&#39;")})'>✏️ Edit</button></td>
                    </tr>
                `;
            });
        }

        async function setActiveBanner(id) {
            await supabaseClient.from('banner_settings').update({ is_active: false }).neq('id', id);
            await supabaseClient.from('banner_settings').update({ is_active: true }).eq('id', id);
            loadSavedData();
        }

        // ===== PARSE DATE FROM TEXT =====
        function parseDateFromText(dateText) {
            if (!dateText) return null;

            // Format: "मिति: २०८१ बैशाख १ गते, सोमबार"
            const match = dateText.match(/मिति:\s*([\d]+)\s*([^,]+)\s*([\d]+)\s*गते,\s*([^,]+)/);
            if (match) {
                const year = toEnglishDigits(match[1]);
                const monthName = match[2].trim();
                const day = toEnglishDigits(match[3]);
                const weekday = match[4].trim();

                const monthIndex = NepaliDate.months.indexOf(monthName);
                const weekdayIndex = NepaliDate.weekdays.indexOf(weekday);

                return { year, month: monthIndex, day, weekday: weekdayIndex };
            }
            return null;
        }

        // ===== PARSE TIME FROM TEXT =====
        function parseTimeFromText(timeText) {
            if (!timeText) return null;

            // Format: "बैठक सुरु समय: १०:०० बजे"
            const match = timeText.match(/बैठक सुरु समय:\s*([\d]+):([\d]+)\s*बजे/);
            if (match) {
                let hour = parseInt(toEnglishDigits(match[1]));
                const minute = toEnglishDigits(match[2]);

                // Determine AM/PM (12-hour format, assume PM if hour > 6)
                const period = hour >= 6 ? 'PM' : 'AM';
                if (hour > 12) hour = hour - 12;
                if (hour === 0) hour = 12;

                return { hour, minute, period };
            }
            return null;
        }

        // ===== EDIT RECORD - Fetches ALL data including Date/Time =====
        window.editRecord = function(item) {
            // Set ID
            document.getElementById('recordId').value = item.id;

            // Set text fields
            document.getElementById('meetingName').value = item.meeting_name || '';
            document.getElementById('subMeetingName').value = item.sub_meeting_name || '';
            document.getElementById('organizedBy').value = item.organized_by || '';

            // Set font scale
            document.getElementById('fontScale').value = item.font_scale || 100;
            document.getElementById('globalScaleDisplay').textContent = (item.font_scale || 100) + '%';

            // ===== PARSE AND SET DATE =====
            const dateData = parseDateFromText(item.date_text);
            if (dateData) {
                // Set Year
                const yearSelect = document.getElementById('nepaliYear');
                for (let opt of yearSelect.options) {
                    if (opt.value === dateData.year) { opt.selected = true; break; }
                }

                // Set Month
                if (dateData.month !== -1) {
                    document.getElementById('nepaliMonth').value = dateData.month;
                }

                // Set Day
                const daySelect = document.getElementById('nepaliDay');
                for (let opt of daySelect.options) {
                    if (opt.value === dateData.day) { opt.selected = true; break; }
                }

                // Set Weekday
                if (dateData.weekday !== -1) {
                    document.getElementById('nepaliWeekday').value = dateData.weekday;
                }
            }

            // ===== PARSE AND SET TIME =====
            const timeData = parseTimeFromText(item.time_text);
            if (timeData) {
                // Set Hour
                const hourSelect = document.getElementById('nepaliHour');
                for (let opt of hourSelect.options) {
                    if (parseInt(opt.value) === timeData.hour) { opt.selected = true; break; }
                }

                // Set Minute
                const minSelect = document.getElementById('nepaliMinute');
                for (let opt of minSelect.options) {
                    if (parseInt(opt.value) === parseInt(timeData.minute)) { opt.selected = true; break; }
                }

                // Set Period
                document.getElementById('nepaliPeriod').value = timeData.period;
            }

            // Update date display
            updateNepaliDateDisplay();

            // Set background image
            if (item.background_url && item.background_url !== '') {
                const bgPreview = document.getElementById('bgPreview');
                bgPreview.src = item.background_url;
                bgPreview.style.display = 'block';
                document.getElementById('bgUrlDisplay').textContent = '✅ ' + item.background_url;
                document.getElementById('bgStatus').textContent = '✅ अपलोड भएको';
                document.getElementById('bgStatus').className = 'file-status uploaded';
            } else {
                document.getElementById('bgPreview').style.display = 'none';
                document.getElementById('bgUrlDisplay').textContent = 'कुनै छैन';
                document.getElementById('bgStatus').textContent = '📤 फाइल छान्नुहोस्';
                document.getElementById('bgStatus').className = 'file-status pending';
            }

            // Set logo image
            if (item.logo_url && item.logo_url !== '') {
                const logoPreview = document.getElementById('logoPreview');
                logoPreview.src = item.logo_url;
                logoPreview.style.display = 'block';
                document.getElementById('logoUrlDisplay').textContent = '✅ ' + item.logo_url;
                document.getElementById('logoStatus').textContent = '✅ अपलोड भएको';
                document.getElementById('logoStatus').className = 'file-status uploaded';
            } else {
                document.getElementById('logoPreview').style.display = 'none';
                document.getElementById('logoUrlDisplay').textContent = 'कुनै छैन';
                document.getElementById('logoStatus').textContent = '📤 फाइल छान्नुहोस्';
                document.getElementById('logoStatus').className = 'file-status pending';
            }

            // Update message
            document.getElementById('updateMsg').innerText = '📝 एडिट मोड: ID ' + item.id;
            document.getElementById('updateMsg').className = 'msg info';

            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ===== UPDATE BANNER DATA =====
        async function updateBannerData() {
            const recordId = document.getElementById('recordId').value;
            const meetingName = document.getElementById('meetingName').value.trim();
            const subMeetingName = document.getElementById('subMeetingName').value.trim();
            const organizedBy = document.getElementById('organizedBy').value.trim();
            const fontScale = parseInt(document.getElementById('fontScale').value) || 100;
            const dateText = document.getElementById('dateText').value;
            const timeText = document.getElementById('timeText').value;

            const msgEl = document.getElementById('updateMsg');

            if (!meetingName || !organizedBy) {
                msgEl.innerText = "कृपया बैठकको नाम र आयोजक भर्नुहोस्";
                msgEl.className = "msg error";
                return;
            }

            msgEl.innerText = "⏳ सेभ हुँदैछ...";
            msgEl.className = "msg info";

            // Upload background if new file selected
            const bgFile = document.getElementById('bgFile').files[0];
            let bgUrl = document.getElementById('bgUrlDisplay').textContent.replace('✅ ', '');
            if (bgUrl === 'कुनै छैन') bgUrl = '';

            if (bgFile) {
                const uploaded = await uploadImage(bgFile, 'backgrounds');
                if (uploaded) {
                    bgUrl = uploaded;
                    document.getElementById('bgStatus').textContent = '✅ अपलोड भयो';
                    document.getElementById('bgStatus').className = 'file-status uploaded';
                } else {
                    msgEl.innerText = "❌ Background अपलोड असफल";
                    msgEl.className = "msg error";
                    return;
                }
            }

            // Upload logo if new file selected
            const logoFile = document.getElementById('logoFile').files[0];
            let logoUrl = document.getElementById('logoUrlDisplay').textContent.replace('✅ ', '');
            if (logoUrl === 'कुनै छैन') logoUrl = '';

            if (logoFile) {
                const uploaded = await uploadImage(logoFile, 'logos');
                if (uploaded) {
                    logoUrl = uploaded;
                    document.getElementById('logoStatus').textContent = '✅ अपलोड भयो';
                    document.getElementById('logoStatus').className = 'file-status uploaded';
                } else {
                    msgEl.innerText = "❌ Logo अपलोड असफल";
                    msgEl.className = "msg error";
                    return;
                }
            }

            // Update database
            const { error } = await supabaseClient
                .from('banner_settings')
                .update({
                    meeting_name: meetingName,
                    sub_meeting_name: subMeetingName,
                    organized_by: organizedBy,
                    date_text: dateText,
                    time_text: timeText,
                    font_scale: fontScale,
                    background_url: bgUrl,
                    logo_url: logoUrl,
                    updated_at: new Date().toISOString()
                })
                .eq('id', recordId);

            if (error) {
                msgEl.innerText = "❌ अपडेट असफल: " + error.message;
                msgEl.className = "msg error";
            } else {
                msgEl.innerText = "✅ सफलतापूर्वक अपडेट भयो!";
                msgEl.className = "msg success";
                loadSavedData();

                // Clear file inputs
                document.getElementById('bgFile').value = '';
                document.getElementById('logoFile').value = '';
            }
        }

        async function logoutAdmin() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        // Event listeners for date/time update
        document.getElementById('nepaliHour').addEventListener('change', updateNepaliDateDisplay);
        document.getElementById('nepaliMinute').addEventListener('change', updateNepaliDateDisplay);
        document.getElementById('nepaliPeriod').addEventListener('change', updateNepaliDateDisplay);
        document.getElementById('nepaliDay').addEventListener('change', updateNepaliDateDisplay);
        document.getElementById('nepaliMonth').addEventListener('change', updateNepaliDateDisplay);
        document.getElementById('nepaliYear').addEventListener('change', updateNepaliDateDisplay);
        document.getElementById('nepaliWeekday').addEventListener('change', updateNepaliDateDisplay);
    </script>
