<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Banner Settings</title>
    <link rel="preconnect" href="https://kbyfvqkfcxqgjjtfvvxf.supabase.co">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f0f2f5 0%, #e8eaf0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 900px;
        }

        h2, h3 {
            text-align: center;
            color: #d32f2f;
            margin-bottom: 20px;
            font-weight: 700;
        }

        h2 {
            font-size: 1.8rem;
            border-bottom: 3px solid #d32f2f;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="file"],
        select,
        textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            background: #fafafa;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #d32f2f;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(211, 47, 47, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(211, 47, 47, 0.4);
        }

        .btn-secondary {
            background: #555;
            color: white;
        }

        .btn-secondary:hover {
            background: #333;
            transform: translateY(-2px);
        }

        .hidden {
            display: none !important;
        }

        .msg {
            text-align: center;
            margin-top: 12px;
            font-weight: 600;
            padding: 10px;
            border-radius: 6px;
        }

        .success {
            color: #155724;
            background: #d4edda;
            border: 1px solid #c3e6cb;
        }

        .error {
            color: #721c24;
            background: #f8d7da;
            border: 1px solid #f5c6cb;
        }

        .info {
            color: #0c5460;
            background: #d1ecf1;
            border: 1px solid #bee5eb;
        }

        .saved-data-section {
            margin-bottom: 30px;
            border-bottom: 3px solid #e0e0e0;
            padding-bottom: 25px;
        }

        .table-wrapper {
            overflow-x: auto;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th, td {
            padding: 12px 15px;
            text-align: center;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .edit-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .edit-btn:hover {
            background: #1b5e20;
            transform: scale(1.05);
        }

        .preview-img {
            max-height: 80px;
            max-width: 200px;
            margin-top: 8px;
            border-radius: 6px;
            border: 2px solid #e0e0e0;
            padding: 3px;
            background: white;
            display: none;
        }

        .date-time-selector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .nepali-date-display {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            margin-top: 10px;
            text-align: center;
            font-size: 1.1rem;
            color: #333;
        }

        .nepali-date-display strong {
            color: #d32f2f;
        }

        .time-picker {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .time-picker select {
            flex: 1;
            min-width: 80px;
        }

        .badge {
            display: inline-block;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .badge-success { background: #d4edda; color: #155724; }
        .badge-warning { background: #fff3cd; color: #856404; }
        .badge-danger { background: #f8d7da; color: #721c24; }

        .row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .row .form-group {
            flex: 1;
            min-width: 200px;
        }

        .font-size-section {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px 25px;
            margin-bottom: 25px;
        }

        .font-size-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 12px 0;
        }

        .font-size-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
            color: white;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(211, 47, 47, 0.3);
        }

        .font-size-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 18px rgba(211, 47, 47, 0.4);
        }

        .font-size-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #d32f2f;
            min-width: 80px;
            text-align: center;
            background: white;
            padding: 4px 16px;
            border-radius: 8px;
            border: 2px solid #d32f2f;
        }

        .login-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 20px;
        }

        .login-modal-box {
            background: #ffffff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            width: 100%;
            max-width: 400px;
        }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            h2 { font-size: 1.4rem; }
            .date-time-selector { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Login Popup Modal -->
    <div class="login-modal-overlay" id="loginSection">
        <div class="login-modal-box">
            <h2>🔐 Admin Login</h2>
            <div class="form-group">
                <label>📧 इमेल (Email)</label>
                <input type="email" id="adminEmail" placeholder="admin@example.com" autofocus>
            </div>
            <div class="form-group">
                <label>🔑 पासवर्ड (Password)</label>
                <input type="password" id="adminPassword" placeholder="********" onkeydown="if(event.key==='Enter') loginAdmin()">
            </div>
            <button class="btn btn-primary" onclick="loginAdmin()" id="loginBtn">लगइन गर्नुहोस् (Login)</button>
            <p id="loginMsg" class="msg"></p>
        </div>
    </div>

    <div class="container">
        <!-- Dashboard Section -->
        <div id="dashboardSection" class="hidden">

            <div class="saved-data-section">
                <h3>📋 सेभ भएका ब्यानरहरूको सूची</h3>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>लाइभ</th>
                                <th>बैठकको नाम</th>
                                <th>आयोजक</th>
                                <th>मिति</th>
                                <th>समय</th>
                                <th>कार्य</th>
                            </tr>
                        </thead>
                        <tbody id="dataTableBody">
                            <tr><td colspan="6" style="color: #999;">लोड हुँदै...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <h2>✏️ Banner <strong>Update Form</strong></h2>
            <input type="hidden" id="recordId" value="1">

            <!-- FONT SIZE SECTION -->
            <div class="font-size-section">
                <h3>🔠 लाइभ पेजमा अक्षरको साइज (Live Page Text Size)</h3>
                <div class="font-size-control">
                    <button type="button" class="font-size-btn" onclick="adjustFontScale(-10)">−</button>
                    <span class="font-size-value" id="fontScaleDisplay">100%</span>
                    <button type="button" class="font-size-btn" onclick="adjustFontScale(10)">+</button>
                </div>
                <input type="hidden" id="fontScale" value="100">
            </div>

            <!-- MEETING NAME & ORGANIZED BY -->
            <div class="form-group">
                <h3 style="margin-bottom:15px;">🏛️ बैठकको नाम र आयोजक (Meeting Name & Organized By)</h3>
                <label>🏛️ बैठकको नाम (Meeting Name)</label>
                <textarea id="meetingName" rows="2" placeholder="e.g., कर्मचारी मासिक बैठक"></textarea>

                <label style="margin-top:14px;">🏢 आयोजक (Organized By)</label>
                <input type="text" id="organizedBy" placeholder="e.g., गलकोट नगरपालिका">
            </div>

            <!-- Nepali Date and Time Selector -->
            <div class="form-group">
                <label>📅 नेपाली मिति (Nepali Date)</label>
                <div class="date-time-selector">
                    <div>
                        <select id="nepaliYear" onchange="updateNepaliDays(); updateNepaliWeekday(); updateNepaliDateDisplay()"></select>
                        <label style="font-size:0.85rem;">वर्ष (Year)</label>
                    </div>
                    <div>
                        <select id="nepaliMonth" onchange="updateNepaliDays(); updateNepaliWeekday(); updateNepaliDateDisplay()"></select>
                        <label style="font-size:0.85rem;">महिना (Month)</label>
                    </div>
                    <div>
                        <select id="nepaliDay" onchange="updateNepaliWeekday(); updateNepaliDateDisplay()"></select>
                        <label style="font-size:0.85rem;">दिन (Day)</label>
                    </div>
                    <div>
                        <select id="nepaliWeekday" onchange="updateNepaliDateDisplay()"></select>
                        <label style="font-size:0.85rem;">बार (Weekday)</label>
                    </div>
                </div>
                <div class="nepali-date-display" id="nepaliDateDisplay">
                    <strong>📆</strong> <span id="selectedNepaliDate">--</span>
                </div>
            </div>

            <div class="form-group">
                <label>🕐 नेपाली समय (Nepali Time)</label>
                <div class="time-picker">
                    <select id="nepaliHour"></select>
                    <span>:</span>
                    <select id="nepaliMinute"></select>
                    <select id="nepaliPeriod">
                        <option value="AM">AM</option>
                        <option value="PM">PM</option>
                    </select>
                </div>
            </div>

            <input type="hidden" id="dateText">
            <input type="hidden" id="timeText">

            <div class="form-group">
                <label>🖼️ Background Image (JPG, PNG, WebP - Max 5MB)</label>
                <input type="file" id="bgFile" accept="image/jpeg,image/png,image/webp">
                <img id="bgPreview" class="preview-img" alt="Background Preview">
                <span id="bgStatus" class="badge badge-warning">No image</span>
            </div>

            <div class="form-group">
                <label>🏷️ Logo Image (JPG, PNG, WebP - Max 2MB)</label>
                <input type="file" id="logoFile" accept="image/jpeg,image/png,image/webp">
                <img id="logoPreview" class="preview-img" alt="Logo Preview">
                <span id="logoStatus" class="badge badge-warning">No image</span>
            </div>

            <button class="btn btn-primary" onclick="updateBannerData()" id="updateBtn">
                💾 सेभ र अपडेट गर्नुहोस् (Save & Update)
            </button>
            <p id="updateMsg" class="msg"></p>

            <button class="btn btn-secondary" onclick="logoutAdmin()">🚪 लगआउट (Logout)</button>
        </div>
    </div>

    <script>
        // ===== NEPALI DATE SYSTEM =====
        const NepaliDate = {
            months: ['बैशाख', 'जेठ', 'असार', 'साउन', 'भदौ', 'असोज', 'कात्तिक', 'मंसिर', 'पुष', 'माघ', 'फागुन', 'चैत'],
            weekdays: ['आइतबार', 'सोमबार', 'मंगलबार', 'बुधबार', 'बिहिबार', 'शुक्रबार', 'शनिबार'],
            monthDays: {
                2080: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 30],
                2081: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 30],
                2082: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 30],
                2083: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 30],
                2084: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 30],
                2085: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 30],
                2086: [31, 32, 31, 32, 31, 30, 30, 30, 29, 30, 29, 30]
            },
            referenceYear: 2080,
            referenceMonth: 0,
            referenceDay: 1,
            referenceEnglishDate: new Date(2023, 3, 14)
        };

        function toNepaliDigits(input) {
            const nepaliDigits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९'];
            return String(input).replace(/[0-9]/g, d => nepaliDigits[d]);
        }

        function initializeNepaliDateSelectors() {
            const yearSelect = document.getElementById('nepaliYear');
            const monthSelect = document.getElementById('nepaliMonth');
            const weekdaySelect = document.getElementById('nepaliWeekday');

            weekdaySelect.innerHTML = '';
            NepaliDate.weekdays.forEach((day, index) => {
                const opt = document.createElement('option');
                opt.value = index; opt.textContent = day;
                weekdaySelect.appendChild(opt);
            });

            yearSelect.innerHTML = '';
            for (let y = 2080; y <= 2086; y++) {
                const opt = document.createElement('option');
                opt.value = y; opt.textContent = y;
                yearSelect.appendChild(opt);
            }

            monthSelect.innerHTML = '';
            NepaliDate.months.forEach((m, index) => {
                const opt = document.createElement('option');
                opt.value = index; opt.textContent = m;
                monthSelect.appendChild(opt);
            });

            yearSelect.value = 2081;
            monthSelect.value = 0;
            updateNepaliDays();
            updateNepaliWeekday();
            updateNepaliDateDisplay();

            const hourSelect = document.getElementById('nepaliHour');
            for (let i = 1; i <= 12; i++) {
                hourSelect.innerHTML += `<option value="${i}">${i.toString().padStart(2, '0')}</option>`;
            }
            const minSelect = document.getElementById('nepaliMinute');
            for (let i = 0; i < 60; i += 5) {
                minSelect.innerHTML += `<option value="${i}">${i.toString().padStart(2, '0')}</option>`;
            }
        }

        function updateNepaliDays() {
            const year = parseInt(document.getElementById('nepaliYear').value);
            const month = parseInt(document.getElementById('nepaliMonth').value);
            const daySelect = document.getElementById('nepaliDay');
            const daysInMonth = (NepaliDate.monthDays[year] && NepaliDate.monthDays[year][month]) || 31;
            
            daySelect.innerHTML = '';
            for (let d = 1; d <= daysInMonth; d++) {
                daySelect.innerHTML += `<option value="${d}">${toNepaliDigits(d)}</option>`;
            }
        }

        function updateNepaliWeekday() {
            const year = parseInt(document.getElementById('nepaliYear').value);
            const month = parseInt(document.getElementById('nepaliMonth').value);
            const day = parseInt(document.getElementById('nepaliDay').value);
            let daysDiff = 0;
            for (let y = NepaliDate.referenceYear; y < year; y++) {
                const days = NepaliDate.monthDays[y];
                if (days) {
                    daysDiff += days.reduce((a, b) => a + b, 0);
                }
            }
            for (let m = 0; m < month; m++) {
                const days = NepaliDate.monthDays[year];
                if (days) {
                    daysDiff += days[m];
                }
            }
            daysDiff += (day - NepaliDate.referenceDay);
            const weekdayIndex = (1 + daysDiff) % 7;
            document.getElementById('nepaliWeekday').value = weekdayIndex;
        }

        function updateNepaliDateDisplay() {
            const year = document.getElementById('nepaliYear').value;
            const month = parseInt(document.getElementById('nepaliMonth').value);
            const day = document.getElementById('nepaliDay').value;
            const weekdayIndex = parseInt(document.getElementById('nepaliWeekday').value);
            const weekdayName = NepaliDate.weekdays[weekdayIndex];

            document.getElementById('selectedNepaliDate').textContent = `${toNepaliDigits(year)} ${NepaliDate.months[month]} ${toNepaliDigits(day)}, ${weekdayName}`;
            document.getElementById('dateText').value = `मिति: ${toNepaliDigits(year)} ${NepaliDate.months[month]} ${toNepaliDigits(day)} गते, ${weekdayName}`;
            
            const hour = document.getElementById('nepaliHour').value;
            const minute = document.getElementById('nepaliMinute').value;
            const period = document.getElementById('nepaliPeriod').value;
            document.getElementById('timeText').value = `बैठक सुरु समय: ${toNepaliDigits(hour)}:${toNepaliDigits(minute.toString().padStart(2, '0'))} बजे`;
        }

        function adjustFontScale(delta) {
            const input = document.getElementById('fontScale');
            let current = parseInt(input.value) || 100;
            let newVal = Math.min(Math.max(current + delta, 50), 200);
            input.value = newVal;
            document.getElementById('fontScaleDisplay').textContent = newVal + '%';
        }

        // ===== SUPABASE CONFIGURATION =====
        const SUPABASE_URL = 'https://kbyfvqkfcxqgjjtfvvxf.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-bOiDndDXdz_FgXq1MFkag_ioCcg8nv';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function isAdminUser(user) {
            try {
                const email = user.email;
                if (!email) return false;

                const { data, error } = await supabaseClient
                    .from('user_roles')
                    .select('role, status')
                    .eq('email', email)
                    .eq('role', 'admin')
                    .eq('status', 'active')
                    .maybeSingle();

                if (error) {
                    console.error('Error checking admin role by email:', error);
                    const { data: data2, error: error2 } = await supabaseClient
                        .from('user_roles')
                        .select('role, status')
                        .eq('user_id', user.id)
                        .eq('role', 'admin')
                        .eq('status', 'active')
                        .maybeSingle();
                    
                    if (error2 || !data2) return false;
                    return true;
                }

                if (!data) return false;
                return true;
            } catch (err) {
                console.error('Role check error:', err);
                return false;
            }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            initializeNepaliDateSelectors();

            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                const allowed = await isAdminUser(session.user);
                if (allowed) {
                    showDashboard();
                    return;
                } else {
                    await supabaseClient.auth.signOut();
                }
            }
            document.getElementById('loginSection').classList.remove('hidden');
        });

        async function loginAdmin() {
            const email = document.getElementById('adminEmail').value.trim();
            const password = document.getElementById('adminPassword').value;
            const msgEl = document.getElementById('loginMsg');
            const loginBtn = document.getElementById('loginBtn');

            if (!email || !password) {
                msgEl.innerText = "कृपया इमेल र पासवर्ड भर्नुहोस्";
                msgEl.className = "msg error";
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '⏳ लगइन हुँदै...';

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

            if (error) {
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'लगइन गर्नुहोस् (Login)';
                msgEl.innerText = "❌ लगइन असफल: " + error.message;
                msgEl.className = "msg error";
                return;
            }

            msgEl.innerText = "⏳ पहुँच जाँच हुँदै...";
            msgEl.className = "msg info";

            const allowed = await isAdminUser(data.user);
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'लगइन गर्नुहोस् (Login)';

            if (!allowed) {
                await supabaseClient.auth.signOut();
                msgEl.innerText = "❌ पहुँच अस्वीकृत: तपाईंको एडमिन (admin) रोल छैन!";
                msgEl.className = "msg error";
                return;
            }

            showDashboard();
        }

        function showDashboard() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            loadSavedData();
        }

        async function loadSavedData() {
            const tableBody = document.getElementById('dataTableBody');
            tableBody.innerHTML = '<tr><td colspan="6" style="color: #999;">लोड हुँदै...</td></tr>';

            const { data, error } = await supabaseClient
                .from('banner_settings')
                .select('*')
                .order('id', { ascending: true });

            if (error) {
                tableBody.innerHTML = '<tr><td colspan="6" style="color: red;">❌ डाटा लोड गर्न असफल</td></tr>';
                return;
            }

            if (!data || data.length === 0) {
                const defaultData = {
                    meeting_name: 'बैठकको नाम',
                    organized_by: 'आयोजकको नाम',
                    date_text: 'मिति: २०८१ बैशाख १ गते, सोमबार',
                    time_text: 'बैठक सुरु समय: १०:०० बजे',
                    is_active: true,
                    font_scale: 100
                };
                const { error: insertError } = await supabaseClient
                    .from('banner_settings')
                    .insert(defaultData);
                
                if (insertError) {
                    tableBody.innerHTML = '<tr><td colspan="6" style="color: red;">❌ सुरुवाती डाटा बनाउन असफल</td></tr>';
                    return;
                }
                loadSavedData();
                return;
            }

            tableBody.innerHTML = '';
            data.forEach((item) => {
                const isActive = item.is_active ? 'checked' : '';
                tableBody.innerHTML += `
                    <tr>
                        <td><input type="radio" name="activeRadio" ${isActive} onclick="setActiveBanner(${item.id})"></td>
                        <td><strong>${item.meeting_name || ''}</strong></td>
                        <td>${item.organized_by || ''}</td>
                        <td>${item.date_text || ''}</td>
                        <td>${item.time_text || ''}</td>
                        <td><button class="edit-btn" onclick='editRecord(${JSON.stringify(item)})'>✏️ Edit</button></td>
                    </tr>
                `;
            });
        }

        async function setActiveBanner(id) {
            await supabaseClient.from('banner_settings').update({ is_active: false }).neq('id', id);
            await supabaseClient.from('banner_settings').update({ is_active: true }).eq('id', id);
            loadSavedData();
        }

        window.editRecord = function(item) {
            document.getElementById('recordId').value = item.id;
            document.getElementById('meetingName').value = item.meeting_name || '';
            document.getElementById('organizedBy').value = item.organized_by || '';
            document.getElementById('fontScale').value = item.font_scale || 100;
            document.getElementById('fontScaleDisplay').textContent = (item.font_scale || 100) + '%';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function updateBannerData() {
            const recordId = document.getElementById('recordId').value;
            const meetingName = document.getElementById('meetingName').value.trim();
            const organizedBy = document.getElementById('organizedBy').value.trim();
            const fontScale = parseInt(document.getElementById('fontScale').value) || 100;
            const msgEl = document.getElementById('updateMsg');

            if (!meetingName || !organizedBy) {
                msgEl.innerText = "कृपया सबै विवरण भर्नुहोस्";
                msgEl.className = "msg error";
                return;
            }

            msgEl.innerText = "⏳ सेभ हुँदैछ...";
            msgEl.className = "msg info";

            const { error } = await supabaseClient
                .from('banner_settings')
                .update({
                    meeting_name: meetingName,
                    organized_by: organizedBy,
                    date_text: document.getElementById('dateText').value,
                    time_text: document.getElementById('timeText').value,
                    font_scale: fontScale,
                    updated_at: new Date().toISOString()
                })
                .eq('id', recordId);

            if (error) {
                msgEl.innerText = "❌ अपडेट असफल: " + error.message;
                msgEl.className = "msg error";
            } else {
                msgEl.innerText = "✅ सफलतापूर्वक अपडेट भयो!";
                msgEl.className = "msg success";
                loadSavedData();
            }
        }

        async function logoutAdmin() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        document.getElementById('nepaliHour').addEventListener('change', updateNepaliDateDisplay);
        document.getElementById('nepaliMinute').addEventListener('change', updateNepaliDateDisplay);
        document.getElementById('nepaliPeriod').addEventListener('change', updateNepaliDateDisplay);
    </script>
</body>
</html>
