<!DOCTYPE html>
<html lang="ne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>निकासा विवरण - गलकोट नगरपालिका</title>
<style>
  @font-face {
    font-family: 'Noto Sans Devanagari';
    src: local('Noto Sans Devanagari');
  }
  :root{
    --ink:#1a1a1a;
    --paper:#ffffff;
    --accent:#8b1a1a;
    --line:#333;
    --muted:#666;
    --bg:#eef1f5;
  }
  *{box-sizing:border-box;}
  body{
    font-family:'Noto Sans Devanagari','Mangal','Kalimati',sans-serif;
    background:var(--bg);
    margin:0;
    padding:0;
    color:var(--ink);
  }

  /* ===== Toolbar (screen only) ===== */
  .toolbar{
    position:sticky;
    top:0;
    z-index:50;
    background:#fff;
    border-bottom:2px solid var(--accent);
    padding:14px 20px;
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
  }
  .toolbar h1{
    font-size:16px;
    margin:0;
    color:var(--accent);
    white-space:nowrap;
    flex:0 0 auto;
  }
  .search-wrap{
    position:relative;
    flex:1 1 260px;
    min-width:200px;
  }
  #schoolSearch{
    width:100%;
    padding:9px 12px;
    border:1.5px solid #ccc;
    border-radius:6px;
    font-size:14px;
    font-family:inherit;
  }
  #schoolSearch:focus{
    outline:none;
    border-color:var(--accent);
  }
  .suggestions{
    position:absolute;
    top:calc(100% + 4px);
    left:0;
    right:0;
    background:#fff;
    border:1px solid #ddd;
    border-radius:6px;
    max-height:280px;
    overflow-y:auto;
    box-shadow:0 6px 18px rgba(0,0,0,0.15);
    display:none;
    z-index:60;
  }
  .suggestions.open{display:block;}
  .suggestions div{
    padding:9px 12px;
    cursor:pointer;
    font-size:14px;
    border-bottom:1px solid #f0f0f0;
  }
  .suggestions div:last-child{border-bottom:none;}
  .suggestions div:hover, .suggestions div.active{
    background:#fdeeee;
  }
  .suggestions .count-badge{
    color:var(--muted);
    font-size:12px;
    float:right;
  }
  select#schoolSelect{
    padding:9px 10px;
    border:1.5px solid #ccc;
    border-radius:6px;
    font-family:inherit;
    font-size:14px;
    max-width:260px;
  }
  .btn{
    padding:9px 16px;
    border-radius:6px;
    border:1.5px solid var(--accent);
    background:var(--accent);
    color:#fff;
    font-size:14px;
    cursor:pointer;
    font-family:inherit;
    white-space:nowrap;
  }
  .btn.secondary{
    background:#fff;
    color:var(--accent);
  }
  .btn:hover{opacity:0.88;}
  .status{
    font-size:13px;
    color:var(--muted);
    flex:0 0 auto;
  }

  /* ===== Sheet layout ===== */
  .sheets{
    padding:24px 12px 60px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:26px;
  }
  .sheet{
    background:var(--paper);
    width:210mm;
    min-height:297mm;
    max-width:100%;
    padding:14mm 16mm;
    box-shadow:0 4px 18px rgba(0,0,0,0.18);
    display:none;
  }
  .sheet.visible{display:block;}

  .letterhead{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
    text-align:center;
    margin-bottom:2px;
  }
  .letterhead img{height:70px;object-fit:contain;}
  .letterhead .titles{line-height:1.35;}
  .letterhead .org-name{
    font-size:22px;
    font-weight:700;
  }
  .letterhead .sub{
    font-size:14px;
    font-weight:600;
  }
  .letterhead .addr{
    font-size:13px;
  }
  hr.rule{
    border:none;
    border-top:2px solid var(--ink);
    margin:6px 0 10px;
  }

  .meta-row{
    display:flex;
    justify-content:space-between;
    font-size:13.5px;
    margin-bottom:4px;
  }
  .meta-row .left{}
  .meta-row .right{text-align:right;}

  .subject{
    text-align:center;
    font-weight:700;
    text-decoration:underline;
    margin:14px 0 14px;
    font-size:14.5px;
  }

  .to-block{
    font-weight:700;
    font-size:14px;
    margin-bottom:2px;
  }

  .body-para{
    text-align:justify;
    font-size:13.5px;
    line-height:1.9;
    margin:12px 0 14px;
  }

  .tapasil-label{
    font-weight:700;
    text-decoration:underline;
    margin-bottom:6px;
    font-size:14px;
  }

  table.tapasil{
    width:100%;
    border-collapse:collapse;
    font-size:12.3px;
  }
  table.tapasil th, table.tapasil td{
    border:1px solid var(--ink);
    padding:5px 6px;
    vertical-align:top;
  }
  table.tapasil th{
    background:#f2ede2;
    font-weight:700;
    text-align:center;
  }
  table.tapasil td.sn{text-align:center;width:30px;}
  table.tapasil td.title{text-align:left;font-weight:600;}
  table.tapasil td.amt{text-align:right;white-space:nowrap;width:100px;}
  table.tapasil td.remark{font-size:11.5px;color:#333;}
  table.tapasil tr.total-row td{
    font-weight:700;
    background:#f7f1e4;
  }

  .footer-note{
    margin-top:14px;
    font-size:12px;
    color:var(--muted);
  }

  .sign-block{
    margin-top:34px;
    font-size:13.5px;
    text-align:right;
  }

  /* ===== Print ===== */
  @media print{
    body{background:#fff;}
    .toolbar{display:none;}
    .sheets{padding:0;gap:0;}
    .sheet{
      display:none;
      box-shadow:none;
      width:auto;
      min-height:auto;
      margin:0;
      padding:12mm 15mm;
      page-break-after:always;
    }
    .sheet.print-this{display:block;}
    @page{size:A4;margin:10mm;}
  }
</style>
</head>
<body>

<div class="toolbar">
  <h1>गलकोट नगरपालिका — निकासा विवरण</h1>
  <div class="search-wrap">
    <input type="text" id="schoolSearch" placeholder="विद्यालयको नाम खोज्नुहोस्... (जस्तै: सरस्वती)" autocomplete="off">
    <div class="suggestions" id="suggestions"></div>
  </div>
  <select id="schoolSelect"></select>
  <button class="btn" id="printCurrentBtn">यो पाना प्रिन्ट गर्नुहोस्</button>
  <button class="btn secondary" id="printAllBtn">सबै विद्यालय प्रिन्ट गर्नुहोस्</button>
  <span class="status" id="statusText"></span>
</div>

<div class="sheets" id="sheets"></div>

const items = DATA.items;
const schools = DATA.schools;

function fmtAmount(v){
  if (v === null || v === undefined) return "";
  let s = (Math.round(v*100)/100).toString();
  // Add thousands separators (Nepali/Indian grouping not required; use plain grouping)
  let parts = s.split(".");
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  return parts.join(".");
}

function computeTotal(values){
  return values.reduce((a,b)=> a + (b || 0), 0);
}

function buildSheetHTML(school, idx){
  let rows = "";
  items.forEach((item, i) => {
    const val = school.values[i];
    rows += `<tr>
      <td class="sn">${item.sn}</td>
      <td class="title">${item.title}</td>
      <td class="amt">${fmtAmount(val)}</td>
      <td class="remark">${item.remark || ""}</td>
    </tr>`;
  });
  const total = computeTotal(school.values);
  rows += `<tr class="total-row">
    <td class="sn"></td>
    <td class="title">जम्मा</td>
    <td class="amt">${fmtAmount(total)}</td>
    <td class="remark"></td>
  </tr>`;

  return `
  <div class="letterhead">
    <img src="${LOGO1}" alt="logo">
    <div class="titles">
      <div class="org-name">गलकोट नगरपालिका</div>
      <div class="sub">नगर कार्यपालिकाको कार्यालय</div>
      <div class="sub">शिक्षा, युवा तथा खेलकुद शाखा</div>
      <div class="addr">गलकोट, बागलुङ &nbsp;|&nbsp; गण्डकी प्रदेश, नेपाल</div>
    </div>
    <img src="${LOGO2}" alt="logo">
  </div>
  <hr class="rule">
  <div class="meta-row">
    <div class="left">प.सं. : ०८२/०८३</div>
    <div class="right">च.नं. : __________ (शिक्षा)</div>
  </div>
  <div class="subject">विषय: निकासाको विवरण पठाइएको ।</div>
  <div class="to-block">श्री ${school.name}</div>
  <div class="to-block" style="font-weight:600;">गलकोट नगरपालिका, बागलुङ ।</div>
  <p class="body-para">
    प्रस्तुत विषयमा आ.व. ०८२/०८३ (२०८२ साउनदेखि २०८३ असार मसान्तसम्म) त्यस विद्यालयलाई गरिएको निकासा विवरण देहायअनुसार रहेको व्यहोरा अनुरोध छ । उक्त निकासा रकम सम्बन्धित शीर्षकमा विद्यालय व्यवस्थापन समितिको निर्णयानुसार खर्च गरी सोको श्रेस्ता चुस्त दुरुस्त राख्नुहुन समेत अनुरोध छ । साथै विद्यालयमा जिन्सी सामानको अभिलेख अनिवार्य रुपमा जिन्सी अभिलेखमा राख्ने व्यवस्था मिलाउनुहुन समेत जानकारी गराइन्छ ।
  </p>
  <div class="tapasil-label">तपसील:</div>
  <table class="tapasil">
    <thead>
      <tr>
        <th style="width:30px;">सि.नं.</th>
        <th>निकासा शीर्षक</th>
        <th style="width:100px;">निकासा रकम</th>
        <th>कैफियत</th>
      </tr>
    </thead>
    <tbody>
      ${rows}
    </tbody>
  </table>
  <div class="sign-block">
    ..............................<br>
    शिक्षा, युवा तथा खेलकुद शाखा<br>
    गलकोट नगरपालिका
  </div>
  `;
}

const sheetsContainer = document.getElementById('sheets');
const sheetEls = [];

schools.forEach((school, idx) => {
  const div = document.createElement('div');
  div.className = 'sheet';
  div.id = 'sheet-' + idx;
  div.innerHTML = buildSheetHTML(school, idx);
  sheetsContainer.appendChild(div);
  sheetEls.push(div);
});

const selectEl = document.getElementById('schoolSelect');
schools.forEach((s, idx) => {
  const opt = document.createElement('option');
  opt.value = idx;
  opt.textContent = s.name;
  selectEl.appendChild(opt);
});

const statusText = document.getElementById('statusText');

function showSchool(idx){
  sheetEls.forEach(el => el.classList.remove('visible'));
  if (idx === null || idx === undefined || idx < 0) {
    statusText.textContent = '';
    return;
  }
  sheetEls[idx].classList.add('visible');
  selectEl.value = idx;
  statusText.textContent = (idx+1) + ' / ' + schools.length + ' — ' + schools[idx].name;
}

// initial: show first school
let currentIdx = 0;
showSchool(currentIdx);

selectEl.addEventListener('change', (e) => {
  currentIdx = parseInt(e.target.value, 10);
  showSchool(currentIdx);
});

// ===== Search / autocomplete =====
const searchInput = document.getElementById('schoolSearch');
const suggestionsBox = document.getElementById('suggestions');
let activeSuggestion = -1;

function renderSuggestions(query){
  const q = query.trim();
  suggestionsBox.innerHTML = '';
  if (!q) { suggestionsBox.classList.remove('open'); return; }
  const matches = schools
    .map((s, idx) => ({s, idx}))
    .filter(o => o.s.name.includes(q))
    .slice(0, 20);
  if (matches.length === 0){
    suggestionsBox.innerHTML = '<div style="color:#999;cursor:default;">कुनै विद्यालय फेला परेन</div>';
    suggestionsBox.classList.add('open');
    return;
  }
  matches.forEach((m, i) => {
    const d = document.createElement('div');
    d.textContent = m.s.name;
    d.dataset.idx = m.idx;
    d.addEventListener('click', () => {
      currentIdx = m.idx;
      showSchool(currentIdx);
      searchInput.value = m.s.name;
      suggestionsBox.classList.remove('open');
    });
    suggestionsBox.appendChild(d);
  });
  activeSuggestion = -1;
  suggestionsBox.classList.add('open');
}

searchInput.addEventListener('input', (e) => renderSuggestions(e.target.value));
searchInput.addEventListener('focus', (e) => { if (e.target.value.trim()) renderSuggestions(e.target.value); });
document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-wrap')) suggestionsBox.classList.remove('open');
});
searchInput.addEventListener('keydown', (e) => {
  const opts = Array.from(suggestionsBox.querySelectorAll('div[data-idx]'));
  if (!opts.length) return;
  if (e.key === 'ArrowDown'){
    e.preventDefault();
    activeSuggestion = Math.min(activeSuggestion+1, opts.length-1);
    opts.forEach(o=>o.classList.remove('active'));
    opts[activeSuggestion].classList.add('active');
    opts[activeSuggestion].scrollIntoView({block:'nearest'});
  } else if (e.key === 'ArrowUp'){
    e.preventDefault();
    activeSuggestion = Math.max(activeSuggestion-1, 0);
    opts.forEach(o=>o.classList.remove('active'));
    opts[activeSuggestion].classList.add('active');
    opts[activeSuggestion].scrollIntoView({block:'nearest'});
  } else if (e.key === 'Enter'){
    e.preventDefault();
    if (activeSuggestion >= 0 && opts[activeSuggestion]){
      opts[activeSuggestion].click();
    } else if (opts.length){
      opts[0].click();
    }
  } else if (e.key === 'Escape'){
    suggestionsBox.classList.remove('open');
  }
});

// ===== Print =====
document.getElementById('printCurrentBtn').addEventListener('click', () => {
  sheetEls.forEach(el => el.classList.remove('print-this'));
  sheetEls[currentIdx].classList.add('print-this');
  window.print();
  setTimeout(() => sheetEls[currentIdx].classList.remove('print-this'), 500);
});

document.getElementById('printAllBtn').addEventListener('click', () => {
  sheetEls.forEach(el => el.classList.add('print-this'));
  window.print();
  setTimeout(() => sheetEls.forEach(el => el.classList.remove('print-this')), 500);
});
</script>
