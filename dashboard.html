<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-gray-100">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-gray-800">Blog Dashboard</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="blog.html" class="text-gray-600 hover:text-gray-900">
                        <i class="fas fa-eye"></i> View Blog
                    </a>
                    <button onclick="openAddModal()" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">
                        <i class="fas fa-plus mr-2"></i> Add Blog
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Blog List -->
        <div class="bg-white rounded-lg shadow">
            <div class="px-6 py-4 border-b border-gray-200">
                <h2 class="text-lg font-semibold text-gray-800">All Blogs</h2>
            </div>
            <div id="blogList" class="divide-y divide-gray-200">
                <!-- Blog items will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Add/Edit Blog Modal -->
    <div id="blogModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden">
        <div class="relative top-20 mx-auto p-5 border w-11/12 max-w-2xl shadow-lg rounded-lg bg-white">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-xl font-bold text-gray-800">Add New Blog</h3>
                <button onclick="closeModal()" class="text-gray-600 hover:text-gray-900">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="blogForm" class="space-y-4">
                <input type="hidden" id="blogId">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Title</label>
                    <input type="text" id="title" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Content</label>
                    <textarea id="content" rows="6" required class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Excerpt (optional)</label>
                    <input type="text" id="excerpt" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Image URL (optional)</label>
                    <input type="url" id="imageUrl" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" placeholder="https://example.com/image.jpg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Category</label>
                    <input type="text" id="category" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" placeholder="Technology, Lifestyle, etc.">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Status</label>
                    <select id="status" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                        <option value="draft">Draft</option>
                        <option value="published">Published</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Tags (comma separated)</label>
                    <input type="text" id="tags" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500" placeholder="tag1, tag2, tag3">
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-300 text-gray-800 rounded-lg hover:bg-gray-400 transition">
                        Cancel
                    </button>
                    <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                        Save Blog
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Supabase Configuration
        const supabaseUrl = 'https://yrvetxtjvkdvknnvngez.supabase.co';
        const supabaseKey = 'sb_publishable_nDDWRyOR3CTow6X8E7JdEQ_K8PcFfk5';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Load all blogs
        async function loadBlogs() {
            try {
                const { data, error } = await supabase
                    .from('blogs')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const container = document.getElementById('blogList');
                if (data.length === 0) {
                    container.innerHTML = `
                        <div class="px-6 py-8 text-center text-gray-500">
                            <i class="fas fa-inbox text-4xl mb-2"></i>
                            <p>No blogs found. Create your first blog!</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = data.map(blog => `
                    <div class="px-6 py-4 hover:bg-gray-50 transition flex items-center justify-between">
                        <div class="flex-1">
                            <h3 class="text-lg font-medium text-gray-800">${blog.title}</h3>
                            <div class="flex items-center space-x-4 mt-1">
                                <span class="text-sm text-gray-500">
                                    <i class="far fa-calendar-alt mr-1"></i> ${new Date(blog.created_at).toLocaleDateString()}
                                </span>
                                <span class="text-sm text-gray-500">
                                    <i class="far fa-eye mr-1"></i> ${blog.views || 0}
                                </span>
                                <span class="px-2 py-1 text-xs rounded-full ${blog.status === 'published' ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'}">
                                    ${blog.status}
                                </span>
                            </div>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="editBlog('${blog.id}')" class="text-blue-600 hover:text-blue-800 transition">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteBlog('${blog.id}')" class="text-red-600 hover:text-red-800 transition">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading blogs:', error);
            }
        }

        // Add Blog
        async function addBlog(blogData) {
            try {
                const { data, error } = await supabase
                    .from('blogs')
                    .insert([blogData])
                    .select();

                if (error) throw error;
                loadBlogs();
                closeModal();
                showNotification('Blog added successfully!', 'success');
            } catch (error) {
                console.error('Error adding blog:', error);
                showNotification('Error adding blog. Please try again.', 'error');
            }
        }

        // Update Blog
        async function updateBlog(id, blogData) {
            try {
                const { data, error } = await supabase
                    .from('blogs')
                    .update(blogData)
                    .eq('id', id)
                    .select();

                if (error) throw error;
                loadBlogs();
                closeModal();
                showNotification('Blog updated successfully!', 'success');
            } catch (error) {
                console.error('Error updating blog:', error);
                showNotification('Error updating blog. Please try again.', 'error');
            }
        }

        // Delete Blog
        async function deleteBlog(id) {
            if (!confirm('Are you sure you want to delete this blog?')) return;

            try {
                const { error } = await supabase
                    .from('blogs')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                loadBlogs();
                showNotification('Blog deleted successfully!', 'success');
            } catch (error) {
                console.error('Error deleting blog:', error);
                showNotification('Error deleting blog. Please try again.', 'error');
            }
        }

        // Edit Blog - Load data into modal
        async function editBlog(id) {
            try {
                const { data, error } = await supabase
                    .from('blogs')
                    .select('*')
                    .eq('id', id)
                    .single();

                if (error) throw error;

                document.getElementById('modalTitle').textContent = 'Edit Blog';
                document.getElementById('blogId').value = data.id;
                document.getElementById('title').value = data.title;
                document.getElementById('content').value = data.content;
                document.getElementById('excerpt').value = data.excerpt || '';
                document.getElementById('imageUrl').value = data.image_url || '';
                document.getElementById('category').value = data.category || '';
                document.getElementById('status').value = data.status || 'draft';
                document.getElementById('tags').value = data.tags ? data.tags.join(', ') : '';

                document.getElementById('blogModal').classList.remove('hidden');
            } catch (error) {
                console.error('Error loading blog for edit:', error);
                showNotification('Error loading blog data. Please try again.', 'error');
            }
        }

        // Open Add Modal
        function openAddModal() {
            document.getElementById('modalTitle').textContent = 'Add New Blog';
            document.getElementById('blogForm').reset();
            document.getElementById('blogId').value = '';
            document.getElementById('blogModal').classList.remove('hidden');
        }

        // Close Modal
        function closeModal() {
            document.getElementById('blogModal').classList.add('hidden');
            document.getElementById('blogForm').reset();
        }

        // Handle Form Submit
        document.getElementById('blogForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('blogId').value;
            const blogData = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                excerpt: document.getElementById('excerpt').value || null,
                image_url: document.getElementById('imageUrl').value || null,
                category: document.getElementById('category').value || null,
                status: document.getElementById('status').value,
                tags: document.getElementById('tags').value ? document.getElementById('tags').value.split(',').map(tag => tag.trim()) : []
            };

            if (id) {
                await updateBlog(id, blogData);
            } else {
                await addBlog(blogData);
            }
        });

        // Notification System
        function showNotification(message, type = 'success') {
            const colors = {
                success: 'bg-green-500',
                error: 'bg-red-500',
                info: 'bg-blue-500'
            };

            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 ${colors[type]} text-white px-6 py-3 rounded-lg shadow-lg z-50 transform transition-all duration-500`;
            notification.innerHTML = `
                <div class="flex items-center space-x-2">
                    <i class="fas ${type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'}"></i>
                    <span>${message}</span>
                </div>
            `;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.opacity = '0';
                setTimeout(() => notification.remove(), 500);
            }, 3000);
        }

        // Load blogs on page load
        document.addEventListener('DOMContentLoaded', loadBlogs);

        // Close modal on outside click
        document.getElementById('blogModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                closeModal();
            }
        });
    </script>
</body>
</html>
