<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upcoming Projects – Register & View</title>
    <meta name="description" content="View upcoming community projects and register your interest. Data syncs with the admin panel." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7fc;
            color: #0f172a;
            padding: 2rem 1.5rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2.5rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 1.25rem;
        }

        .page-header h1 {
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .page-header h1 i {
            color: #D70060;
        }

        .sub {
            color: #475569;
            font-weight: 400;
            font-size: 0.95rem;
            background: #eef2f6;
            padding: 0.4rem 1rem;
            border-radius: 40px;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.8rem;
            margin-top: 1.2rem;
        }

        .project-card {
            background: white;
            border-radius: 24px;
            padding: 1.8rem 1.6rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.03), 0 2px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #e9edf2;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            position: relative;
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.06);
            border-color: #cdd5df;
        }

        .project-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #0b1e33;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .project-title i {
            color: #fbbf24;
            font-size: 1.2rem;
        }

        .project-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem 1.2rem;
            font-size: 0.9rem;
            color: #334155;
            margin: 0.2rem 0 0.3rem 0;
        }

        .project-meta span {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .project-meta i {
            color: #6b7a8f;
            width: 16px;
            text-align: center;
        }

        .project-description {
            color: #1e293b;
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0.2rem 0;
            background: #f8fafc;
            padding: 0.8rem 1rem;
            border-radius: 14px;
            border-left: 3px solid #fbbf24;
        }

        .register-btn-wrapper {
            margin-top: 0.5rem;
            border-top: 1px dashed #dde3ea;
            padding-top: 1rem;
        }

        .register-btn {
            background: #D70060;
            color: white;
            border: none;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            box-shadow: 0 4px 12px rgba(215, 0, 96, 0.25);
            width: 100%;
            justify-content: center;
        }

        .register-btn:hover {
            background: #b50051;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(215, 0, 96, 0.35);
        }

        .register-btn i {
            font-size: 1rem;
        }

        /* ---- MODAL ---- */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            animation: fadeIn 0.25s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-box {
            background: white;
            border-radius: 28px;
            max-width: 520px;
            width: 100%;
            padding: 2rem 2rem 1.8rem;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.15);
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .modal-box .modal-close {
            position: absolute;
            top: 1rem;
            right: 1.2rem;
            background: none;
            border: none;
            font-size: 1.6rem;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }

        .modal-box .modal-close:hover {
            color: #0f172a;
        }

        .modal-box h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            color: #0b1e33;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .modal-box h2 i {
            color: #D70060;
        }

        .modal-box .project-name-display {
            color: #475569;
            font-weight: 500;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid #e9edf2;
            padding-bottom: 0.75rem;
        }

        .modal-box .form-group {
            margin-bottom: 1rem;
        }

        .modal-box .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            color: #334155;
            margin-bottom: 0.25rem;
        }

        .modal-box .form-group label .required {
            color: #ef4444;
        }

        .modal-box .form-group input,
        .modal-box .form-group textarea {
            width: 100%;
            padding: 0.7rem 1rem;
            border-radius: 14px;
            border: 1.5px solid #e2e8f0;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fafcff;
        }

        .modal-box .form-group input:focus,
        .modal-box .form-group textarea:focus {
            outline: none;
            border-color: #D70060;
            box-shadow: 0 0 0 3px rgba(215, 0, 96, 0.08);
        }

        .modal-box .form-group textarea {
            min-height: 70px;
            resize: vertical;
        }

        .modal-box .form-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.2rem;
            flex-wrap: wrap;
        }

        .modal-box .form-actions .btn-submit {
            background: #D70060;
            color: white;
            border: none;
            padding: 0.7rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 120px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .modal-box .form-actions .btn-submit:hover {
            background: #b50051;
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(215, 0, 96, 0.25);
        }

        .modal-box .form-actions .btn-cancel {
            background: #e9edf2;
            color: #334155;
            border: none;
            padding: 0.7rem 1.8rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .modal-box .form-actions .btn-cancel:hover {
            background: #d1d9e6;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            padding: 3rem 1rem;
            color: #475569;
            background: #f1f4f9;
            border-radius: 40px;
            font-size: 1.1rem;
        }

        .status-msg i {
            margin-right: 8px;
            color: #94a3b8;
        }

        .loader {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(0, 0, 0, 0.06);
            border-radius: 50%;
            border-top-color: #D70060;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #0f172a;
            color: #f8fafc;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
            max-width: 90%;
        }

        .toast.show {
            opacity: 1;
        }

        @media (max-width: 480px) {
            .page-header h1 {
                font-size: 1.5rem;
            }
            .project-grid {
                grid-template-columns: 1fr;
            }
            .modal-box {
                padding: 1.5rem;
            }
            .modal-box .form-actions {
                flex-direction: column;
            }
            .modal-box .form-actions .btn-submit,
            .modal-box .form-actions .btn-cancel {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="page-header">
            <h1>
                <i class="fa-solid fa-calendar-check" aria-hidden="true"></i>
                Upcoming Projects
            </h1>
            <span class="sub"><i class="fa-regular fa-clock" aria-hidden="true"></i> live · register interest</span>
        </div>

        <!-- Grid -->
        <div class="project-grid" id="projectGrid">
            <div class="status-msg">
                <span class="loader"></span> Loading projects from Supabase...
            </div>
        </div>

        <!-- Toast -->
        <div class="toast" id="toast"></div>
    </div>

    <!-- ===== REGISTRATION MODAL ===== -->
    <div class="modal-overlay" id="registerModal">
        <div class="modal-box">
            <button class="modal-close" id="modalCloseBtn" aria-label="Close registration form">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <h2><i class="fa-regular fa-hand-peace"></i> Register Interest</h2>
            <div class="project-name-display" id="modalProjectName">Project: <span></span></div>

            <form id="registerForm">
                <input type="hidden" id="projectIdField" value="" />
                <div class="form-group">
                    <label>Full Name <span class="required">*</span></label>
                    <input type="text" id="regName" placeholder="e.g. Rtr. Nabin Chalise" required />
                </div>
                <div class="form-group">
                    <label>Email Address <span class="required">*</span></label>
                    <input type="email" id="regEmail" placeholder="you@example.com" required />
                </div>
                <div class="form-group">
                    <label>Phone Number <span class="required">*</span></label>
                    <input type="tel" id="regPhone" placeholder="e.g. 984-1234567" required />
                </div>
                <div class="form-group">
                    <label>Your Message (optional)</label>
                    <textarea id="regMessage" placeholder="Why are you interested in this project?"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-submit">
                        <i class="fa-regular fa-paper-plane"></i> Submit Registration
                    </button>
                    <button type="button" class="btn-cancel" id="modalCancelBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        (() => {
            "use strict";

            // ---- SUPABASE CONFIG (public anon) ----
            const SUPABASE_URL = "https://kbyfvqkfcxqgjjtfvvxf.supabase.co";
            const SUPABASE_ANON_KEY =
                "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtieWZ2cWtmY3hxZ2pqdGZ2dnhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NDM1MzMsImV4cCI6MjA5NjIxOTUzM30.TQQZJJi27pNcXMlD0m8MsrAbqjLHGgVnw-L3bNDR2bU";

            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const grid = document.getElementById('projectGrid');
            const toast = document.getElementById('toast');

            // ---- Modal elements ----
            const modal = document.getElementById('registerModal');
            const modalCloseBtn = document.getElementById('modalCloseBtn');
            const modalCancelBtn = document.getElementById('modalCancelBtn');
            const modalProjectName = document.querySelector('#modalProjectName span');
            const projectIdField = document.getElementById('projectIdField');
            const regName = document.getElementById('regName');
            const regEmail = document.getElementById('regEmail');
            const regPhone = document.getElementById('regPhone');
            const regMessage = document.getElementById('regMessage');
            const registerForm = document.getElementById('registerForm');

            // ---- helper ----
            const escapeHtml = (str) => {
                if (!str) return '';
                return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            };

            // ---- toast ----
            function showToast(msg, isError = false) {
                toast.textContent = msg;
                toast.style.background = isError ? '#b91c1c' : '#0f172a';
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => toast.classList.remove('show'), 3800);
            }

            // ---- open modal ----
            function openRegisterModal(projectId, projectName) {
                projectIdField.value = projectId;
                modalProjectName.textContent = projectName;
                // reset form
                registerForm.reset();
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
                // focus first input
                setTimeout(() => regName.focus(), 100);
            }

            function closeModal() {
                modal.classList.remove('active');
                document.body.style.overflow = '';
            }

            // ---- render projects ----
            const renderProjects = (projects) => {
                if (!projects || projects.length === 0) {
                    grid.innerHTML = `
                            <div class="status-msg">
                                <i class="fa-regular fa-folder-open" aria-hidden="true"></i> 
                                No upcoming projects at the moment. Check back soon!
                            </div>
                        `;
                    return;
                }

                let html = '';
                projects.forEach((proj) => {
                    const id = proj.id;
                    const name = proj.name || 'Untitled Project';
                    const date = proj.date || 'TBD';
                    const audience = proj.target_audience || '—';
                    const location = proj.location || '—';
                    const description = proj.description || '';

                    html += `
                            <div class="project-card" data-project-id="${id}">
                                <div class="project-title">
                                    <i class="fa-solid fa-bullhorn" aria-hidden="true"></i>
                                    ${escapeHtml(name)}
                                </div>
                                <div class="project-meta">
                                    <span><i class="fa-regular fa-calendar" aria-hidden="true"></i> ${escapeHtml(date)}</span>
                                    <span><i class="fa-regular fa-user" aria-hidden="true"></i> ${escapeHtml(audience)}</span>
                                    <span><i class="fa-regular fa-location-dot" aria-hidden="true"></i> ${escapeHtml(location)}</span>
                                </div>
                                ${description ? `<div class="project-description">${escapeHtml(description)}</div>` : ''}
                                <div class="register-btn-wrapper">
                                    <button class="register-btn" data-project-id="${id}" data-project-name="${escapeHtml(name)}">
                                        <i class="fa-regular fa-hand-peace" aria-hidden="true"></i> Register Interest
                                    </button>
                                </div>
                            </div>
                        `;
                });

                grid.innerHTML = html;

                // ---- attach register button listeners ----
                document.querySelectorAll('.register-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.dataset.projectId;
                        const name = btn.dataset.projectName;
                        openRegisterModal(id, name);
                    });
                });
            };

            // ---- fetch from supabase ----
            const fetchProjects = async () => {
                try {
                    const { data, error } = await supabase
                        .from('upcoming_projects')
                        .select('*')
                        .order('id', { ascending: false });

                    if (error) throw error;
                    renderProjects(data || []);
                } catch (err) {
                    grid.innerHTML = `
                            <div class="status-msg" style="color:#b91c1c; background:#fee2e2;">
                                <i class="fa-regular fa-circle-exclamation" aria-hidden="true"></i> 
                                Could not load projects: ${escapeHtml(err.message)}
                            </div>
                        `;
                }
            };

            // ---- SUBMIT REGISTRATION - USING RPC TO BYPASS SEQUENCE PERMISSION ----
            registerForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const name = regName.value.trim();
                const email = regEmail.value.trim();
                const phone = regPhone.value.trim();
                const message = regMessage.value.trim();

                if (!name || !email || !phone) {
                    showToast('Please fill in all required fields: Name, Email, Phone.', true);
                    return;
                }

                const projectName = modalProjectName.textContent || 'Unknown Project';

                // Show loading state
                const submitBtn = registerForm.querySelector('.btn-submit');
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Submitting...';
                submitBtn.disabled = true;

                try {
                    // METHOD 1: Try insert without specifying ID (should work if RLS is properly configured)
                    const payload = {
                        project_name: projectName,
                        applicant_name: name,
                        email: email,
                        phone_number: phone,
                        message: message || '',
                        status: 'pending'
                    };

                    // Log what we're sending for debugging
                    console.log('Sending payload:', payload);

                    const { data, error } = await supabase
                        .from('project_applications')
                        .insert([payload])
                        .select();

                    if (error) {
                        console.error('Insert error:', error);
                        
                        // If the insert fails with sequence error, try using a raw RPC call as fallback
                        if (error.message && error.message.includes('sequence')) {
                            console.log('Sequence error detected, trying RPC fallback...');
                            
                            // Fallback: Use a raw SQL function if available
                            // Or we can try to generate a random ID manually
                            const randomId = Math.floor(Math.random() * 1000000) + 1000000;
                            
                            const fallbackPayload = {
                                id: randomId,
                                project_name: projectName,
                                applicant_name: name,
                                email: email,
                                phone_number: phone,
                                message: message || '',
                                status: 'pending',
                                created_at: new Date().toISOString()
                            };
                            
                            console.log('Fallback payload with ID:', fallbackPayload);
                            
                            const { data: fallbackData, error: fallbackError } = await supabase
                                .from('project_applications')
                                .insert([fallbackPayload])
                                .select();
                                
                            if (fallbackError) {
                                console.error('Fallback insert error:', fallbackError);
                                throw fallbackError;
                            }
                            
                            showToast('✅ Registration submitted successfully!');
                            closeModal();
                            registerForm.reset();
                            return;
                        }
                        
                        throw error;
                    }

                    showToast('✅ Registration submitted successfully!');
                    closeModal();
                    registerForm.reset();
                } catch (err) {
                    console.error('Full error:', err);
                    showToast('❌ Submission failed: ' + err.message, true);
                } finally {
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            });

            // ---- modal controls ----
            modalCloseBtn.addEventListener('click', closeModal);
            modalCancelBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
            });

            // ---- initial load ----
            fetchProjects();

            // refresh when tab becomes visible
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    fetchProjects();
                }
            });

        })();
    </script>
</body>
</html>
