<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upcoming Initiatives | RAC Galkot Baglung</title>
    
    <!-- Meta Tags for SEO & Accessibility -->
    <meta name="description" content="Explore upcoming community initiatives, social work deployments, and youth leadership conclaves organized by the Rotaract Club of Galkot Baglung for the Rotaract Year 2026-27.">
    <meta name="keywords" content="Rotaract, Galkot, Baglung, Upcoming Projects, Strategic Matrix, Community Service, Volunteer Nepal">
    <meta name="author" content="Rotaract Club of Galkot Baglung">
    
    <style>
        :root {
            --accent-pink: #D70060;
            --rotary-blue: #015491;
            --rotary-blue-light: #0274c7;
            --slate-900: #0F172A;
            --slate-800: #1E293B;
            --slate-700: #334155;
            --slate-600: #475569;
            --slate-400: #94A3B8;
            --slate-100: #F1F5F9;
            --slate-50: #F8FAFC;
            --border-color: #E2E8F0;
            --radius-xl: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.05);
            --shadow-md: 0 4px 20px -2px rgba(15, 23, 42, 0.08);
            --shadow-lg: 0 20px 25px -5px rgba(15, 23, 42, 0.1), 0 8px 10px -6px rgba(15, 23, 42, 0.1);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* RESET & BASE STYLES */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--slate-50);
            color: var(--slate-800);
            padding: 90px 20px 60px 20px;
            overflow-x: hidden;
            line-height: 1.5;
        }

        .main-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* NAVIGATION BAR */
        .premium-nav-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: var(--shadow-sm);
        }

        .nav-branding {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--rotary-blue);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-home-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--slate-700);
            font-weight: 600;
            font-size: 0.9rem;
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            background: #FFFFFF;
            transition: var(--transition-smooth);
        }

        .back-home-link:hover {
            border-color: var(--accent-pink);
            color: var(--accent-pink);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(215, 0, 96, 0.1);
        }

        /* HERO SECTION */
        .dashboard-hero {
            margin: 40px 0 32px 0;
            text-align: center;
            background: linear-gradient(135deg, #015491 0%, #0c3352 100%);
            padding: 48px 32px;
            border-radius: var(--radius-xl);
            color: #FFFFFF;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        .dashboard-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: rgba(215, 0, 96, 0.15);
            filter: blur(50px);
        }

        .dashboard-hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            position: relative;
            z-index: 1;
        }

        .dashboard-hero p {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            display: inline-block;
            border-bottom: 2px solid var(--accent-pink);
            padding-bottom: 6px;
        }

        /* SEARCH BAR */
        .search-filter-bar {
            margin-bottom: 32px;
            width: 100%;
        }

        .search-wrapper {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            border: 2px solid var(--border-color);
            background: #FFFFFF;
            border-radius: 50px;
            font-size: 1rem;
            color: var(--slate-900);
            outline: none;
            transition: var(--transition-smooth);
            box-shadow: var(--shadow-sm);
        }

        .search-input:focus {
            border-color: var(--rotary-blue);
            box-shadow: 0 0 0 4px rgba(1, 84, 145, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--slate-400);
            pointer-events: none;
            display: flex;
            align-items: center;
        }

        /* GRID SYSTEM (CARDS) */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
            margin-top: 16px;
        }

        .project-card {
            background: #FFFFFF;
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            padding: 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            transition: var(--transition-smooth);
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--rotary-blue);
            transition: var(--transition-smooth);
        }

        .project-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(1, 84, 145, 0.2);
        }

        .project-card:hover::before {
            background: var(--accent-pink);
            width: 6px;
        }

        .card-top {
            margin-bottom: 24px;
        }

        .row-date {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            color: var(--accent-pink);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(215, 0, 96, 0.06);
            padding: 6px 12px;
            border-radius: 20px;
            margin-bottom: 16px;
        }

        .row-title {
            font-weight: 800;
            color: var(--slate-900);
            font-size: 1.3rem;
            line-height: 1.4;
            margin-bottom: 16px;
        }

        .card-meta-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 12px;
            color: var(--slate-600);
            font-size: 0.95rem;
        }

        .card-meta-item svg {
            flex-shrink: 0;
            margin-top: 3px;
            color: var(--slate-400);
        }

        .meta-label {
            font-weight: 700;
            color: var(--slate-800);
        }

        /* INTERACTION TRIGGERS */
        .btn-action-trigger {
            background: var(--rotary-blue);
            color: #FFFFFF;
            border: none;
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            width: 100%;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(1, 84, 145, 0.2);
        }

        .btn-action-trigger:hover, .btn-action-trigger:active {
            background: var(--accent-pink);
            box-shadow: 0 4px 12px rgba(215, 0, 96, 0.3);
            transform: translateY(-1px);
        }

        /* DRAWER MODULE */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .drawer-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .side-drawer {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: #FFFFFF;
            box-shadow: var(--shadow-lg);
            z-index: 201;
            display: flex;
            flex-direction: column;
            transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .drawer-overlay.open .side-drawer {
            right: 0;
        }

        .drawer-header {
            padding: 28px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            background: var(--slate-50);
        }

        .drawer-close {
            position: absolute;
            top: 24px;
            right: 24px;
            background: #FFFFFF;
            border: 1px solid var(--border-color);
            font-size: 1.5rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--slate-600);
            transition: var(--transition-smooth);
            box-shadow: var(--shadow-sm);
        }

        .drawer-close:hover {
            background: var(--accent-pink);
            color: white;
            border-color: var(--accent-pink);
        }

        .drawer-header h3 {
            color: var(--slate-900);
            font-size: 1.4rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .drawer-header p {
            font-size: 0.85rem;
            color: var(--rotary-blue);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .drawer-body {
            padding: 28px;
            overflow-y: auto;
            flex-grow: 1;
        }

        /* FORM MANAGEMENT UTILITIES */
        .input-block {
            margin-bottom: 20px;
        }

        .input-block label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--slate-700);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            width: 100%;
            padding: 14px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            outline: none;
            transition: var(--transition-smooth);
            background: #FFFFFF;
            color: var(--slate-900);
        }

        .input-field:focus {
            border-color: var(--rotary-blue);
            box-shadow: 0 0 0 4px rgba(1, 84, 145, 0.12);
        }

        .input-field[readonly] {
            background: var(--slate-100);
            color: var(--slate-700);
            border-color: var(--border-color);
            font-weight: 600;
            cursor: not-allowed;
        }

        textarea.input-field {
            resize: vertical;
        }

        .btn-drawer-submit {
            background: linear-gradient(135deg, #015491 0%, #0274c7 100%);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition-smooth);
            margin-top: 12px;
            box-shadow: 0 4px 10px rgba(1, 84, 145, 0.2);
        }

        .btn-drawer-submit:hover {
            background: linear-gradient(135deg, #D70060 0%, #f71c7b 100%);
            box-shadow: 0 4px 14px rgba(215, 0, 96, 0.3);
            transform: translateY(-1px);
        }

        /* NO RESULTS INFRASTRUCTURE */
        .no-results {
            grid-column: 1 / -1;
            padding: 60px 20px;
            text-align: center;
            background: #FFFFFF;
            border-radius: var(--radius-xl);
            border: 2px dashed var(--border-color);
            color: var(--slate-600);
        }

        .no-results svg {
            color: var(--slate-400);
            margin-bottom: 12px;
        }

        .no-results p {
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* RESPONSIVE ARCHITECTURE */
        @media (max-width: 768px) {
            body { padding-top: 80px; padding-left: 16px; padding-right: 16px; }
            .premium-nav-bar { padding: 12px 20px; }
            .nav-branding { font-size: 0.95rem; }
            .dashboard-hero { padding: 36px 20px; margin: 20px 0 24px 0; }
            .dashboard-hero h1 { font-size: 1.85rem; }
            .cards-grid { grid-template-columns: 1fr; gap: 18px; }
            .side-drawer { max-width: 100%; }
        }
    </style>
</head>
<body>

<!-- STICKY NAVBAR -->
<nav class="premium-nav-bar">
    <div class="nav-branding">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path><path d="M2 12h20"></path></svg>
        ROTARACT GALKOT BAGLUNG
    </div>
    <a href="index.html" class="back-home-link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        Home
    </a>
</nav>

<div class="main-wrapper">
    <!-- MODERN HERO UNIT -->
    <header class="dashboard-hero">
        <h1>Upcoming Project Schedule</h1>
        <p>Strategic Matrix 2026-27</p>
    </header>

    <!-- SEARCH DESK -->
    <div class="search-filter-bar">
        <div class="search-wrapper">
            <span class="search-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </span>
            <input type="text" id="matrixSearchInput" class="search-input" placeholder="Search initiatives, focus groups, or deployment hubs..." oninput="filterMatrixGrid()" aria-label="Search initiative database">
        </div>
    </div>

    <!-- ENGINE OUTPUT (GRID VIEW CARDS) -->
    <main class="cards-grid" id="dynamic-rows-hook">
        <!-- Structural programmatic iterations route here -->
    </main>
</div>

<!-- SIDE DRAWER application DESK -->
<div class="drawer-overlay" id="formDrawerOverlay" onclick="handleOverlayClick(event)">
    <section class="side-drawer" id="sideDrawerMenu" role="dialog" aria-labelledby="drawer-title">
        <div class="drawer-header">
            <button class="drawer-close" onclick="closeDrawer()" aria-label="Close Application Form">&times;</button>
            <h3 id="drawer-title">Volunteer Desk</h3>
            <p>Deployment Application Form</p>
        </div>
        
        <div class="drawer-body">
            <form action="https://formspree.io/f/mrewrrer" method="POST" id="engagementForm">
                <div class="input-block">
                    <label for="target-project-field">Selected Activity</label>
                    <input type="text" id="target-project-field" name="project_name" class="input-field" readonly>
                </div>

                <div class="input-block">
                    <label for="applicant-name">Full Name</label>
                    <input type="text" id="applicant-name" name="name" class="input-field" placeholder="Enter your full identity name" required>
                </div>

                <div class="input-block">
                    <label for="applicant-email">Email Address</label>
                    <input type="email" id="applicant-email" name="email" class="input-field" placeholder="yourname@domain.com" required>
                </div>

                <div class="input-block">
                    <label for="applicant-phone">Mobile Network Number</label>
                    <input type="tel" id="applicant-phone" name="phone_number" class="input-field" placeholder="98XXXXXXXX" pattern="[9][7-8][0-9]{8}" title="Please match valid Nepalese mobile network parameters (10 digits starting with 97 or 98)." required>
                </div>

                <div class="input-block">
                    <label for="applicant-notes">Statement / Background Skills</label>
                    <textarea id="applicant-notes" name="message" class="input-field" rows="4" placeholder="Brief details regarding competencies or why you want to align with this initiative..."></textarea>
                </div>

                <button type="submit" class="btn-drawer-submit">Register Engagement</button>
            </form>
        </div>
    </section>
</div>

<script>
    // System Core Datastore Matrix[cite: 2]
    const matrixProjects = [
        {
            name: "Project Akshara: Rural E-Library Set up",
            date: "August 2026",
            targetAudience: "Public School Students",
            location: "Ward No. 3, Galkot, Baglung"
        },
        {
            name: "Maternal Health & Sanitation Awareness Campaign",
            date: "September 2026",
            targetAudience: "Local Women & Expecting Mothers",
            location: "Hatiya Health Post, Galkot"
        },
        {
            name: "RYLA 2026: Youth Leadership Conclave",
            date: "November 2026",
            targetAudience: "High-school & College Students",
            location: "Galkot City Hall Assembly Room"
        }
    ];

    // Card Generation Interface
    function paintMatrixGrid(dataset) {
        const targetHook = document.getElementById('dynamic-rows-hook');
        targetHook.innerHTML = '';

        if(dataset.length === 0) {
            targetHook.innerHTML = `
                <div class="no-results">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <p>No matching initiatives identified in this matrix cluster.</p>
                </div>`;
            return;
        }

        dataset.forEach(item => {
            const cardNode = document.createElement('article');
            cardNode.className = 'project-card';
            cardNode.innerHTML = `
                <div class="card-top">
                    <span class="row-date">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        ${item.date}
                    </span>
                    <h2 class="row-title">${item.name}</h2>
                    
                    <div class="card-meta-item">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        <div><span class="meta-label">Focus:</span> ${item.targetAudience}</div>
                    </div>
                    
                    <div class="card-meta-item">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        <div><span class="meta-label">Hub:</span> ${item.location}</div>
                    </div>
                </div>
                <div class="action-cell">
                    <button class="btn-action-trigger" onclick="openDrawer('${item.name.replace(/'/g, "\\'")}')">
                        Apply Now
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </button>
                </div>
            `;
            targetHook.appendChild(cardNode);
        });
    }

    // Dynamic Engine Live Filter Logic[cite: 2]
    function filterMatrixGrid() {
        const query = document.getElementById('matrixSearchInput').value.toLowerCase();
        const isolatedResults = matrixProjects.filter(project => {
            return project.name.toLowerCase().includes(query) || 
                   project.targetAudience.toLowerCase().includes(query) || 
                   project.location.toLowerCase().includes(query) ||
                   project.date.toLowerCase().includes(query);
        });
        paintMatrixGrid(isolatedResults);
    }

    // Layout Controls[cite: 2]
    const drawerOverlay = document.getElementById('formDrawerOverlay');
    const inputField = document.getElementById('target-project-field');

    function openDrawer(nameValue) {
        inputField.value = nameValue;
        drawerOverlay.classList.add('open');
        document.body.style.overflow = 'hidden'; 
    }

    function closeDrawer() {
        drawerOverlay.classList.remove('open');
        document.body.style.overflow = '';
    }

    function handleOverlayClick(event) {
        if(event.target.id === 'formDrawerOverlay') {
            closeDrawer();
        }
    }

    // Initialize DOM[cite: 2]
    document.addEventListener("DOMContentLoaded", () => {
        paintMatrixGrid(matrixProjects);
    });
</script>

</body>
</html>
