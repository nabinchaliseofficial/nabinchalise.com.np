<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotaract Club · Galkot Baglung · Membership</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: #f2f0eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .membership-card {
      max-width: 900px;
      width: 100%;
      background: white;
      border-radius: 32px;
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.25);
      overflow: hidden;
      transition: 0.25s ease;
      border: 1px solid rgba(200, 180, 150, 0.3);
    }

    .club-header {
      background: linear-gradient(145deg, #1a3c5e, #0f2a44);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      color: white;
      border-bottom: 4px solid #d4af37;
    }

    .club-header img {
      max-height: 70px;
      width: auto;
      object-fit: contain;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      padding: 4px 10px;
    }

    .club-header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-shadow: 0 2px 3px rgba(0,0,0,0.3);
      flex: 1;
    }

    .club-header h1 small {
      display: block;
      font-size: 0.75rem;
      font-weight: 300;
      opacity: 0.85;
      letter-spacing: 1px;
    }

    .club-footer {
      background: #1e2e3f;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      color: #ddd;
      border-top: 3px solid #b89b4b;
      font-size: 0.9rem;
      flex-wrap: wrap;
    }

    .club-footer img {
      max-height: 55px;
      width: auto;
      object-fit: contain;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      padding: 2px 8px;
    }

    .club-footer .footer-text {
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.8;
    }

    .club-footer .footer-text i {
      color: #d4af37;
    }

    .form-body {
      padding: 30px 32px 24px;
      background: #fcfaf7;
    }

    .form-row {
      display: flex;
      flex-wrap: wrap;
      gap: 18px 24px;
      margin-bottom: 20px;
    }

    .form-group {
      flex: 1 0 calc(50% - 24px);
      min-width: 200px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-group.full-width {
      flex: 1 0 100%;
    }

    .form-group label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #2c3e4e;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .form-group label i {
      color: #a67c3b;
      width: 18px;
      font-size: 0.9rem;
    }

    .form-group input, 
    .form-group select, 
    .form-group textarea {
      padding: 10px 14px;
      border: 1px solid #d6cec2;
      border-radius: 16px;
      font-size: 0.95rem;
      background: white;
      transition: 0.2s;
      outline: none;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    }

    .form-group input:focus, 
    .form-group select:focus, 
    .form-group textarea:focus {
      border-color: #a67c3b;
      box-shadow: 0 0 0 3px rgba(166, 124, 59, 0.2);
    }

    .form-group input[type="file"] {
      padding: 8px 6px;
      background: #f4f1eb;
      border-radius: 30px;
      border: 1px dashed #b89b4b;
    }

    .inline-hint {
      font-size: 0.75rem;
      color: #7a6b5a;
      margin-top: 2px;
      padding-left: 6px;
    }

    .btn-submit {
      background: #1a3c5e;
      border: none;
      padding: 14px 32px;
      border-radius: 60px;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      cursor: pointer;
      transition: 0.2s;
      width: 100%;
      box-shadow: 0 6px 14px rgba(26, 60, 94, 0.25);
      border: 1px solid #d4af37;
    }

    .btn-submit:hover:not(:disabled) {
      background: #0f2a44;
      transform: scale(1.01);
      box-shadow: 0 8px 20px rgba(26, 60, 94, 0.35);
    }

    .btn-submit:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .btn-submit i {
      font-size: 1.2rem;
    }

    .status-msg {
      margin-top: 20px;
      padding: 12px 18px;
      border-radius: 40px;
      background: #e8f0e8;
      color: #1f4f2b;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 12px;
      border-left: 6px solid #2b7a4b;
    }

    .status-msg.error {
      background: #fce9e9;
      color: #a12b2b;
      border-left-color: #b33;
    }

    .status-msg.show {
      display: flex;
    }

    .footnote {
      text-align: center;
      margin-top: 18px;
      font-size: 0.75rem;
      color: #7f7567;
      border-top: 1px solid #e0d8cc;
      padding-top: 16px;
    }

    @media (max-width: 640px) {
      .form-group {
        flex: 1 0 100%;
      }
      .club-header {
        flex-wrap: wrap;
        justify-content: center;
        text-align: center;
      }
      .club-footer {
        justify-content: center;
        text-align: center;
      }
      .club-header img {
        max-height: 50px;
      }
      .club-footer img {
        max-height: 40px;
      }
    }

    .loading-spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #d4af37;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .btn-submit.loading .loading-spinner {
      display: inline-block;
    }

    .btn-submit.loading .btn-text {
      display: none;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .status-msg.show {
      animation: fadeInUp 0.3s ease-out;
    }

    .club-header img.error,
    .club-footer img.error {
      display: none;
    }

    .club-header .img-fallback,
    .club-footer .img-fallback {
      display: none;
    }

    .club-header img.error + .img-fallback,
    .club-footer img.error + .img-fallback {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,215,0,0.1);
      padding: 4px 14px 4px 10px;
      border-radius: 40px;
      border: 1px solid #d4af3750;
      color: #f5e7c8;
      font-size: 0.8rem;
    }

    .club-header img.error + .img-fallback i,
    .club-footer img.error + .img-fallback i {
      font-size: 1.2rem;
      color: #d4af37;
    }
  </style>
</head>
<body>

<div class="membership-card">

  <!-- HEADER with clubheading.jpg -->
  <div class="club-header">
    <img 
      id="clubHeadingImg"
      src="clubheading.jpg" 
      alt="Club Heading" 
      onerror="this.classList.add('error'); document.getElementById('headingFallback').style.display='flex';"
    >
    <div class="img-fallback" id="headingFallback" style="display:none;">
      <i class="fas fa-image"></i> 
      <span>clubheading.jpg</span>
    </div>
    <h1>
      ROTARACT CLUB OF GALKOT BAGLUNG
      <small>Membership Registration</small>
    </h1>
  </div>

  <!-- FORM BODY -->
  <div class="form-body">
    <form id="membershipForm">
      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Full Name *</label>
          <input type="text" id="name" placeholder="e.g. Ram Kumar Sharma" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-map-pin"></i> Address *</label>
          <input type="text" id="address" placeholder="Galkot, Baglung" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-phone-alt"></i> Phone Number *</label>
          <input type="tel" id="phone" placeholder="98XXXXXXXX" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-tint"></i> Blood Group</label>
          <input type="text" id="bloodGroup" placeholder="A+ / B- / O+ ...">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-venus-mars"></i> Gender</label>
          <select id="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
            <option value="Prefer not to say">Prefer not to say</option>
          </select>
        </div>
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email *</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-calendar-alt"></i> Date of Birth (AD) *</label>
          <input type="date" id="dob" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-badge"></i> Designation (पद)</label>
          <input type="text" id="designation" placeholder="President / Secretary / ...">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-briefcase"></i> Profession (पेसामा आबद्ध)</label>
          <input type="text" id="profession" placeholder="Doctor, Engineer, Student ...">
        </div>
        <div class="form-group">
          <label><i class="fas fa-image"></i> PP size photo / profile image</label>
          <input type="file" id="profileImage" accept="image/*">
          <span class="inline-hint">optional, upload image (max 5MB)</span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group full-width">
          <label><i class="fas fa-star"></i> Mentor (Who encouraged you to join)</label>
          <input type="text" id="mentor" placeholder="Name of the person who inspired you">
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="loading-spinner"></span>
        <span class="btn-text"><i class="fas fa-pen-fancy"></i> Register & Save to Supabase</span>
      </button>
    </form>

    <!-- Status Message -->
    <div id="statusMessage" class="status-msg">
      <i class="fas fa-check-circle"></i> 
      <span id="statusText">Member registered successfully!</span>
    </div>

    <div class="footnote">
      <i class="fas fa-database" style="margin-right: 6px;"></i> Data stored securely in Supabase
    </div>
  </div>

  <!-- FOOTER with footer.jpg -->
  <div class="club-footer">
    <div class="footer-text">
      <i class="fas fa-rotate-left"></i> 
      <span>Rotaract · Service Above Self</span>
    </div>
    <img 
      id="footerImg"
      src="footer.jpg" 
      alt="Footer Image" 
      onerror="this.classList.add('error'); document.getElementById('footerFallback').style.display='flex';"
    >
    <div class="img-fallback" id="footerFallback" style="display:none;">
      <i class="fas fa-image"></i> 
      <span>footer.jpg</span>
    </div>
  </div>
</div>

<script>
  (function() {
    // ============================================================
    // ✅ YOUR SUPABASE CREDENTIALS
    // ============================================================
    const SUPABASE_URL = "https://kbyfvqkfcxqgjjtfvvxf.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtieWZ2cWtmY3hxZ2pqdGZ2dnhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2NDM1MzMsImV4cCI6MjA5NjIxOTUzM30.TQQZJJi27pNcXMlD0m8MsrAbqjLHGgVnw-L3bNDR2bU";
    // ============================================================

    // NEW TABLE NAME - using UUID primary key (no sequence issues)
    const TABLE_NAME = 'member_registrations';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    const form = document.getElementById('membershipForm');
    const statusMsg = document.getElementById('statusMessage');
    const statusText = document.getElementById('statusText');
    const submitBtn = document.getElementById('submitBtn');

    function setStatus(message, isError = false) {
      statusText.innerText = message;
      statusMsg.className = 'status-msg show';
      if (isError) {
        statusMsg.classList.add('error');
      } else {
        statusMsg.classList.remove('error');
      }
    }

    function hideStatus() {
      statusMsg.className = 'status-msg';
    }

    function setLoading(isLoading) {
      if (isLoading) {
        submitBtn.classList.add('loading');
        submitBtn.disabled = true;
      } else {
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        if (!file) resolve(null);
        if (file.size > 5 * 1024 * 1024) {
          reject(new Error('File size exceeds 5MB limit'));
          return;
        }
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = (error) => reject(error);
        reader.readAsDataURL(file);
      });
    }

    // Test connection on page load
    async function testConnection() {
      try {
        const { data, error } = await supabase.from(TABLE_NAME).select('count').limit(1);
        if (error) {
          console.warn('⚠️ Table connection test:', error.message);
        } else {
          console.log('✅ Connected to table:', TABLE_NAME);
        }
      } catch (err) {
        console.warn('⚠️ Connection test failed:', err.message);
      }
    }

    // Run connection test
    testConnection();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideStatus();
      setLoading(true);

      try {
        // Gather fields
        const name = document.getElementById('name').value.trim();
        const address = document.getElementById('address').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const bloodGroup = document.getElementById('bloodGroup').value.trim();
        const gender = document.getElementById('gender').value;
        const email = document.getElementById('email').value.trim();
        const dob = document.getElementById('dob').value;
        const designation = document.getElementById('designation').value.trim();
        const profession = document.getElementById('profession').value.trim();
        const mentor = document.getElementById('mentor').value.trim();
        const fileInput = document.getElementById('profileImage');
        const profileFile = fileInput.files[0];

        // Validation
        if (!name || !address || !phone || !email || !dob) {
          setStatus('Please fill all required fields (Name, Address, Phone, Email, DOB).', true);
          setLoading(false);
          return;
        }

        // Email format validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          setStatus('Please enter a valid email address.', true);
          setLoading(false);
          return;
        }

        // Phone validation (10 digits)
        const phoneRegex = /^[0-9]{10}$/;
        if (!phoneRegex.test(phone)) {
          setStatus('Please enter a valid 10-digit phone number.', true);
          setLoading(false);
          return;
        }

        // Process profile image
        let profileImageBase64 = null;
        if (profileFile) {
          try {
            profileImageBase64 = await fileToBase64(profileFile);
          } catch (err) {
            setStatus('Error reading profile image: ' + err.message, true);
            setLoading(false);
            return;
          }
        }

        // Build record - id will be auto-generated as UUID
        const record = {
          timestamp: new Date().toISOString(),
          name: name,
          address: address,
          phone_number: phone,
          blood_group: bloodGroup || null,
          gender: gender,
          email: email,
          date_of_birth: dob,
          designation: designation || null,
          profession: profession || null,
          profile_image: profileImageBase64,
          mentor: mentor || null
        };

        console.log('📤 Sending data to Supabase:', record);

        // Insert into Supabase
        const { data, error } = await supabase
          .from(TABLE_NAME)
          .insert([record])
          .select();

        if (error) {
          console.error('❌ Supabase insert error:', error);
          setStatus('❌ Error saving to Supabase: ' + error.message, true);
          setLoading(false);
          return;
        }

        console.log('✅ Member registered successfully:', data);
        setStatus('🎉 Registration successful! Welcome to Rotaract Club of Galkot Baglung!', false);
        form.reset();
        fileInput.value = '';
        setLoading(false);

      } catch (err) {
        console.error('❌ Unexpected error:', err);
        setStatus('⚠️ Unexpected error: ' + err.message, true);
        setLoading(false);
      }
    });

    console.log('📋 Rotaract Club Membership Form ready.');
    console.log(`📊 Using table: "${TABLE_NAME}" (UUID primary key)`);
    console.log('🔗 Connected to Supabase project:', SUPABASE_URL);
    console.log('✅ Ready to save member registrations!');
  })();
</script>

</body>
</html>
