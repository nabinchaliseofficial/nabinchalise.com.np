<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotaract Project Report Form</title>
    
    <!-- begin::Global Mandatory Vendors & Theme Styles -->
    <link href="https://my.rotaract3292.org/assets/vendors/general/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <link href="https://my.rotaract3292.org/assets/vendors/general/select2/dist/css/select2.min.css" rel="stylesheet" type="text/css" />
    <link href="https://my.rotaract3292.org/assets/vendors/general/bootstrap-select/dist/css/bootstrap-select.css" rel="stylesheet" type="text/css" />
    <link href="https://my.rotaract3292.org/assets/vendors/general/summernote/dist/summernote.css" rel="stylesheet" type="text/css" />
    <link href="https://my.rotaract3292.org/assets/css/demo1/style.bundle.css" rel="stylesheet" type="text/css" />
    <!-- end::Global Mandatory Vendors & Theme Styles -->

    <style>
        body {
            background-color: #f2f3f8;
            padding: 20px;
        }
        .kt-portlet {
            background: #ffffff;
            border-radius: 4px;
            margin-bottom: 20px;
            box-shadow: 0px 0px 13px 0px rgba(82, 63, 105, 0.05);
        }
        .kt-portlet__head {
            border-bottom: 1px solid #ebedf2;
            padding: 0 25px;
            height: 60px;
            display: flex;
            align-items: center;
        }
        .kt-portlet__head-title {
            font-size: 1.2rem;
            font-weight: 500;
            color: #48465b;
        }
        .conditional-section {
            display: none;
            background: #f7f8fa;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 15px;
            border-left: 4px solid #5d78ff;
        }
        .text-danger {
            color: #fd397a !important;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-12">
            <!--begin::Portlet-->
            <div class="kt-portlet">
                <div class="kt-portlet__head">
                    <h3 class="kt-portlet__head-title">Create Project Report</h3>
                </div>
                
                <!--begin::Form-->
                <form class="kt-form kt-form--label-right" id="project-report-form" method="POST" action="#">
                    <div class="kt-portlet__body">
                        <div class="kt-section kt-section--first">
                            
                            <!-- Project Title & Category -->
                            <div class="form-group row">
                                <div class="col-lg-6">
                                    <label><span class="text-danger">*</span> Project Title:</label>
                                    <input type="text" class="form-control" name="title" placeholder="Enter project title" required>
                                </div>
                                <div class="col-lg-6">
                                    <label><span class="text-danger">*</span> Project Category:</label>
                                    <select class="form-control select2" id="project_category_id" name="project_category_id" required>
                                        <option value="">Select Category</option>
                                        <option value="1" data-has-count="1" data-count-title="Number of Trees Planted">Environment (Tree Plantation)</option>
                                        <option value="2" data-has-count="1" data-count-title="Number of Blood Pints Collected">Health (Blood Donation)</option>
                                        <option value="3" data-has-count="0">Professional Development</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Dynamic Counter Field (Shows based on category) -->
                            <div class="form-group row" id="count-div" style="display: none;">
                                <div class="col-lg-6">
                                    <label id="count-label">Count:</label>
                                    <input type="number" class="form-control" name="category_count" id="category_count">
                                </div>
                            </div>

                            <!-- Start Date & End Date Checkbox -->
                            <div class="form-group row">
                                <div class="col-lg-6">
                                    <label><span class="text-danger">*</span> Start Date:</label>
                                    <input type="date" class="form-control" name="start_date" required>
                                </div>
                                <div class="col-lg-6" style="margin-top: 35px;">
                                    <label class="kt-checkbox kt-checkbox--tick kt-checkbox--success">
                                        <input type="checkbox" id="end-date-check"> Project lasted more than 1 day?
                                        <span></span>
                                    </label>
                                </div>
                            </div>

                            <!-- Hidden End Date Field -->
                            <div class="form-group row" id="end-date-div">
                                <div class="col-lg-6">
                                    <label><span class="text-danger">*</span> End Date:</label>
                                    <input type="date" class="form-control" name="end_date" id="end_date">
                                </div>
                            </div>

                            <!-- Project Type Dropdown -->
                            <div class="form-group row">
                                <div class="col-lg-6">
                                    <label><span class="text-danger">*</span> Project Type:</label>
                                    <select class="form-control select2" id="project_type" name="project_type" required>
                                        <option value="">Select Project Type</option>
                                        <option value="1">Hosted</option>
                                        <option value="0">Participated</option>
                                        <option value="2">Collaborated</option>
                                        <option value="3">Volunteered</option>
                                    </select>
                                </div>
                            </div>

                            <!-- CONDITIONAL SECTIONS -->
                            <!-- 1. Hosted Section -->
                            <div id="hosted" class="conditional-section">
                                <h5>Hosted Project Details</h5>
                                <div class="form-group row">
                                    <div class="col-lg-6">
                                        <label><span class="text-danger">*</span> Venue / Location:</label>
                                        <input type="text" class="form-control sel-hosted" name="venue" placeholder="Enter venue">
                                    </div>
                                </div>
                            </div>

                            <!-- 2. Participated Section -->
                            <div id="participated" class="conditional-section">
                                <h5>Participated Project Details</h5>
                                <div class="form-group row">
                                    <div class="col-lg-6">
                                        <label><span class="text-danger">*</span> Host Club/Organization:</label>
                                        <input type="text" class="form-control sel-participated" name="host_organization" placeholder="Enter host name">
                                    </div>
                                </div>
                            </div>

                            <!-- 3. Collaborated Section -->
                            <div id="collaborated" class="conditional-section">
                                <h5>Collaborated Project Details</h5>
                                <div class="form-group row">
                                    <div class="col-lg-6">
                                        <label><span class="text-danger">*</span> Collaborated With:</label>
                                        <select class="form-control select2 collaborated_with" name="collaborated_with[]" multiple="multiple" style="width: 100%;">
                                            <option value="1">Other International Organization</option>
                                            <option value="2">International Rotary/Rotaract Club</option>
                                            <option value="3">Local Club</option>
                                        </select>
                                    </div>
                                    <div class="col-lg-6" id="collab-ri" style="display: none;">
                                        <label><span class="text-danger">*</span> RI District:</label>
                                        <input type="text" class="form-control input-collab" id="ri_input" name="ri_district" placeholder="e.g. 3292">
                                    </div>
                                </div>
                                <div class="form-group row" id="collab-country" style="display: none;">
                                    <div class="col-lg-6">
                                        <label><span class="text-danger">*</span> Countries involved:</label>
                                        <select class="form-control select2 input-collab" id="countries-select" name="countries[]" multiple="multiple" style="width: 100%;">
                                            <option value="NP">Nepal</option>
                                            <option value="IN">India</option>
                                            <option value="US">United States</option>
                                        </select>
                                    </div>
                                </div>
                            </div>

                            <!-- 4. Volunteered Section -->
                            <div id="volunteered" class="conditional-section">
                                <h5>Volunteered Project Details</h5>
                                <div class="form-group row">
                                    <div class="col-lg-12">
                                        <label><span class="text-danger">*</span> Volunteering Nature / Core Duties:</label>
                                        <input type="text" class="form-control input-volun" name="volunteering_details" placeholder="Describe the volunteering work">
                                    </div>
                                </div>
                            </div>

                            <!-- Summernote Rich Text Editors -->
                            <div class="form-group row">
                                <div class="col-lg-12">
                                    <label>Project Objectives:</label>
                                    <div class="summernote" id="project_objectives_div"></div>
                                    <input type="hidden" name="objectives" id="hidden_project_objectives">
                                </div>
                            </div>

                            <div class="form-group row">
                                <div class="col-lg-12">
                                    <label>Project Details / Description:</label>
                                    <div class="summernote" id="project_details_div"></div>
                                    <input type="hidden" name="details" id="hidden_project_details">
                                </div>
                            </div>

                            <!-- Attendance / Members Section -->
                            <div class="form-group row">
                                <div class="col-lg-12">
                                    <label style="font-weight: bold; font-size: 1.1rem;">Select Members Present:</label>
                                    <div class="kt-checkbox-list row" style="padding-left: 15px;">
                                        <div class="col-12 mb-3">
                                            <label class="kt-checkbox kt-checkbox--bold kt-checkbox--brand">
                                                <input type="checkbox" onchange="checkAll(this)"> <strong>Select / Unselect All Members</strong>
                                                <span></span>
                                            </label>
                                        </div>
                                        <!-- Sample Members -->
                                        <div class="col-md-4">
                                            <label class="kt-checkbox kt-checkbox--solid kt-checkbox--success">
                                                <input type="checkbox" class="memeber-check" name="members[]" value="1"> Ram Bahadur
                                                <span></span>
                                            </label>
                                        </div>
                                        <div class="col-md-4">
                                            <label class="kt-checkbox kt-checkbox--solid kt-checkbox--success">
                                                <input type="checkbox" class="memeber-check" name="members[]" value="2"> Sita Kumari
                                                <span></span>
                                            </label>
                                        </div>
                                        <div class="col-md-4">
                                            <label class="kt-checkbox kt-checkbox--solid kt-checkbox--success">
                                                <input type="checkbox" class="memeber-check" name="members[]" value="3"> Hari Prasad
                                                <span></span>
                                            </label>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    <!-- Footer Actions -->
                    <div class="kt-portlet__foot">
                        <div class="kt-form__actions" style="padding: 20px 0;">
                            <button type="submit" class="btn btn-success">Submit Report</button>
                            <button type="reset" class="btn btn-secondary">Cancel</button>
                        </div>
                    </div>
                </form>
                <!--end::Form-->
            </div>
            <!--end::Portlet-->
        </div>
    </div>
</div>

<!-- begin::Global Mandatory Vendors & Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js" type="text/javascript"></script>
<script src="https://my.rotaract3292.org/assets/vendors/general/bootstrap/dist/js/bootstrap.bundle.min.js" type="text/javascript"></script>
<script src="https://my.rotaract3292.org/assets/vendors/general/select2/dist/js/select2.full.js" type="text/javascript"></script>
<script src="https://my.rotaract3292.org/assets/vendors/general/summernote/dist/summernote.js" type="text/javascript"></script>
<!-- end::Global Mandatory Vendors & Scripts -->

<!-- begin::Custom Logic Javascript -->
<script type="text/javascript">
$(document).ready(function() {
    // 1. Select2 Initialization
    $('.select2').select2({
        placeholder: "Select an option",
        allowClear: true
    });

    // 2. Summernote Text Editor Setup
    $('.summernote').summernote({
        height: 180,
        tabsize: 2,
        dialogsInBody: true
    });

    // 3. Conditional Visibility Framework for Project Type
    $('#project_type').change(function() {
        var value = $(this).val();
        
        // Hide all templates initially
        $('#hosted, #participated, #collaborated, #volunteered').hide();
        
        // Clean validation markers
        $('.sel-hosted, .sel-participated, .input-collab, .input-volun').removeAttr('required');

        if (value == "1") { // Hosted
            $('#hosted').show();
            $('.sel-hosted').attr('required', 'required');
        } else if (value == "0") { // Participated
            $('#participated').show();
            $('.sel-participated').attr('required', 'required');
        } else if (value == "2") { // Collaborated
            $('#collaborated').show();
            $('.input-collab').attr('required', 'required');
        } else if (value == "3") { // Volunteered
            $('#volunteered').show();
            $('.input-volun').attr('required', 'required');
        }
    });

    // 4. International Collaboration logic
    $('.collaborated_with').change(function() {
        var selectedValues = $(this).val() || [];
        
        // Check for International Rotary
        if (selectedValues.includes("2")) {
            $('#collab-ri').show();
            $('#ri_input').attr('required', 'required');
        } else {
            $('#collab-ri').hide();
            $('#ri_input').removeAttr('required');
        }

        // Check for Countries requirement
        if (selectedValues.includes("1") || selectedValues.includes("2")) {
            $('#collab-country').show();
            $('#countries-select').attr('required', 'required');
        } else {
            $('#collab-country').hide();
            $('#countries-select').removeAttr('required');
        }
    });

    // 5. Dynamic End Date Fields
    $('#end-date-div').hide();
    $('#end-date-check').change(function() {
        if(this.checked) {
            $('#end-date-div').fadeIn();
            $('#end_date').attr('required', 'required');
        } else {
            $('#end-date-div').fadeOut();
            $('#end_date').removeAttr('required').val('');
        }
    });

    // 6. Dynamic Category Specific Quantities (e.g. Blood pints, Trees)
    $('#project_category_id').change(function() {
        var selected = $(this).find('option:selected');
        var hasCount = selected.data('has-count');
        var countTitle = selected.data('count-title');

        if (hasCount == 1) {
            $('#count-div').show();
            $('#count-div').find('label').html('<span class="text-danger">*</span> ' + countTitle + ':');
            $('#category_count').attr('required', 'required').attr('placeholder', 'Enter ' + countTitle.toLowerCase());
        } else {
            $('#count-div').hide();
            $('#category_count').removeAttr('required').val('');
        }
    });

    // 7. Binding Summernote Rich Data to Hidden Inputs before Form Submit
    $('#project-report-form').submit(function(e) {
        var objectivesHtml = $('#project_objectives_div').summernote('code');
        var detailsHtml = $('#project_details_div').summernote('code');
        
        $('#hidden_project_objectives').val(objectivesHtml);
        $('#hidden_project_details').val(detailsHtml);
        
        // Form post behavior setup ready
        alert('Form submission captured successfully! Check hidden inputs for text editor data.');
        return true; 
    });
});

// 8. Global Attendance Check/Uncheck Utility
function checkAll(ele) {
    var checkboxes = document.getElementsByClassName('memeber-check');
    for (var i = 0; i < checkboxes.length; i++) {
        if (checkboxes[i].type == 'checkbox') {
            checkboxes[i].checked = ele.checked;
        }
    }
}
</script>
<!-- end::Custom Logic Javascript -->

</body>
</html>
