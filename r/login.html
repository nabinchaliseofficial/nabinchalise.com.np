<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <title>Supabase SSR Browser Auth</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f3f4f6; margin: 0; }
    .auth-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 380px; }
    h2 { margin: 0 0 1.5rem 0; font-size: 1.5rem; text-align: center; color: #111827; }
    label { font-size: 0.875rem; font-weight: 500; color: #374151; display: block; margin-bottom: 0.35rem; }
    input { width: 100%; padding: 0.75rem; margin-bottom: 1.25rem; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
    input:focus { outline: 2px solid #2563eb; border-color: transparent; }
    button { width: 100%; padding: 0.75rem; border: none; border-radius: 6px; font-size: 1rem; font-weight: 500; cursor: pointer; margin-bottom: 0.75rem; transition: background 0.2s; }
    .btn-primary { background: #2563eb; color: white; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: transparent; border: 1px solid #d1d5db; color: #4b5563; }
    .btn-secondary:hover { background: #f9fafb; }
    .message { display: none; padding: 0.75rem; border-radius: 6px; font-size: 0.875rem; text-align: center; margin-bottom: 1rem; }
    .error { display: block; background: #fee2e2; color: #991b1b; }
    .success { display: block; background: #d1fae5; color: #065f46; }
  </style>
</head>
<body>

<div class="auth-card">
  <h2>Account Sign In</h2>
  <div id="msg" class="message"></div>
  
  <form id="auth-form">
    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="name@example.com" required>

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" required>

    <button type="button" id="btn-login" class="btn-primary">Log In</button>
    <button type="button" id="btn-signup" class="btn-secondary">Create Account</button>
  </form>
</div>

<script type="module">
  // Using esm.sh CDN to load the specific tools you installed via npm
  import { createBrowserClient } from 'https://esm.sh/@supabase/ssr';

  // Your exact provided project credentials
  const SUPABASE_URL = "https://kbyfvqkfcxqgjjtfvvxf.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_-bOiDndDXdz_FgXq1MFkag_ioCcg8nv";

  // Initialize the browser client exactly like the SSR documentation recommends
  const supabase = createBrowserClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // DOM Elements
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('btn-login');
  const signupBtn = document.getElementById('btn-signup');
  const msgBox = document.getElementById('msg');

  function updateStatus(text, statusType) {
    msgBox.textContent = text;
    msgBox.className = `message ${statusType}`;
  }

  // Handle Login Action
  loginBtn.addEventListener('click', async () => {
    const email = emailInput.value;
    const password = passwordInput.value;
    if (!email || !password) return updateStatus("Please enter both fields.", "error");

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      updateStatus(error.message, "error");
    } else {
      updateStatus("Success! You are now logged in.", "success");
      console.log("Logged in user details:", data.user);
    }
  });

  // Handle Sign Up Action
  signupBtn.addEventListener('click', async () => {
    const email = emailInput.value;
    const password = passwordInput.value;
    if (!email || !password) return updateStatus("Please enter both fields.", "error");

    const { data, error } = await supabase.auth.signUp({ email, password });

    if (error) {
      updateStatus(error.message, "error");
    } else {
      updateStatus("Account created! Check your email inbox to verify.", "success");
    }
  });
</script>

</body>
</html>
