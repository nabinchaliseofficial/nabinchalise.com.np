<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Rotaract Members</title>
    <!-- Supabase CDN Link -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f6f9; color: #333; padding: 20px; }
        .dashboard-container { max-width: 1300px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header-section { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f0f2f5; padding-bottom: 20px; margin-bottom: 20px; }
        .header-section h2 { color: #1f2937; font-size: 24px; }
        .nav-links { display: flex; gap: 10px; }
        .btn { border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; text-decoration: none; font-size: 14px; }
        .logout-btn { background: #dc2626; color: white; }
        .logout-btn:hover { background: #b91c1c; }
        .bday-btn { background: #059669; color: white; display: flex; align-items: center; }
        .bday-btn:hover { background: #047857; }
        .search-box { width: 100%; max-width: 400px; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 15px; outline: none; margin-bottom: 20px; }
        .table-responsive { overflow-x: auto; border-radius: 8px; border: 1px solid #e5e7eb; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
        th { background: #f8fafc; color: #475569; padding: 14px; font-weight: 600; border-bottom: 2px solid #e5e7eb; }
        td { padding: 14px; border-bottom: 1px solid #e5e7eb; color: #334155; }
        tr:hover { background: #f8fafc; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .badge-blood { background: #fee2e2; color: #991b1b; }
        .badge-role { background: #e0f2fe; color: #0369a1; }
        .edit-btn { background: #eab308; color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header-section">
            <h2>Rotaract Club Members Dashboard</h2>
            <div class="nav-links">
                <a href="birthdays.html" class="btn bday-btn">🎂 Birthdays View</a>
                <button class="btn logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>

        <input type="text" id="searchInput" class="search-box" placeholder="🔎 Name, Phone, Blood Group वा Role खोज्नुहोस्...">

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Designation</th>
                        <th>Phone</th>
                        <th>Blood Group</th>
                        <th>DOB (M/D/Y)</th>
                        <th>Profession</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="membersTableBody">
                    <tr><td colspan="8" style="text-align:center;">डाटा लोड हुँदैछ...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // तपाईँको Supabase क्रेडिन्सियलहरू यहाँ राखिएको छ
        const SUPABASE_URL = "https://kbyfvqkfcxqgjjtfvvxf.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_-bOiDndDXdz_FgXq1MFkag_ioCcg8nv";
        
        const supabase = @supabase/supabase-js.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allMembers = [];
        const tableBody = document.getElementById('membersTableBody');
        const searchInput = document.getElementById('searchInput');

        // Supabase बाट डाटा तान्ने फङ्सन
        async function fetchMembers() {
            const { data, error } = await supabase
                .from('members')
                .select('*')
                .order('id', { ascending: true });

            if (error) {
                console.error("Error fetching data:", error);
                tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center; color:red;">डाटा लोड गर्न सकिएन। टेवल वा पर्मिसन चेक गर्नुहोस्।</td></tr>`;
            } else {
                allMembers = data || [];
                renderTable(allMembers);
            }
        }

        function renderTable(dataList) {
            tableBody.innerHTML = '';
            if(dataList.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="8" style="text-align:center;">कुनै डाटा भेटिएन।</td></tr>`;
                return;
            }

            dataList.forEach(member => {
                tableBody.innerHTML += `<tr>
                    <td>${member.id}</td>
                    <td><strong>${member.name}</strong></td>
                    <td><span class="badge badge-role">${member.designation || '-'}</span></td>
                    <td>${member.phone || '-'}</td>
                    <td><span class="badge badge-blood">${member.blood_group || '-'}</span></td>
                    <td><strong>${member.dob || '-'}</strong></td>
                    <td>${member.profession || '-'}</td>
                    <td><button class="edit-btn" onclick="editMember(${member.id})">✏️ Edit</button></td>
                </tr>`;
            });
        }

        // Live Edit र Supabase Database मा Save गर्ने फङ्सन
        async function editMember(id) {
            const current = allMembers.find(m => m.id === id);
            if (!current) return;

            const newName = prompt(`सदस्यको नयाँ नाम:`, current.name);
            if (newName === null) return; 

            const newPhone = prompt(`नयाँ फोन नम्बर:`, current.phone);
            const newDob = prompt(`नयाँ जन्म मिति (Format: M/D/Y - जस्तै 8/26/1995):`, current.dob);

            const { error } = await supabase
                .from('members')
                .update({ 
                    name: newName || current.name, 
                    phone: newPhone || current.phone, 
                    dob: newDob || current.dob 
                })
                .eq('id', id);

            if (error) {
                alert("डाटा अपडेट गर्न असफल भयो: " + error.message);
            } else {
                alert("डाटा Supabase मा सफलतापूर्वक सेभ भयो!");
                fetchMembers(); 
            }
        }

        // Search Filter
        searchInput.addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = allMembers.filter(member => {
                return (member.name && member.name.toLowerCase().includes(keyword)) || 
                       (member.phone && member.phone.includes(keyword)) || 
                       (member.blood_group && member.blood_group.toLowerCase().includes(keyword)) ||
                       (member.designation && member.designation.toLowerCase().includes(keyword));
            });
            renderTable(filtered);
        });

        function logout() { window.location.href = "login.html"; }

        // Initial Load
        fetchMembers();
    </script>
</body>
</html>
