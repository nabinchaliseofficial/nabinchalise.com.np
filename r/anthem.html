<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anthem Tab Player</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #f9a825; /* Rotaract/Rotary Gold */
            --accent-blue: #0053a0;   /* Rotary Blue */
            --rotaract-pink: #D70060; /* Rotaract Pink */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .home-btn-container {
            width: 100%;
            max-width: 950px;
            margin-bottom: 25px;
            display: flex;
            justify-content: flex-start;
        }

        .custom-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #015491; /* Rotary Blue */
            background: #FFFFFF;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(1, 84, 145, 0.1);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .custom-home-btn .home-icon {
            width: 1.2rem;
            height: 1.2rem;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .custom-home-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(213, 0, 96, 0.08), transparent);
            transition: all 0.5s ease;
        }

        .custom-home-btn:hover {
            color: #D70060 !important; /* Rotaract Pink */
            border-color: rgba(213, 0, 96, 0.2) !important;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(213, 0, 96, 0.1) !important;
        }

        .custom-home-btn:hover .home-icon {
            transform: scale(1.15) rotate(-5deg);
        }

        .custom-home-btn:hover::before {
            left: 100%;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .tab-header {
            background: #111827;
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        .tab-header h1 {
            font-size: 1.6rem;
            letter-spacing: 1px;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        .player-layout {
            display: grid;
            grid-template-columns: 1fr;
        }

        @media (min-width: 768px) {
            .player-layout {
                grid-template-columns: 1.3fr 1.7fr;
            }
        }

        .track-list {
            padding: 20px;
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 14px;
            background: #131c2e;
        }

        .track-item {
            background: #0f172a;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .track-item:hover {
            border-color: var(--accent-color);
            background: #1e293b;
        }

        .track-item.active {
            border-color: var(--accent-color);
            background: rgba(249, 168, 37, 0.1);
        }

        .track-info {
            flex-grow: 1;
            margin-right: 15px;
        }

        .track-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 4px;
            color: var(--text-main);
        }

        .track-filename {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: monospace;
        }

        .btn-play {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent-color);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .btn-play:hover {
            transform: scale(1.08);
            background: #fbc02d;
        }

        .btn-play svg {
            width: 18px;
            height: 18px;
            fill: #0f172a;
        }

        .wave-container {
            display: none;
            align-items: flex-end;
            gap: 3px;
            width: 22px;
            height: 16px;
        }

        .track-item.active.playing .wave-container {
            display: flex;
        }
        
        .track-item.active.playing .btn-play svg {
            display: none;
        }

        .wave-bar {
            width: 4px;
            height: 100%;
            background: #0f172a;
            border-radius: 1px;
            animation: bounce 0.6s ease-in-out infinite alternate;
        }

        .wave-bar:nth-child(1) { animation-delay: 0.1s; }
        .wave-bar:nth-child(2) { animation-delay: 0.3s; }
        .wave-bar:nth-child(3) { animation-delay: 0.5s; }

        @keyframes bounce {
            0% { height: 25%; }
            100% { height: 100%; }
        }

        .lyrics-panel {
            padding: 30px 20px;
            background: #0b0f19;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 420px;
        }

        .lyrics-container {
            max-height: 390px;
            overflow-y: auto;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            gap: 22px;
            scroll-behavior: smooth;
        }

        .lyrics-container::-webkit-scrollbar {
            width: 6px;
        }
        .lyrics-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .lyric-line {
            font-size: 1.2rem;
            line-height: 1.8;
            color: var(--text-muted);
            text-align: center;
            transition: all 0.3s ease;
            opacity: 0.25;
        }

        .lyric-line.active {
            color: var(--accent-color);
            opacity: 1;
            font-size: 1.45rem;
            font-weight: 600;
            transform: scale(1.02);
            text-shadow: 0 0 12px rgba(249, 168, 37, 0.3);
        }
        
        .no-track-placeholder {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="home-btn-container">
    <a href="index.html" class="custom-home-btn">
        <svg class="home-icon" viewBox="0 0 24 24">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span>HOME</span>
    </a>
</div>

<div class="container">
    <div class="tab-header">
        <h1>National Anthem/Rotary-Rotaract Song</h1>
    </div>

    <div class="player-layout">
        <div class="track-list" id="playlist">
            <!-- Track 1 -->
            <div class="track-item" data-index="0">
                <div class="track-info">
                    <div class="track-title">National Anthem</div>
                    <div class="track-filename">national_anthem.mp3</div>
                </div>
                <button class="btn-play" aria-label="Play Track">
                    <svg viewBox="0 0 24 24" class="icon-control"><path d="M8 5v14l11-7z"/></svg>
                    <div class="wave-container">
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                    </div>
                </button>
            </div>

            <!-- Track 2 -->
            <div class="track-item" data-index="1">
                <div class="track-info">
                    <div class="track-title">Rotaract Song</div>
                    <div class="track-filename">rotaract_song.mp3</div>
                </div>
                <button class="btn-play" aria-label="Play Track">
                    <svg viewBox="0 0 24 24" class="icon-control"><path d="M8 5v14l11-7z"/></svg>
                    <div class="wave-container">
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                    </div>
                </button>
            </div>

            <!-- Track 3 -->
            <div class="track-item" data-index="2">
                <div class="track-info">
                    <div class="track-title">Rotary Song</div>
                    <div class="track-filename">rotary_song.mp3</div>
                </div>
                <button class="btn-play" aria-label="Play Track">
                    <svg viewBox="0 0 24 24" class="icon-control"><path d="M8 5v14l11-7z"/></svg>
                    <div class="wave-container">
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                    </div>
                </button>
            </div>

            <!-- Track 4 -->
            <div class="track-item" data-index="3">
                <div class="track-info">
                    <div class="track-title">Club Song</div>
                    <div class="track-filename">club_song.mp3</div>
                </div>
                <button class="btn-play" aria-label="Play Track">
                    <svg viewBox="0 0 24 24" class="icon-control"><path d="M8 5v14l11-7z"/></svg>
                    <div class="wave-container">
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                        <div class="wave-bar"></div>
                    </div>
                </button>
            </div>
        </div>

        <div class="lyrics-panel">
            <div class="lyrics-container" id="lyricsContainer">
                <p class="no-track-placeholder">Select an item to stream audio & display text lines</p>
            </div>
        </div>
    </div>
</div>

<audio id="mainAudio"></audio>

<script>
    const trackData = [
        {
            title: "National Anthem",
            file: "national_anthem.mp3",
            lyrics: [
                { time: 0, text: "🎵 (राष्ट्रिय धुन सुरु...) 🎵" },
                { time: 15, text: "सयौं थूंगा फूलका हामी, एउटै माला नेपाली\nसार्वभौम भई फैलिएका, मेची–महाकाली।" },
                { time: 25, text: "सयौं थूंगा फूलका हामी, एउटै माला नेपाली\nसार्वभौम भई फैलिएका, मेची–महाकाली।" },
                { time: 36, text: "प्रकृतिका कोटी–कोटी सम्पदाको आँचल\nवीरहरूका रगतले, स्वतन्त्र र अटल।" },
                { time: 46, text: "ज्ञानभूमि, शान्तिभूमि, तराई, पहाड, हिमाल\nअखण्ड यो प्यारो हाम्रो मातृभूमि नेपाल।" },
                { time: 57, text: "बहुल जाति, भाषा, धर्म, संस्कृति छन् विशाल\nअग्रगामी राष्ट्र हाम्रो, जय जय नेपाल।" }
            ]
        },
        {
            title: "Rotaract Song",
            file: "rotaract_song.mp3",
            lyrics: [
                { time: 0, text: "🎵 (रोट्रयाक्ट गीत धुन...) 🎵" },
                { time: 9, text: "फर्किएका ती हातहरू, उदाएका ती साथहरू\nरमाइला ती पलहरू, रमाएका ती यादहरू" },
                { time: 19, text: "एउटै धर्म हाम्रो हो, एउटै बाटो हाम्रो हो\n१८ पुगेका युवाहरूको सञ्जाल यो" },
                { time: 28, text: "रोट्रयाक्ट... रोट्रयाक्ट..." },
                { time: 38, text: "समाजका कुरीति पन्छाउँदै, समाजकै लागि लड्दै\nलक्ष्य हाम्रो धेरै टाढा छ, जोसका साथ अघि बढ्दै" },
                { time: 48, text: "रोटरीसँग हिँड्छौँ हामी एउटै पाइला बनाउँदै\nफोर-वे टेस्ट मान्दै हामी नाच्दै गाउँदै रमाउँदै" },
                { time: 57, text: "कलिला ओठहरूमा हामीले हाँसो छर्नु छ\nसमाज रूपान्तरण गर्न नेतृत्व नि गर्नु छ" },
                { time: 67, text: "फेलोसिप थ्रु सर्भिस भन्दै... जोड्छौँ सबैलाई\nत्यसैले त हामी हौँ रोट्रयाक्टर साथीभाइ\nत्यसैले हामी हौँ डिस्ट्रिक्ट ३२९२" }
            ]
        },
        {
            title: "Rotary Song",
            file: "rotary_song.mp3",
            lyrics: [
                { time: 0, text: "निस्वार्थ सेवा गर्नु पहिचान हो रोटरी\nसबैलाई माया गर्नु अभियान हो रोटरी" },
                { time: 9, text: "निस्वार्थ सेवा गर्नु पहिचान हो रोटरी\nसबैलाई माया गर्नु अभियान हो रोटरी" },
                { time: 18, text: "स्वास्थ्य, शिक्षा, विश्व शान्ति" },
                { time: 23, text: "रोटरीका चाहना\nमित्रता, विविधता र नेतृत्व" },
                { time: 28, text: "रोटरीकै साधन" },
                { time: 32, text: "मानवीय सेवा गर्न जुटिरहोस् रोटरी" },
                { time: 36, text: "राम्रो गर्न युगौँ युग बाँचिरहोस् रोटरी" },
                { time: 41, text: "पल ह्यारिसले जन्माएको" },
                { time: 46, text: "आवर CLUBले प्राण भरेको" },
                { time: 50, text: "फोर-वे हो पहिचान रोटरी" },
                { time: 55, text: "फोर-वे टेस्टको अनुशासन" },
                { time: 59, text: "स्वाभिमान हो रोटरी... रोटरी" }
            ]
        },
        {
            title: "Club Song",
            file: "club_song.mp3",
            lyrics: [
                { time: 0, text: "🎵 (म्युजिक) 🎵" },
                { time: 5, text: "गलकोटको काखमा गौरवको गान छ" },
                { time: 10, text: "रोट्र्याक्ट बागलुङ हाम्रो पहिचान छ" },
                { time: 16, text: "निस्वार्थ सेवाको संकल्प बोकेर" },
                { time: 21, text: "देश बनाउने युवाको यो अभियान छ" },
                { time: 26, text: "जय रोट्र्याक्ट, जय गलकोट, हाम्रो गौरव वर्ष" },
                { time: 32, text: "🎵 (म्युजिक) 🎵" }
            ]
        }
    ];

    const audio = document.getElementById('mainAudio');
    const trackItems = document.querySelectorAll('.track-item');
    const lyricsContainer = document.getElementById('lyricsContainer');

    let currentTrackIndex = null;

    function loadLyrics(index) {
        lyricsContainer.innerHTML = '';
        trackData[index].lyrics.forEach((line, i) => {
            const p = document.createElement('p');
            p.classList.add('lyric-line');
            p.id = `line-${index}-${i}`;
            p.innerHTML = line.text.replace(/\n/g, '<br>');
            lyricsContainer.appendChild(p);
        });
    }

    function selectTrack(index) {
        const item = trackItems[index];
        
        if (currentTrackIndex !== index) {
            trackItems.forEach(el => {
                el.classList.remove('active', 'playing');
                el.querySelector('.icon-control path').setAttribute('d', 'M8 5v14l11-7z'); 
            });

            currentTrackIndex = index;
            item.classList.add('active');
            
            audio.src = trackData[index].file;
            loadLyrics(index);
        }

        if (audio.paused) {
            audio.play().catch(err => console.log("Audio load failure context: ", err));
            item.classList.add('playing');
            item.querySelector('.icon-control path').setAttribute('d', 'M6 19h4V5H6v14zm8-14v14h4V5h-4z'); 
        } else {
            audio.pause();
            item.classList.remove('playing');
            item.querySelector('.icon-control path').setAttribute('d', 'M8 5v14l11-7z');
        }
    }

    trackItems.forEach(item => {
        item.addEventListener('click', () => {
            const index = parseInt(item.getAttribute('data-index'));
            selectTrack(index);
        });
    });

    audio.addEventListener('timeupdate', () => {
        if (currentTrackIndex === null) return;

        const currentTime = audio.currentTime;
        const lyricsLines = trackData[currentTrackIndex].lyrics;
        let activeLineIndex = -1;

        for (let i = 0; i < lyricsLines.length; i++) {
            if (currentTime >= lyricsLines[i].time) {
                activeLineIndex = i;
            } else {
                break;
            }
        }

        if (activeLineIndex !== -1) {
            const linesElements = lyricsContainer.querySelectorAll('.lyric-line');
            linesElements.forEach((lineEl, idx) => {
                if (idx === activeLineIndex) {
                    if (!lineEl.classList.contains('active')) {
                        lineEl.classList.add('active');
                        lineEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                } else {
                    lineEl.classList.remove('active');
                }
            });
        }
    });

    audio.addEventListener('ended', () => {
        if (currentTrackIndex !== null) {
            const activeItem = trackItems[currentTrackIndex];
            activeItem.classList.remove('playing');
            activeItem.querySelector('.icon-control path').setAttribute('d', 'M8 5v14l11-7z');
        }
    });
</script>
</body>
</html>
