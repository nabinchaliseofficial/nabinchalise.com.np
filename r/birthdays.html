<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthdays | This Month</title>
    <!-- Supabase CDN Link -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #fef2f2; color: #333; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ffe4e6; padding-bottom: 20px; margin-bottom: 20px; }
        .header h2 { color: #9f1239; font-size: 24px; }
        .back-btn { background: #1e293b; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .current-month { background: #ffe4e6; color: #9f1239; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .bday-card { background: #fff; border: 1px solid #ffe4e6; border-radius: 10px; padding: 20px; text-align: center; position: relative; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .bday-card h3 { color: #1f2937; margin-bottom: 5px; font-size: 18px; }
        .bday-card p { color: #6b7280; font-size: 14px; margin-bottom: 10px; }
        .date-badge { background: #f43f5e; color: white; padding: 5px 12px; border-radius: 15px; font-size: 13px; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>🎉 Club Birthdays</h2>
            <div>
                <span id="monthLabel" class="current-month">Loading Month...</span>
                <a href="dashboard.html" class="back-btn">⬅️ Back to Dashboard</a>
            </div>
        </div>

        <div class="grid" id="birthdayGrid">
            <p style="text-align: center; grid-column: 1/-1;">जन्मदिनहरू लोड हुँदैछन्...</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://kbyfvqkfcxqgjjtfvvxf.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_-bOiDndDXdz_FgXq1MFkag_ioCcg8nv";
        
        const supabase = @supabase/supabase-js.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const today = new Date();
        const currentMonthIdx = today.getMonth(); 
        const currentMonthNum = currentMonthIdx + 1; 
        
        document.getElementById('monthLabel').innerText = `📅 Month: ${monthNames[currentMonthIdx]}`;
        const grid = document.getElementById('birthdayGrid');

        async function loadBirthdays() {
            const { data: members, error } = await supabase.from('members').select('*');

            if(error) {
                grid.innerHTML = `<p style="color:red; text-align:center; grid-column:1/-1;">डाटा ल्याउन सकिएन।</p>`;
                return;
            }

            // चालु महिनाको जन्मदिन फिल्टर गर्ने
            const thisMonthBirthdays = (members || []).filter(member => {
                if(!member.dob) return false;
                const parts = member.dob.split('/');
                return parseInt(parts[0], 10) === currentMonthNum;
            });

            // गते (Day) को आधारमा Sort गर्ने
            thisMonthBirthdays.sort((a, b) => parseInt(a.dob.split('/')[1], 10) - parseInt(b.dob.split('/')[1], 10));

            grid.innerHTML = '';
            if(thisMonthBirthdays.length === 0) {
                grid.innerHTML = `<p style="text-align:center; grid-column:1/-1; color:#6b7280; font-style:italic;">यो महिनामा कसैको जन्मदिन छैन।</p>`;
            } else {
                thisMonthBirthdays.forEach(member => {
                    const day = member.dob.split('/')[1];
                    grid.innerHTML += `
                        <div class="bday-card">
                            <h3>${member.name}</h3>
                            <p>${member.designation || 'Member'}</p>
                            <div class="date-badge">🎂 ${monthNames[currentMonthIdx]} ${day}</div>
                        </div>
                    `;
                });
            }
        }

        loadBirthdays();
    </script>
</body>
</html>
