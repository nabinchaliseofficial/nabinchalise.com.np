<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Banner - Live Supabase with Nepali Date/Time</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            overflow: hidden;
            font-family: 'Mukta', 'Segoe UI', sans-serif;
            background-color: #000;
        }

        .banner-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            border: 12px solid #d4af37;
            transition: background-image 0.5s ease, border-color 0.3s ease;
        }

        /* Fullscreen mode: red border instead of gold */
        .banner-container.is-fullscreen {
            border-color: #e53935;
        }

        /* Top Header for Clock */
        .header-section {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            z-index: 10;
            position: relative;
        }

        .live-clock {
            font-size: 1.8rem;
            font-weight: bold;
            color: #111;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            border: 2px solid #d4af37;
        }

        .live-clock .time-label {
            font-size: 0.8rem;
            display: block;
            text-align: center;
            color: #666;
            font-weight: 400;
        }

        /* Center Logo Box */
        .center-logo-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 15px;
            backdrop-filter: blur(3px);
            border: 2px solid rgba(212, 175, 55, 0.3);
        }

        .center-logo-container img {
            height: 90px;
            max-width: 200px;
            object-fit: contain;
        }

        /* Center Content */
        .content-section {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px 40px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(212, 175, 55, 0.2);
        }

        .meeting-title {
            font-size: 4.5rem;
            font-weight: 800;
            color: #d32f2f;
            text-shadow: 3px 3px 0px rgba(255,255,255,0.8), 
                        -3px -3px 0px rgba(255,255,255,0.8),
                        3px -3px 0px rgba(255,255,255,0.8),
                        -3px 3px 0px rgba(255,255,255,0.8),
                        0px 0px 20px rgba(255,255,255,0.5);
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .organized-by {
            font-size: 2.8rem;
            font-weight: 700;
            color: #b71c1c;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.8), 
                        -2px -2px 0px rgba(255,255,255,0.8),
                        2px -2px 0px rgba(255,255,255,0.8),
                        -2px 2px 0px rgba(255,255,255,0.8);
        }

        /* Footer Section */
        .footer-section {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #b71c1c;
            padding: 0 20px 10px 20px;
            z-index: 10;
            flex-wrap: wrap;
            gap: 15px;
        }

        .footer-section span {
            background: rgba(255, 255, 255, 0.85);
            padding: 8px 25px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
            border: 2px solid #d4af37;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .footer-section .nepali-date-display {
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 25px;
            border-radius: 10px;
            border: 2px solid #d4af37;
            font-size: 1.6rem;
        }

        .footer-section .nepali-date-display .date-label {
            font-size: 0.8rem;
            display: block;
            text-align: center;
            color: #666;
            font-weight: 400;
        }

        .footer-section .time-display {
            background: rgba(255, 255, 255, 0.9);
            padding: 8px 25px;
            border-radius: 10px;
            border: 2px solid #d4af37;
            font-size: 1.6rem;
        }

        .footer-section .time-display .time-label {
            font-size: 0.8rem;
            display: block;
            text-align: center;
            color: #666;
            font-weight: 400;
        }

        /* Fullscreen Button */
        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .fullscreen-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(211, 47, 47, 0.4);
        }

        /* Status indicator */
        .status-indicator {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 20px;
            z-index: 1000;
            backdrop-filter: blur(3px);
        }

        .status-indicator .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .meeting-title {
                font-size: 3.5rem;
            }
            .organized-by {
                font-size: 2.2rem;
            }
            .footer-section {
                font-size: 1.4rem;
            }
            .footer-section span,
            .footer-section .nepali-date-display,
            .footer-section .time-display {
                font-size: 1.2rem;
                padding: 6px 18px;
            }
            .live-clock {
                font-size: 1.4rem;
                padding: 8px 15px;
            }
            .center-logo-container img {
                height: 70px;
            }
        }

        @media (max-width: 768px) {
            .banner-container {
                padding: 15px 15px;
                border-width: 8px;
            }
            .meeting-title {
                font-size: 2.5rem;
            }
            .organized-by {
                font-size: 1.6rem;
            }
            .content-section {
                padding: 15px 20px;
            }
            .footer-section {
                font-size: 1rem;
                justify-content: center;
                gap: 8px;
            }
            .footer-section span,
            .footer-section .nepali-date-display,
            .footer-section .time-display {
                font-size: 0.9rem;
                padding: 4px 12px;
            }
            .live-clock {
                font-size: 1rem;
                padding: 5px 12px;
            }
            .center-logo-container {
                top: 10px;
                padding: 5px 12px;
            }
            .center-logo-container img {
                height: 50px;
                max-width: 120px;
            }
            .header-section {
                justify-content: center;
            }
            .fullscreen-btn {
                padding: 8px 16px;
                font-size: 0.8rem;
                bottom: 10px;
                right: 10px;
            }
            .status-indicator {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .meeting-title {
                font-size: 1.8rem;
            }
            .organized-by {
                font-size: 1.2rem;
            }
            .footer-section span,
            .footer-section .nepali-date-display,
            .footer-section .time-display {
                font-size: 0.7rem;
                padding: 3px 8px;
            }
            .live-clock {
                font-size: 0.8rem;
                padding: 4px 10px;
            }
            .center-logo-container img {
                height: 40px;
            }
            .content-section {
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>

    <div class="banner-container" id="bannerBg">
        
        <!-- Logo - Center Top -->
        <div class="center-logo-container">
            <img id="centerLogo" src="" alt="Logo">
        </div>

        <!-- Top Header with Live Clock -->
        <div class="header-section">
            <div class="live-clock" id="liveClock">
                <span id="clockTime">--:--:--</span>
            </div>
        </div>

        <!-- Center Main Content -->
        <div class="content-section">
            <h1 class="meeting-title" id="meetingName">Loading...</h1>
            <h2 class="organized-by" id="organizedBy">Loading...</h2>
        </div>

        <!-- Footer: Date & Time in Nepali -->
        <div class="footer-section">
            <span class="nepali-date-display" id="dateDisplay">
                <span id="dateText">मिति: --</span>
            </span>
            <span class="time-display" id="timeDisplay">
                <span id="timeText">समय: --</span>
            </span>
        </div>

        <!-- Status Indicator -->
        <div class="status-indicator">
            <span class="dot"></span>
            <span id="statusText">लाइभ</span>
        </div>
    </div>

    <!-- Fullscreen Toggle Button -->
    <button class="fullscreen-btn" onclick="toggleFullScreen()">⛶ पूर्ण स्क्रिन</button>

    <script>
        // ===== SUPABASE CONFIGURATION =====
        const SUPABASE_URL = 'https://kbyfvqkfcxqgjjtfvvxf.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-bOiDndDXdz_FgXq1MFkag_ioCcg8nv';

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ===== NEPALI DATE SYSTEM =====
        const NepaliDate = {
            months: ['बैशाख', 'जेठ', 'असार', 'साउन', 'भदौ', 'असोज', 'कात्तिक', 'मंसिर', 'पुष', 'माघ', 'फागुन', 'चैत'],
            weekdays: ['आइतबार', 'सोमबार', 'मंगलबार', 'बुधबार', 'बिहिबार', 'शुक्रबार', 'शनिबार'],
            monthDays: {
                2070: [31,32,31,32,31,30,30,30,29,30,29,30],
                2071: [31,32,31,32,31,30,30,30,29,30,29,30],
                2072: [31,32,31,32,31,30,30,30,29,30,29,30],
                2073: [31,32,31,32,31,30,30,30,29,30,29,30],
                2074: [31,32,31,32,31,30,30,30,29,30,29,30],
                2075: [31,32,31,32,31,30,30,30,29,30,29,30],
                2076: [31,32,31,32,31,30,30,30,29,30,29,30],
                2077: [31,32,31,32,31,30,30,30,29,30,29,30],
                2078: [31,32,31,32,31,30,30,30,29,30,29,30],
                2079: [31,32,31,32,31,30,30,30,29,30,29,30],
                2080: [31,32,31,32,31,30,30,30,29,30,29,30],
                2081: [31,32,31,32,31,30,30,30,29,30,29,30],
                2082: [31,32,31,32,31,30,30,30,29,30,29,30],
                2083: [31,32,31,32,31,30,30,30,29,30,29,30],
                2084: [31,32,31,32,31,30,30,30,29,30,29,30],
                2085: [31,32,31,32,31,30,30,30,29,30,29,30],
                2086: [31,32,31,32,31,30,30,30,29,30,29,30],
                2087: [31,32,31,32,31,30,30,30,29,30,29,30],
                2088: [31,32,31,32,31,30,30,30,29,30,29,30],
                2089: [31,32,31,32,31,30,30,30,29,30,29,30],
                2090: [31,32,31,32,31,30,30,30,29,30,29,30]
            },
            referenceYear: 2070,
            referenceMonth: 0,
            referenceDay: 1,
            referenceEnglishDate: new Date(2013, 3, 14)
        };

        // Convert any string/number's ASCII digits (0-9) to Nepali (Devanagari) digits.
        function toNepaliDigits(input) {
            const nepaliDigits = ['०', '१', '२', '३', '४', '५', '६', '७', '८', '९'];
            return String(input).replace(/[0-9]/g, d => nepaliDigits[d]);
        }

        function getCurrentNepaliDate() {
            const now = new Date();
            const refDate = NepaliDate.referenceEnglishDate;
            const diffDays = Math.floor((now - refDate) / (1000 * 60 * 60 * 24));
            
            let remainingDays = diffDays;
            let year = NepaliDate.referenceYear;
            let month = NepaliDate.referenceMonth;
            
            while (remainingDays > 0) {
                const daysInYear = NepaliDate.monthDays[year];
                if (!daysInYear) break;
                
                const totalDaysInYear = daysInYear.reduce((a, b) => a + b, 0);
                if (remainingDays >= totalDaysInYear) {
                    remainingDays -= totalDaysInYear;
                    year++;
                } else {
                    for (let m = 0; m < daysInYear.length; m++) {
                        if (remainingDays >= daysInYear[m]) {
                            remainingDays -= daysInYear[m];
                            month = m + 1;
                        } else {
                            month = m;
                            break;
                        }
                    }
                    break;
                }
            }
            
            const day = remainingDays + 1;
            const weekdayIndex = (1 + diffDays) % 7;
            
            return {
                year: year,
                month: month,
                day: day,
                weekday: NepaliDate.weekdays[weekdayIndex],
                monthName: NepaliDate.months[month]
            };
        }

        function getCurrentNepaliTime() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const periodNepali = hours >= 12 ? 'बेलुका' : 'बिहान';
            const period = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12;

            const digitsFormatted = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            return {
                hours: hours,
                minutes: minutes,
                seconds: seconds,
                period: period,
                periodNepali: periodNepali,
                formatted: `${digitsFormatted} ${period}`,
                formattedNepali: `${toNepaliDigits(digitsFormatted)} ${periodNepali}`
            };
        }

        // ===== OFFLINE-SAFE LOCAL CACHE =====
        // Remembers the last successfully loaded banner so that a page reload
        // during a network drop still shows the last known content instead of
        // a blank/"Loading..." screen. The live view only ever gets overwritten
        // once a *new* fetch or realtime event actually succeeds.
        const BANNER_CACHE_KEY = 'bannerSettingsCache';

        function saveBannerCache(data) {
            try {
                localStorage.setItem(BANNER_CACHE_KEY, JSON.stringify(data));
            } catch (e) {
                // Ignore storage errors (e.g. private browsing) — caching is best-effort.
            }
        }

        function loadBannerCache() {
            try {
                const raw = localStorage.getItem(BANNER_CACHE_KEY);
                return raw ? JSON.parse(raw) : null;
            } catch (e) {
                return null;
            }
        }

        // Applies a banner row to the DOM. Used by the initial fetch, the cache
        // fallback, and realtime updates alike so the display logic is one path.
        function applyBannerData(data) {
            if (!data) return;

            window.__liveBannerId = data.id;
            document.getElementById('meetingName').innerText = data.meeting_name || 'Loading...';
            document.getElementById('organizedBy').innerText = data.organized_by || 'Loading...';

            if (data.date_text) {
                document.getElementById('dateText').innerHTML = data.date_text;
            }
            if (data.time_text) {
                document.getElementById('timeText').innerHTML = data.time_text;
            }

            if (data.background_url && data.background_url !== '') {
                document.getElementById('bannerBg').style.backgroundImage = `url('${data.background_url}')`;
            } else {
                document.getElementById('bannerBg').style.backgroundImage = '';
            }
            if (data.logo_url && data.logo_url !== '') {
                document.getElementById('centerLogo').src = data.logo_url;
                document.getElementById('centerLogo').style.display = 'block';
            } else {
                document.getElementById('centerLogo').style.display = 'none';
            }
        }

        // ===== FETCH BANNER DATA =====
        async function fetchBannerData() {
            try {
                // Prefer the row the admin has explicitly marked live.
                let { data, error } = await supabaseClient
                    .from('banner_settings')
                    .select('*')
                    .eq('is_active', true)
                    .limit(1)
                    .maybeSingle();

                // Fall back to the first row (covers older rows saved before the
                // "is_active" column existed, so nothing breaks mid-migration).
                if (!error && !data) {
                    const fallback = await supabaseClient
                        .from('banner_settings')
                        .select('*')
                        .order('id', { ascending: true })
                        .limit(1)
                        .maybeSingle();
                    data = fallback.data;
                    error = fallback.error;
                }

                if (error) {
                    console.error('Error fetching data:', error);
                    // Network/DB hiccup — keep whatever is already on screen,
                    // just flag the status indicator, don't blank the banner.
                    document.getElementById('statusText').textContent = 'पुन: जडान हुँदै...';
                    return;
                }

                if (!data) {
                    // Only show the placeholder if we truly have nothing to show
                    // (no cache and no row in the DB at all).
                    if (!loadBannerCache()) {
                        document.getElementById('meetingName').innerText = 'बैनर डाटा उपलब्ध छैन';
                        document.getElementById('organizedBy').innerText = 'कृपया एडमिन प्यानलबाट सेट अप गर्नुहोस्';
                    }
                    document.getElementById('statusText').textContent = 'डाटा छैन';
                    return;
                }

                applyBannerData(data);
                saveBannerCache(data);
                document.getElementById('statusText').textContent = 'लाइभ';
            } catch (error) {
                console.error('Error:', error);
                // Offline or unreachable — leave the current display untouched.
                document.getElementById('statusText').textContent = 'पुन: जडान हुँदै...';
            }
        }

        // ===== REALTIME SUBSCRIPTION =====
        let realtimeChannel = null;

        function setupRealtime() {
            if (realtimeChannel) {
                supabaseClient.removeChannel(realtimeChannel);
            }

            realtimeChannel = supabaseClient
                .channel('public:banner_settings')
                .on('postgres_changes',
                    { event: '*', schema: 'public', table: 'banner_settings' },
                    payload => {
                        console.log('🔄 Realtime event received:', payload.eventType, payload);

                        // Any insert/update/delete could change which row is the
                        // active/live one (e.g. admin ticked a different row, or
                        // edited the currently-live one) — re-fetch whichever row
                        // is marked active rather than trying to patch fields from
                        // the raw payload. fetchBannerData() never blanks the
                        // screen on failure, so this stays safe if offline too.
                        fetchBannerData();

                        document.getElementById('statusText').textContent = 'अपडेट भयो!';
                        setTimeout(() => {
                            document.getElementById('statusText').textContent = 'लाइभ';
                        }, 2000);
                    }
                )
                .subscribe((status) => {
                    console.log('Realtime channel status:', status);
                    if (status === 'SUBSCRIBED') {
                        document.getElementById('statusText').textContent = 'लाइभ';
                    } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
                        document.getElementById('statusText').textContent = 'पुन: जडान हुँदै...';
                        // Re-fetch current data and retry the subscription after a short delay
                        setTimeout(() => {
                            fetchBannerData();
                            setupRealtime();
                        }, 3000);
                    }
                });
        }

        // ===== LIVE CLOCK =====
        function updateClock() {
            const time = getCurrentNepaliTime();
            document.getElementById('clockTime').textContent = time.formattedNepali;
        }

        // ===== VIEWPORT HEIGHT FIX (mobile fullscreen repaint bug) =====
        // On many mobile browsers, 100vh is computed against the viewport
        // size *before* the browser chrome (address bar etc.) hides/shows,
        // and the layout isn't recalculated until the next touch/scroll.
        // That's why the banner looked "stuck" after tapping fullscreen and
        // only snapped to full size once the screen was touched. Setting an
        // actual pixel-based --vh on every relevant event forces an
        // immediate repaint instead of waiting for user interaction.
        function setViewportHeight() {
            document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
        }
        setViewportHeight();
        window.addEventListener('resize', setViewportHeight);
        window.addEventListener('orientationchange', setViewportHeight);

        // ===== FULLSCREEN TOGGLE =====
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                const el = document.documentElement;
                const request = el.requestFullscreen
                    ? el.requestFullscreen()
                    : el.webkitRequestFullscreen
                        ? el.webkitRequestFullscreen()
                        : null;
                if (request && request.catch) {
                    request.catch(err => console.log('Fullscreen error:', err));
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }
            }
        }

        // Switch the border to red whenever we're actually in fullscreen,
        // regardless of how it was triggered (button, Esc key, browser UI),
        // and force an immediate repaint so the banner fills the screen
        // right away instead of waiting for a touch.
        function updateFullscreenBorder() {
            const container = document.getElementById('bannerBg');
            if (document.fullscreenElement) {
                container.classList.add('is-fullscreen');
            } else {
                container.classList.remove('is-fullscreen');
            }

            // Re-measure the viewport now that fullscreen actually changed...
            setViewportHeight();
            // ...and again shortly after, since some mobile browsers finish
            // the fullscreen transition a beat after the event fires.
            setTimeout(setViewportHeight, 150);
            setTimeout(setViewportHeight, 400);

            // Force a reflow so the new height is applied immediately rather
            // than sitting stale until the next touch/scroll triggers one.
            requestAnimationFrame(() => {
                container.style.display = 'none';
                void container.offsetHeight; // reading this forces the reflow
                container.style.display = '';
            });
        }
        document.addEventListener('fullscreenchange', updateFullscreenBorder);
        document.addEventListener('webkitfullscreenchange', updateFullscreenBorder);

        // ===== INITIALIZATION =====
        window.onload = () => {
            // Paint the last known good data immediately, in case the network
            // is slow or down right at page load — avoids a blank "Loading..."
            // banner until the real fetch below comes back.
            const cached = loadBannerCache();
            if (cached) {
                applyBannerData(cached);
            }

            // Fetch fresh data
            fetchBannerData();
            
            // Setup realtime
            setupRealtime();
            
            // Start clock
            updateClock();
            setInterval(updateClock, 1000);

            // Fallback poll: even if a realtime event is ever missed (dropped
            // connection, etc.), this catches up within 30s without ever
            // clearing the currently displayed content on failure.
            setInterval(fetchBannerData, 30000);
            
            console.log('✅ Banner initialized successfully!');
        };
    </script>
</body>
</html>
